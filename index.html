    </div>
  `, (m) => {
    let timing = preselectSchedule || null;
    let category = 'supplement';
    let required = false;
    // Pre-highlight the schedule chip if caller asked us to.
    if (preselectSchedule) {
      const pre = m.querySelector(`[data-timing="${preselectSchedule}"]`);
      if (pre) pre.classList.add('selected');
      // Scroll the Add section into view so the user lands there.
      setTimeout(() => $('#supp-name')?.focus(), 60);
    }
    const refreshAddBtn = () => {
      const name = $('#supp-name').value.trim();
      const ok = !!name && !!timing;
      $('#supp-add').disabled = !ok; $('#supp-add').style.opacity = ok ? 1 : 0.5;
    };
    const applyHistoryMatch = () => {
      const match = findStackHistoryMatch($('#supp-name').value);
      if (!match) return;
      // Only autofill fields the user hasn't edited yet (don't clobber typed dose).
      if (!$('#supp-dose').value && match.dose) $('#supp-dose').value = match.dose;
      // Schedule: respect preselect if caller set one; else use history's schedule
      if (!timing && match.schedule) {
        timing = match.schedule;
        m.querySelectorAll('[data-timing]').forEach(x => x.classList.toggle('selected', x.dataset.timing === match.schedule));
      }
      // Category
      if (match.category) {
        category = match.category;
        m.querySelectorAll('[data-category]').forEach(x => x.classList.toggle('selected', x.dataset.category === match.category));
      }
      // Required
      required = !!match.required;
      m.querySelectorAll('[data-required-toggle]').forEach(x => x.classList.toggle('selected', x.dataset.requiredToggle === (match.required ? '1' : '0')));
      refreshAddBtn();
    };
    $('#supp-name').oninput = () => { refreshAddBtn(); applyHistoryMatch(); };
    $('#supp-name').onchange = applyHistoryMatch; // fires after picking from datalist
    m.querySelectorAll('[data-timing]').forEach(c => c.onclick = () => {
      m.querySelectorAll('[data-timing]').forEach(x => x.classList.remove('selected'));
      c.classList.add('selected'); timing = c.dataset.timing;
      refreshAddBtn();
    });
    m.querySelectorAll('[data-category]').forEach(c => c.onclick = () => {
      m.querySelectorAll('[data-category]').forEach(x => x.classList.remove('selected'));
      c.classList.add('selected'); category = c.dataset.category;
    });
    m.querySelectorAll('[data-required-toggle]').forEach(c => c.onclick = () => {
      m.querySelectorAll('[data-required-toggle]').forEach(x => x.classList.remove('selected'));
      c.classList.add('selected'); required = c.dataset.requiredToggle === '1';
    });
    const wireRows = () => {
      if (addOnly) return;
      m.querySelectorAll('[data-supp-remove]').forEach(b => b.onclick = async () => {
        await removeSupplement(b.dataset.suppRemove);
        $('#supp-list').innerHTML = (state.stackItems || []).length ? renderRows() : '<div class="muted small" style="margin-bottom: 14px">No items yet.</div>';
        wireRows();
        render();
      });
      m.querySelectorAll('[data-supp-required]').forEach(b => b.onclick = async () => {
        const id = b.dataset.suppRequired;
        const now = b.dataset.currentlyRequired === '1';
        await updateStackItem(id, { required: !now });
        $('#supp-list').innerHTML = renderRows();
        wireRows();
        render();
      });
    };
    wireRows();
    $('#supp-add').onclick = async () => {
      const name = $('#supp-name').value.trim();
      const dose = $('#supp-dose').value.trim() || null;
      if (!name || !timing) {
        toast(!name ? 'Add a name' : 'Pick a schedule');
        return;
      }
      const btn = $('#supp-add');
      btn.disabled = true; btn.textContent = 'Adding…';
      try {
        await addSupplement(name, timing, dose, category, required);
        // Re-render the Stack page behind the modal so the new item is visible on close.
        render();
        if (addOnly) {
          // Section-local add → close the modal; user is done.
          closeModal();
          toast('Added');
          return;
        }
        // Manage flow → stay open so user can add more.
        $('#supp-name').value = ''; $('#supp-dose').value = '';
        m.querySelectorAll('[data-timing]').forEach(x => x.classList.remove('selected'));
        if (!preselectSchedule) timing = null;
        required = false;
        m.querySelectorAll('[data-required-toggle]').forEach(x => x.classList.remove('selected'));
        m.querySelector('[data-required-toggle="0"]')?.classList.add('selected');
        const list = $('#supp-list');
        if (list) list.innerHTML = renderRows();
        wireRows();
        toast('Added');
      } catch (e) {
        toast('Could not add: ' + e.message);
        console.warn('addSupplement failed:', e);
      } finally {
        btn.textContent = 'Add';
        refreshAddBtn();
      }
    };
  });
}

// Look up a name in the user's full stack history (active + inactive).
// Match is case-insensitive on trimmed name. Returns the row or null.
function findStackHistoryMatch(name) {
  const needle = (name || '').trim().toLowerCase();
  if (!needle) return null;
  return (state.allStackItems || []).find(s => (s.name || '').trim().toLowerCase() === needle) || null;
}

async function addSupplement(name, schedule, dose = null, category = 'supplement', required = false) {
  // If this name already exists, revive/update instead of creating a duplicate.
  const existing = findStackHistoryMatch(name);
  if (existing) {
    const patch = {
      schedule, dose, category, required,
      active: true,
    };
    const result = await sbFetch(`/tide_stack_items?id=eq.${existing.id}`, {
      method: 'PATCH',
      body: JSON.stringify(patch),
    });
    const updated = result && result[0];
    if (updated) {
      state.allStackItems = state.allStackItems.map(s => s.id === updated.id ? updated : s);
      state.stackItems = state.allStackItems.filter(s => s.active !== false);
      state.supplements = state.stackItems;
    }
    return updated;
  }
  const row = { name, schedule, dose, category, required, active: true };
  const result = await sbFetch('/tide_stack_items', { method: 'POST', body: JSON.stringify(row) });
  const created = result && result[0];
  if (created) {
    state.allStackItems.push(created);
    state.stackItems = state.allStackItems.filter(s => s.active !== false);
    state.supplements = state.stackItems;
  }
  return created;
}

async function removeSupplement(id) {
  // Soft delete — preserves history for autocomplete and per-item streaks.
  await sbFetch(`/tide_stack_items?id=eq.${id}`, { method: 'PATCH', body: JSON.stringify({ active: false }) });
  state.allStackItems = state.allStackItems.map(s => s.id === id ? { ...s, active: false } : s);
  state.stackItems = state.allStackItems.filter(s => s.active !== false);
  state.supplements = state.stackItems;
}

async function updateStackItem(id, patch) {
  const result = await sbFetch(`/tide_stack_items?id=eq.${id}`, {
    method: 'PATCH',
    body: JSON.stringify(patch),
  });
  const updated = result && result[0];
  if (updated) {
    state.allStackItems = (state.allStackItems || []).map(s => s.id === id ? updated : s);
    state.stackItems = state.allStackItems.filter(s => s.active !== false);
    state.supplements = state.stackItems;
  }
  return updated;
}

async function endSession(feeling, note, endedAtIso) {
  const ended_at = endedAtIso || new Date().toISOString();
  const duration_min = Math.max(0, Math.round((new Date(ended_at).getTime() - new Date(state.activeSession.started_at).getTime()) / 60000));
  const update = { ended_at, feeling, note: note || null, duration_min };
  await sbFetch(`/tide_indulge_sessions?id=eq.${state.activeSession.id}`, {
    method: 'PATCH',
    body: JSON.stringify(update),
  });
  state.activeSession = null;
  state.drinks = [];
  saveLocal();
  await loadHistory();
  render();
  toast('Session saved. Sleep well.');
}

// ---------------------------------------------------------------------------
// Patterns — joins tide_oura_daily with sessions/drinks to surface comparisons
// ---------------------------------------------------------------------------
const PAT_WINDOWS = [
  { id: '7d',  days: 7,  label: '7d'  },
  { id: '30d', days: 30, label: '30d' },
  { id: '90d', days: 90, label: '90d' },
];

// A session that started after noon attributes to the Oura row for the NEXT day
// (the sleep that ended that morning). Before noon — same day.
function ouraDateForSession(startedAt) {
  const d = new Date(startedAt);
  if (d.getHours() >= 12) {
    const next = new Date(d);
    next.setDate(next.getDate() + 1);
    return next.toISOString().slice(0, 10);
  }
  return d.toISOString().slice(0, 10);
}

function drinkBucket(n) {
  if (!n) return '0';
  if (n <= 2) return '1-2';
  if (n <= 4) return '3-4';
  return '5+';
}

const BUCKET_ORDER = ['0', '1-2', '3-4', '5+'];
const BUCKET_LABELS = {
  '0':   'No drinks',
  '1-2': '1–2 drinks',
  '3-4': '3–4 drinks',
  '5+':  '5+ drinks',
};

async function loadPatternsData(days) {
  const endDate = todayISO();
  const startDate = addDays(endDate, -(days - 1));
  // Sessions over a wider window so attribution into the start date works.
  const startedAfter = addDays(startDate, -1) + 'T00:00:00';
  const [ouraRows, sessions] = await Promise.all([
    loadOuraRange(startDate, endDate),
    sbFetch(`/tide_indulge_sessions?started_at=gte.${encodeURIComponent(startedAfter)}&order=started_at.asc`).catch(() => []),
  ]);
  const sessIds = (sessions || []).map(s => s.id);
  let drinkCounts = {};
  if (sessIds.length) {
    const entries = await sbFetch(`/tide_indulge_entries?session_id=in.(${sessIds.join(',')})&kind=eq.alcohol&select=session_id`).catch(() => []);
    (entries || []).forEach(d => { drinkCounts[d.session_id] = (drinkCounts[d.session_id] || 0) + 1; });
  }
  // Map oura_date → drink count (summed if multiple sessions land on same night)
  const drinksByOuraDate = {};
  (sessions || []).forEach(s => {
    const od = ouraDateForSession(s.started_at);
    drinksByOuraDate[od] = (drinksByOuraDate[od] || 0) + (drinkCounts[s.id] || 0);
  });
  // Build a row per oura date with metric + bucket
  const joined = (ouraRows || []).map(o => ({
    date: o.date,
    sleep_score: o.sleep_score,
    hrv_avg: o.hrv_avg,
    readiness_score: o.readiness_score,
    total_sleep_min: o.total_sleep_min,
    drink_count: drinksByOuraDate[o.date] || 0,
    bucket: drinkBucket(drinksByOuraDate[o.date] || 0),
  }));
  return { joined, startDate, endDate, hadPat: !!getOuraPat() };
}

function bucketStats(rows, key) {
  const buckets = {};
  BUCKET_ORDER.forEach(b => { buckets[b] = { sum: 0, n: 0 }; });
  rows.forEach(r => {
    const v = r[key];
    if (v == null) return;
    buckets[r.bucket].sum += v;
    buckets[r.bucket].n += 1;
  });
  const out = {};
  BUCKET_ORDER.forEach(b => {
    out[b] = buckets[b].n ? buckets[b].sum / buckets[b].n : null;
  });
  return out;
}

function patBar(label, value, max, fmt, n) {
  if (value == null) {
    return `<div class="pat-row"><div class="pat-row-label">${escapeHtml(label)}</div><div class="pat-row-bar dim"></div><div class="pat-row-val dim">—</div></div>`;
  }
  const pct = Math.max(0, Math.min(100, max ? (value / max) * 100 : 0));
  return `<div class="pat-row">
    <div class="pat-row-label">${escapeHtml(label)}</div>
    <div class="pat-row-bar"><div class="pat-row-fill" style="width: ${pct.toFixed(1)}%"></div></div>
    <div class="pat-row-val">${fmt(value)}${n ? `<span class="muted small" style="font-weight:400"> · ${n}</span>` : ''}</div>
  </div>`;
}

function patMetricCard(title, rows, key, max, fmt) {
  const stats = bucketStats(rows, key);
  const counts = {};
  BUCKET_ORDER.forEach(b => { counts[b] = rows.filter(r => r.bucket === b && r[key] != null).length; });
  const anyData = BUCKET_ORDER.some(b => stats[b] != null);
  if (!anyData) {
    return `<div class="card pat-card"><div class="pat-metric-title">${escapeHtml(title)}</div><div class="pat-empty">No data yet for this window.</div></div>`;
  }
  return `<div class="card pat-card">
    <div class="pat-metric-title">${escapeHtml(title)}</div>
    ${BUCKET_ORDER.map(b => patBar(BUCKET_LABELS[b], stats[b], max, fmt, counts[b])).join('')}
  </div>`;
}

async function patternsNarrative(days, joined) {
  if (!joined.length) return 'Sync Oura and log some sessions — patterns appear here once there is data on both sides.';
  const summary = joined
    .filter(r => r.sleep_score != null || r.hrv_avg != null || r.readiness_score != null)
    .map(r => ({
      d: r.date,
      drinks: r.drink_count,
      sleep: r.sleep_score,
      hrv: r.hrv_avg,
      readiness: r.readiness_score,
      sleep_min: r.total_sleep_min,
    }));
  if (summary.length < 3) return 'Not enough joined data yet — keep logging and the pattern will fill in.';
  const fallback = { paragraph: 'Not enough signal to call a pattern yet.' };
  const pj = await callClaudeJSON(
    `You're analyzing ${days} days of someone's drinking + Oura biometrics. Each row is one day: drinks (count for the night before), sleep score, HRV balance, readiness score, total sleep minutes. Identify 1–3 specific, concrete patterns relating drinking to recovery. Be terse, non-judgmental, factual. Cite numbers. Max 80 words. If the signal is weak, say so. Return JSON: {"paragraph": "..."}\n\nData: ${JSON.stringify(summary)}`,
    fallback
  );
  return pj.paragraph || fallback.paragraph;
}

async function renderPatterns() {
  const win = state.patternsWindow || '30d';
  const winCfg = PAT_WINDOWS.find(w => w.id === win) || PAT_WINDOWS[1];

  // Initial frame with loading state
  $('#app').innerHTML = `
    <header class="app-head">
      <button class="nav-btn" data-back>← Back</button>
      <div class="title">Patterns</div>
      <div style="width: 60px"></div>
    </header>

    <div class="pat-window">
      ${PAT_WINDOWS.map(w => `<div class="chip ${w.id === win ? 'selected' : ''}" data-win="${w.id}">${w.label}</div>`).join('')}
    </div>

    <div id="pat-body"><div class="pat-empty">Loading…</div></div>
  `;

  $$('[data-back]').forEach(b => b.onclick = () => { state.screen = 'home'; render(); });
  $$('[data-win]').forEach(b => b.onclick = () => {
    state.patternsWindow = b.dataset.win;
    render();
  });

  if (!getOuraPat()) {
    $('#pat-body').innerHTML = `<div class="card"><p>Add an Oura Personal Access Token in Profile to enable Patterns. Your drinking data will be compared against sleep score, HRV, and readiness.</p><button class="btn btn-soft" data-nav="settings">Open Profile</button></div>`;
    $$('[data-nav]').forEach(b => b.onclick = () => { state.screen = b.dataset.nav; render(); });
    return;
  }

  // Trigger a background sync (no await on UI — we'll just read whatever's in the DB now)
  syncOura().catch(() => {});

  const { joined } = await loadPatternsData(winCfg.days);

  if (!joined.length) {
    $('#pat-body').innerHTML = `<div class="card"><div class="pat-empty">No Oura data synced for this window yet. Open Profile → Sync now, or wait for the next auto-sync.</div></div>`;
    return;
  }

  const fmtScore = v => Math.round(v).toString();
  const fmtSleepHrs = v => `${Math.floor(v / 60)}h ${String(Math.round(v % 60)).padStart(2, '0')}m`;

  $('#pat-body').innerHTML = `
    ${patMetricCard('Sleep score', joined, 'sleep_score', 100, fmtScore)}
    ${patMetricCard('HRV balance',  joined, 'hrv_avg',     100, fmtScore)}
    ${patMetricCard('Readiness',    joined, 'readiness_score', 100, fmtScore)}
    ${patMetricCard('Total sleep',  joined, 'total_sleep_min', 600, fmtSleepHrs)}

    <div class="card pat-card">
      <div class="pat-metric-title">What the data says</div>
      <div class="pat-narrative" id="pat-narrative">Reading the joined data…</div>
      <div style="display:flex; gap:8px; margin-top:10px">
        <button class="btn btn-soft" id="pat-refresh" style="flex: 1">Refresh insight</button>
      </div>
    </div>
  `;

  const narrate = async () => {
    $('#pat-narrative').textContent = 'Reading the joined data…';
    try {
      const p = await patternsNarrative(winCfg.days, joined);
      $('#pat-narrative').textContent = p;
    } catch (e) {
      $('#pat-narrative').textContent = 'Could not generate insight: ' + e.message;
    }
  };
  $('#pat-refresh').onclick = narrate;
  narrate();
}

        <div class="label">Sleep quality</div>
        <div class="grid-4">
          ${['great', 'okay', 'restless', 'rough'].map(s => `<div class="chip" data-sleep="${s}">${s}</div>`).join('')}
        </div>
      </div>

      <div class="modal-section">
        <div class="label">Note</div>
        <textarea id="morning-note" rows="4" placeholder="One thought from the morning…"></textarea>
      </div>

      <div class="modal-section">
        <label class="row" style="cursor: pointer">
          <span class="small">Push to Still as a reflection</span>
          <input type="checkbox" id="push-still" style="width: auto">
        </label>
      </div>

      <button class="btn" id="morning-save">Save</button>
    </div>
  `;
  $$('[data-back]').forEach(b => b.onclick = () => { state.screen = 'home'; state.morningSession = null; render(); });
  let sleep = null;
  $$('[data-sleep]').forEach(c => c.onclick = () => {
    $$('[data-sleep]').forEach(x => x.classList.remove('selected'));
    c.classList.add('selected'); sleep = c.dataset.sleep;
  });
  $('#morning-save').onclick = async () => {
    $('#morning-save').disabled = true; $('#morning-save').textContent = 'Saving…';
    try {
      const note = $('#morning-note').value.trim();
      const push = $('#push-still').checked;
      await saveMorning(session, sleep, note, push, prompt);
      toast('Saved');
      state.screen = 'home'; state.morningSession = null;
      await loadHistory();
      render();
    } catch (e) {
      toast('Could not save: ' + e.message);
      $('#morning-save').disabled = false; $('#morning-save').textContent = 'Save';
    }
  };
}

async function saveMorning(session, sleep, note, push, prompt) {
  const row = {
    session_id: session.id,
    sleep_quality: sleep,
    note: note || null,
    pushed_to_still: push,
  };
  await sbFetch('/tide_reflections', { method: 'POST', body: JSON.stringify(row) });

  if (push && note) {
    // Push to Still's reflections table — same Supabase project, same anon key
    try {
      await sbFetch('/reflections', {
        method: 'POST',
        body: JSON.stringify({
          text: note,
          mood: session.feeling || null,
          tags: ['tide', 'morning-after'],
          prompt_used: prompt,
        }),
      });
    } catch (e) {
      console.warn('Push to Still failed:', e.message);
      toast('Saved locally — Still push failed');
    }
  }
}

// ---------------------------------------------------------------------------
// Quotes — real human quotes, rotated locally. No AI generation.
// ---------------------------------------------------------------------------
function pickQuote({ preferTags = null } = {}) {
  const dismissedSet = new Set((state.dismissedQuotes || []).slice(-30));
  const currentQ = state.currentQuote ? state.currentQuote.q : null;
  const excludeQs = new Set([currentQ]);

  let pool = QUOTES.filter(x => !excludeQs.has(x.q) && !dismissedSet.has(x.q));
  if (preferTags) {
    const tagged = pool.filter(x => x.tags && x.tags.some(t => preferTags.includes(t)));
    if (tagged.length) pool = tagged;
  }
  if (pool.length === 0) {
    pool = QUOTES.filter(x => !excludeQs.has(x.q) && !dismissedSet.has(x.q));
  }
  if (pool.length === 0) {
    pool = QUOTES.filter(x => !excludeQs.has(x.q));
  }
  if (pool.length === 0) pool = QUOTES;
  return pool[Math.floor(Math.random() * pool.length)];
}

function loadQuote(force = false) {
  if (!force && state.currentQuote) return;
  state.currentQuote = pickQuote();
  if (state.screen === 'home') render();
}

async function dismissQuote() {
  if (!state.currentQuote) return;
  const dismissed = state.currentQuote.q;
  state.dismissedQuotes.push(dismissed);
  saveLocal();
  try {
    await sbFetch('/tide_dismissed_quotes', {
      method: 'POST',
      body: JSON.stringify({ quote: dismissed }),
    });
  } catch (e) { /* non-fatal */ }
  state.currentQuote = pickQuote();
  render();
}

function maybeNudge(kind) {
  const tags = kind === 'fast-pace' ? ['presence'] : ['presence', 'company'];
  state.currentQuote = pickQuote({ preferTags: tags });
  render();
}

// ---------------------------------------------------------------------------
// Local persistence (for offline-friendly active session reload)
// ---------------------------------------------------------------------------
function saveLocal() {
  localStorage.setItem('tide_state', JSON.stringify({
    activeSession: state.activeSession,
    drinks: state.drinks,
    dismissedQuotes: state.dismissedQuotes.slice(-50),
  }));
}
function loadLocal() {
  try {
    const raw = localStorage.getItem('tide_state');
    if (!raw) return;
    const s = JSON.parse(raw);
    state.activeSession = s.activeSession || null;
    state.drinks = s.drinks || [];
    state.dismissedQuotes = s.dismissedQuotes || [];
  } catch {}
}

// ---------------------------------------------------------------------------
// Data load
// ---------------------------------------------------------------------------
async function loadActiveSession() {
  // Server source of truth: last indulge session with no ended_at.
  try {
    const sessions = await sbFetch('/tide_indulge_sessions?ended_at=is.null&order=started_at.desc&limit=1');
    if (sessions && sessions.length) {
      state.activeSession = sessions[0];
      const entries = await sbFetch(
        `/tide_indulge_entries?session_id=eq.${sessions[0].id}&kind=eq.alcohol&order=entry_at.asc`
      );
      // Preserve drink_at alias on alcohol rows so computePace/computeBAC and the v1
      // renderers keep working without per-call mapping.
      state.drinks = (entries || []).map(d => ({ ...d, drink_at: d.entry_at }));
    } else {
      state.activeSession = null;
      state.drinks = [];
    }
    saveLocal();
  } catch (e) {
    console.warn('loadActiveSession failed, using local:', e.message);
    loadLocal();
  }
}

async function loadTodayIntake() {
  try {
    const rows = await sbFetch(`/tide_intake_logs?log_date=eq.${todayISO()}&order=logged_at.asc`);
    state.todayIntake = rows || [];
  } catch (e) {
    console.warn('loadTodayIntake failed:', e.message);
    state.todayIntake = [];
  }
}

async function loadSupplements() {
  // v2: load tide_stack_items. Pulls all rows (active + inactive) so the add-form
  // autocomplete can suggest from history.
  try {
    const rows = await sbFetch('/tide_stack_items?order=position.asc,created_at.asc');
    state.allStackItems = rows || [];
    state.stackItems = state.allStackItems.filter(s => s.active !== false);
    state.supplements = state.stackItems; // keep v1 alias for any legacy reader
  } catch (e) {
    console.warn('loadStackItems failed:', e.message);
    state.allStackItems = [];
    state.stackItems = [];
    state.supplements = [];
  }
}

// Pull last 60 days of stack check-offs so we can compute streaks client-side.
async function loadStackLogs() {
  try {
    const since = addDays(todayISO(), -60);
    const rows = await sbFetch(`/tide_stack_logs?log_date=gte.${since}&order=taken_at.desc`);
    state.stackLogs = rows || [];
  } catch (e) {
    console.warn('loadStackLogs failed:', e.message);
    state.stackLogs = [];
  }
}

async function toggleStackItem(itemId) {
  const today = todayISO();
  const existing = (state.stackLogs || []).find(l => l.stack_item_id === itemId && l.log_date === today);
  if (existing) {
    await sbFetch(`/tide_stack_logs?id=eq.${existing.id}`, { method: 'DELETE' });
    state.stackLogs = state.stackLogs.filter(l => l.id !== existing.id);
  } else {
    const row = { stack_item_id: itemId, taken_at: new Date().toISOString(), log_date: today };
    const result = await sbFetch('/tide_stack_logs', { method: 'POST', body: JSON.stringify(row) });
    if (result && result[0]) state.stackLogs.unshift(result[0]);
  }
  render();
}

async function logAsNeeded(itemId) {
  const row = { stack_item_id: itemId, taken_at: new Date().toISOString(), log_date: todayISO() };
  const result = await sbFetch('/tide_stack_logs', { method: 'POST', body: JSON.stringify(row) });
  if (result && result[0]) state.stackLogs.unshift(result[0]);
  toast('Logged');
  render();
}

// Today's alcohol entries (any session, ended or not) for the Fuel energy ring.
// The active session's drinks already live in state.drinks; this catches
// earlier ended-session drinks so the ring is right on a fresh app open.
async function loadTodayAlcohol() {
  try {
    const rows = await sbFetch(
      `/tide_indulge_entries?kind=eq.alcohol&log_date=eq.${todayISO()}&order=entry_at.asc`
    );
    state.todayAlcohol = rows || [];
  } catch (e) {
    console.warn('loadTodayAlcohol failed:', e.message);
    state.todayAlcohol = [];
  }
}

// User-defined caffeine tiles (in addition to the fixed Coffee/Espresso/Tea).
async function loadCaffeinePresets() {
  try {
    const rows = await sbFetch('/tide_caffeine_presets?order=position.asc,created_at.asc');
    state.caffeinePresets = rows || [];
  } catch (e) {
    console.warn('loadCaffeinePresets failed:', e.message);
    state.caffeinePresets = [];
  }
}

// Save a custom caffeine entry as a reusable tile. Deduped case-insensitively
// by label+mg so logging the same custom drink twice doesn't pile up tiles.
async function saveCaffeinePreset(label, mg) {
  const name = (label || '').trim();
  if (!name || !mg) return;
  const dup = (state.caffeinePresets || []).some(
    p => p.label.trim().toLowerCase() === name.toLowerCase() && Number(p.mg) === Number(mg)
  );
  if (dup) return;
  try {
    const pos = (state.caffeinePresets || []).length;
    const result = await sbFetch('/tide_caffeine_presets', {
      method: 'POST',
      body: JSON.stringify({ label: name, mg, position: pos }),
    });
    if (result && result[0]) state.caffeinePresets = (state.caffeinePresets || []).concat(result[0]);
  } catch (e) {
    console.warn('saveCaffeinePreset failed:', e.message);
  }
}

function confirmDeleteCaffeinePreset(id, label, onCancel) {
  showModal(`
    <h2>Remove tile?</h2>
    <p class="small muted">"${escapeHtml(label)}" will no longer appear as a quick tile. Past logs are unaffected.</p>
    <div class="btn-row">
      <button class="btn btn-soft" data-close>Keep</button>
      <button class="btn btn-warm" id="caff-preset-del">Remove</button>
    </div>
  `, () => {
    let removed = false;
    $('#caff-preset-del').onclick = async () => {
      removed = true;
      try {
        await sbFetch(`/tide_caffeine_presets?id=eq.${id}`, { method: 'DELETE' });
        state.caffeinePresets = (state.caffeinePresets || []).filter(p => p.id !== id);
      } catch (e) {
        toast('Could not remove: ' + e.message);
      }
      closeModal();
      render();
    };
    // Restore the tile's pressed style if they back out.
    const obs = () => { if (!removed && typeof onCancel === 'function') onCancel(); };
    $('[data-close]')?.addEventListener('click', obs, { once: true });
  });
}

async function loadHistory() {
  try {
    // Pull last 30 indulge sessions with alcohol entry counts (two queries; simple is fine).
    const sessions = await sbFetch('/tide_indulge_sessions?order=started_at.desc&limit=30');
    if (!sessions) { state.history = []; return; }
    const ids = sessions.map(s => s.id);
    let entries = [];
    if (ids.length) {
      entries = await sbFetch(`/tide_indulge_entries?session_id=in.(${ids.join(',')})&kind=eq.alcohol&select=session_id,standard_units`) || [];
    }
    const counts = {};
    const units = {};
    entries.forEach(e => {
      counts[e.session_id] = (counts[e.session_id] || 0) + 1;
      units[e.session_id]  = (units[e.session_id]  || 0) + (Number(e.standard_units) || 0);
    });

    // Fetch existing morning reflections to know what's already done.
    const refls = await sbFetch(`/tide_reflections?session_id=in.(${ids.join(',')})&select=session_id`) || [];
    const reflected = new Set(refls.map(r => r.session_id));

    state.history = sessions
      .filter(s => s.ended_at)
      .map(s => {
        const sessionDate = new Date(s.started_at);
        const hoursAgo = (Date.now() - sessionDate.getTime()) / 3600000;
        const morningWindow = hoursAgo >= 6 && hoursAgo <= 36 && !reflected.has(s.id);
        return {
          ...s,
          drink_count: counts[s.id] || 0,
          unit_total:  units[s.id]  || 0,
          morning_pending: morningWindow,
        };
      });
  } catch (e) {
    console.warn('loadHistory failed:', e.message);
    state.history = [];
  }
}

// ---------------------------------------------------------------------------
// Boot
// ---------------------------------------------------------------------------
// All per-logical-day data. Reused by boot and by the day-rollover handler so
// every "Today" surface (Train/Fuel/Sip/Indulge/Stack) reflects the current
// logical day (5am boundary), not whatever day the app was last loaded on.
async function loadDayData() {
  // Trim: calorie + weight only. Food intake + food library + body metrics.
  await Promise.all([loadTodayIntake(), loadFoodLibrary(), loadBodyMetrics()]);
  state.loadedDay = todayISO();
}

// If the logical day has rolled over since data was last loaded (the app was
// left open / backgrounded across 5am), refresh everything and re-render so
// the active tabs reset. Guarded against concurrent runs.
let _rolloverInFlight = false;
async function maybeRollover() {
  if (_rolloverInFlight || !hasSession()) return;
  if (todayISO() === state.loadedDay) return;
  _rolloverInFlight = true;
  try {
    await loadDayData();
    render();
  } finally {
    _rolloverInFlight = false;
  }
}

document.addEventListener('visibilitychange', () => { if (!document.hidden) maybeRollover(); });
window.addEventListener('focus', maybeRollover);
// Also catch the boundary while the app stays foregrounded (e.g. up at 5am).
setInterval(maybeRollover, 60000);

async function boot() {
  if (!hasSession()) { showOtpGate(); return; }
  document.getElementById('otp-gate').style.display = 'none';
  loadLocal();
  trayLoad();
  // Trim opens on the Fuel (calorie) tab. Weight + Profile via the bottom nav.
  state.tab = 'food';
  state.screen = 'home';
  // Deep-link: ?tab=food|body opens that surface directly.
  const deepTab = new URLSearchParams(window.location.search).get('tab');
  if (deepTab === 'body') { state.screen = 'body'; }
  render();
  // Profile sync — non-blocking, kicked off early so loadDayData can read the
  // latest goal/weight values from localStorage after it lands.
  await syncProfileOnBoot().catch(() => {});
  syncReuseOnBoot().catch(() => {});
  await loadDayData();
  render();
  flushOutbox().catch(() => {});
}

// Service worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js', { updateViaCache: 'none' }).then(reg => reg.update()).catch(() => {});
  navigator.serviceWorker.addEventListener('controllerchange', () => location.reload());
}

window.openLogDrink = openLogDrink;

boot();
</script>
