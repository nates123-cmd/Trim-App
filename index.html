async function upsertBodyMetric(patch) {
  // Use today's date if not specified. Find existing row for that date, PATCH if present, else POST.
  const date = patch.date || todayISO();
  const existing = (state.bodyMetrics || []).find(r => r.date === date);
  try {
    if (existing) {
      const result = await sbFetch(`/tide_body_metrics?id=eq.${existing.id}`, {
        method: 'PATCH', body: JSON.stringify(patch),
      });
      if (result && result[0]) {
        state.bodyMetrics = state.bodyMetrics.map(r => r.id === existing.id ? result[0] : r);
      }
    } else {
      const result = await sbFetch('/tide_body_metrics', {
        method: 'POST', body: JSON.stringify({ date, ...patch }),
      });
      if (result && result[0]) {
        state.bodyMetrics = [result[0]].concat(state.bodyMetrics);
        state.bodyMetrics.sort((a, b) => (b.date || '').localeCompare(a.date || ''));
      }
    }
  } catch (e) {
    toast('Could not save: ' + e.message);
    throw e;
  }
}

// Progress sub-screen (v2 chunk 9) — per-lift sparklines of working weight
// ---------------------------------------------------------------------------

const PROG_FILTERS = [
  { id: 'all',  label: 'All'   },
  { id: 'Push', label: 'Push'  },
  { id: 'Pull', label: 'Pull'  },
  { id: 'Legs', label: 'Legs'  },
  { id: 'Core', label: 'Core'  },
];

// Map an exercise name to its split using the seed library; default 'Other'.
function exerciseGroup(name) {
  const match = EXERCISE_LIBRARY.find(x => x.name.toLowerCase() === (name || '').toLowerCase());
  return match ? match.group : 'Other';
}

// Pull all strength sets (last 6 months) + the activities they belong to so we
// can group sets by activity_id and order by activity date.
async function loadProgressData() {
  try {
    const since = addDays(todayISO(), -180);
    const sets = await sbFetch(
      `/tide_strength_sessions?logged_at=gte.${since}&order=logged_at.asc&select=*,activity:tide_activities(id,date,template_id)`
    );
    return sets || [];
  } catch (e) {
    console.warn('loadProgressData failed:', e.message);
    return [];
  }
}

// Group sets → exercises → sessions (one entry per activity_id).
// Returns: [{ name, group, sessions: [{date, max_weight, top_reps, any_pr}], current, prev }]
function shapeProgress(sets) {
  const byEx = new Map();
  sets.forEach(s => {
    const ex = (s.exercise || '').trim();
    if (!ex) return;
    if (!byEx.has(ex)) byEx.set(ex, []);
    byEx.get(ex).push(s);
  });
  const out = [];
  for (const [name, list] of byEx.entries()) {
    // Bucket by activity_id, keep the most representative set per activity (max weight).
    const byActivity = new Map();
    list.forEach(s => {
      const aid = s.activity_id;
      if (!byActivity.has(aid)) {
        byActivity.set(aid, {
          activity_id: aid,
          date: s.activity?.date || s.logged_at?.slice(0, 10),
          max_weight: Number(s.weight_lb) || 0,
          top_reps: s.reps || null,
          any_pr: !!s.is_pr,
        });
      } else {
        const entry = byActivity.get(aid);
        const w = Number(s.weight_lb) || 0;
        if (w > entry.max_weight) { entry.max_weight = w; entry.top_reps = s.reps || entry.top_reps; }
        if (s.is_pr) entry.any_pr = true;
      }
    });
    const sessions = [...byActivity.values()].sort((a, b) => (a.date || '').localeCompare(b.date || ''));
    if (!sessions.length) continue;
    out.push({
      name,
      group: exerciseGroup(name),
      sessions,
      current: sessions[sessions.length - 1],
      prev: sessions.length > 1 ? sessions[sessions.length - 2] : null,
    });
  }
  // Order by recency of last session — most active lifts at top.
  out.sort((a, b) => (b.current.date || '').localeCompare(a.current.date || ''));
  return out;
}

// Inline SVG sparkline. width is fluid via viewBox.
function renderSparkline(sessions, width = 280, height = 44, pad = 4) {
  if (!sessions || sessions.length === 0) return '';
  const weights = sessions.map(s => s.max_weight || 0);
  const max = Math.max(...weights);
  const min = Math.min(...weights);
  const range = Math.max(1, max - min);
  const span = sessions.length === 1 ? 1 : sessions.length - 1;
  const x = (i) => pad + ((width - 2 * pad) * (i / span));
  const y = (w) => pad + (height - 2 * pad) * (1 - ((w - min) / range));
  const points = sessions.map((s, i) => [x(i), y(s.max_weight || 0)]);
  if (sessions.length === 1) {
    const cx = width / 2;
    const cy = height / 2;
    return `<svg class="prog-spark" viewBox="0 0 ${width} ${height}" preserveAspectRatio="none"><circle class="prog-spark-dot" cx="${cx}" cy="${cy}" r="3"/></svg>`;
  }
  const linePath = points.map((p, i) => `${i === 0 ? 'M' : 'L'} ${p[0].toFixed(2)} ${p[1].toFixed(2)}`).join(' ');
  const areaPath = `${linePath} L ${points[points.length - 1][0].toFixed(2)} ${height - pad} L ${points[0][0].toFixed(2)} ${height - pad} Z`;
  const dots = points.map((p, i) => {
    const isPr = sessions[i].any_pr;
    const r = isPr ? 3.4 : 2.4;
    return `<circle class="prog-spark-dot ${isPr ? 'pr' : ''}" cx="${p[0].toFixed(2)}" cy="${p[1].toFixed(2)}" r="${r}"/>`;
  }).join('');
  return `
    <svg class="prog-spark" viewBox="0 0 ${width} ${height}" preserveAspectRatio="none">
      <path class="prog-spark-area" d="${areaPath}"/>
      <path class="prog-spark-line" d="${linePath}"/>
      ${dots}
    </svg>
  `;
}

function describeProgress(p) {
  const curr = p.current.max_weight;
  const prev = p.prev?.max_weight;
  const deltaCls = !prev ? 'flat' : (curr > prev ? 'up' : (curr < prev ? 'down' : 'flat'));
  const deltaTxt = !prev
    ? 'first session'
    : (curr === prev
        ? 'flat vs last'
        : `${curr > prev ? '+' : '−'}${Math.abs(curr - prev)} lb vs last`);
  // Plateau detection — last 3+ sessions same weight
  let plateau = 0;
  for (let i = p.sessions.length - 1; i >= 0; i--) {
    if (p.sessions[i].max_weight === curr) plateau++;
    else break;
  }
  const isPlateau = plateau >= 3 && p.sessions.length >= 3;
  const recentPr = p.sessions.slice(-3).some(s => s.any_pr);
  let tag = '';
  if (recentPr) tag = '<span class="prog-tag pr">RECENT PR</span>';
  else if (isPlateau) tag = `<span class="prog-tag plateau">PLATEAU · ${plateau}</span>`;
  return { deltaCls, deltaTxt, tag };
}

    ${items.length === 0 ? `

  $('#prog-back').onclick = () => { state.tab = 'train'; state.screen = 'home'; render(); };
  $('#any-fab').onclick = openLogAny;
  $$('[data-filter]').forEach(c => c.onclick = () => {

    renderProgressScreen();

// ---------------------------------------------------------------------------
// Strength set logger (v2 chunk 8) — log each set's actual reps + weight
// against a tide_activities row. Ghost-fill from last same-template session
// when available; otherwise from template targets in metadata. PR badge when
// the recorded weight beats the all-time max for that exercise.
// ---------------------------------------------------------------------------

async function loadSetsForActivity(activityId) {
  try {
    const rows = await sbFetch(`/tide_strength_sessions?activity_id=eq.${activityId}&order=set_number.asc`);
    return rows || [];
  } catch (e) {
    console.warn('loadSetsForActivity failed:', e.message);
    return [];
  }
}

// Last same-template session's sets for this exercise (for ghost-fill).
async function loadLastSessionSets(exercise, templateId, beforeActivityId) {
  try {
    const params = new URLSearchParams({
      'exercise': `eq.${exercise}`,
      'order': 'logged_at.desc',
      'limit': '50',
    });
    // We need the activity rows first to apply template + before-now filtering.
    const rows = await sbFetch(`/tide_strength_sessions?${params.toString()}&select=*,activity:tide_activities(id,template_id,logged_at)`);
    if (!rows || !rows.length) return { rows: [], when: null };
    // Group sets by activity_id and pick the most recent activity that
    // (a) is not the current one, and (b) matches template_id if provided.
    const byActivity = new Map();
    rows.forEach(r => {
      if (!r.activity) return;
      if (r.activity.id === beforeActivityId) return;
      if (templateId != null && r.activity.template_id !== templateId) return;
      if (!byActivity.has(r.activity.id)) {
        byActivity.set(r.activity.id, { logged_at: r.activity.logged_at, sets: [] });
      }
      byActivity.get(r.activity.id).sets.push(r);
    });
    // If template filter produced nothing, retry without it.
    if (!byActivity.size && templateId != null) {
      return loadLastSessionSets(exercise, null, beforeActivityId);
    }
    if (!byActivity.size) return { rows: [], when: null };
    const sorted = [...byActivity.entries()].sort(
      (a, b) => new Date(b[1].logged_at) - new Date(a[1].logged_at)
    );
    const top = sorted[0][1];
    top.sets.sort((a, b) => a.set_number - b.set_number);
    return { rows: top.sets, when: top.logged_at };
  } catch (e) {
    console.warn('loadLastSessionSets failed:', e.message);
    return { rows: [], when: null };
  }
}

async function maxWeightForExercise(exercise) {
  try {
    const rows = await sbFetch(`/tide_strength_sessions?exercise=eq.${exercise}&weight_lb=not.is.null&order=weight_lb.desc&limit=1&select=weight_lb`);
    return (rows && rows[0] && Number(rows[0].weight_lb)) || 0;
  } catch (e) {
    return 0;
  }
}

async function openSetLoggerModal(activity) {
  const ex = activity.type || 'Exercise';
  const meta = activity.metadata || {};
  let displaySets = meta.sets || 3;            // mutable: bumped by "+ Add set"
  const targetReps = meta.reps || null;
  const targetWeight = meta.weight_lb ?? null;

  // Initial frame with loading state so we paint immediately.
  showModal(`
    <h2>${escapeHtml(ex)}</h2>
    <div id="set-last" class="ex-last">Loading history…</div>
    <div id="set-sheet">
      <div class="muted small" style="padding: 20px 0; text-align: center">Reading sets…</div>
    </div>
    <div class="btn-row" style="margin-top: 8px">
      <button class="btn btn-soft" id="set-edit-meta">Edit details</button>
      <button class="btn" data-close>Done</button>
    </div>
  `, async () => {
    $('#set-edit-meta').onclick = () => { closeModal(); setTimeout(() => openLogActivityModal(activity), 80); };

    // Load existing sets + ghost-fill + PR floor in parallel.
    const [existing, ghost, prFloor] = await Promise.all([
      loadSetsForActivity(activity.id),
      loadLastSessionSets(ex, activity.template_id || null, activity.id),
      maxWeightForExercise(ex),
    ]);

    // Last summary line: "Last · 3 × 8 @ 185 lb, May 10"
    if (ghost.rows.length && ghost.when) {
      const best = ghost.rows.reduce((acc, r) => {
        const w = Number(r.weight_lb) || 0;
        return w > (acc?.weight_lb || 0) ? r : acc;
      }, ghost.rows[0]);
      const date = fmtDate(ghost.when);
      $('#set-last').innerHTML = `<strong>Last</strong> · ${ghost.rows.length} × ${best.reps || '?'} @ ${best.weight_lb ?? '—'} lb, ${escapeHtml(date)}`;
    } else if (targetWeight != null || targetReps != null) {
      $('#set-last').innerHTML = `<strong>Target</strong> · ${targetSets} × ${targetReps || '?'}${targetWeight != null ? ` @ ${targetWeight} lb` : ''}`;
    } else {
      $('#set-last').innerHTML = '<strong>No history</strong> — set the working weight as you go.';
    }

    // Build the working set list. We always show displaySets rows; existing rows
    // override their slot; missing rows ghost-fill from last session or targets.
    const buildRows = () => {
      const list = [];
      const count = Math.max(displaySets, existing.length);
      for (let i = 1; i <= count; i++) {
        const done = existing.find(r => r.set_number === i);
        const ghostRow = ghost.rows[i - 1] || null;
        list.push({
          set_number: i,
          existing: done || null,
          ghostReps: done ? null : (ghostRow?.reps ?? targetReps),
          ghostWeight: done ? null : (ghostRow?.weight_lb ?? targetWeight),
        });
      }
      return list;
    };

    const renderSets = () => {
      const list = buildRows();
      return list.map(r => {
        const done = !!r.existing;
        const reps = done ? r.existing.reps : '';
        const weight = done ? r.existing.weight_lb : '';
        const repsPh = r.ghostReps != null ? String(r.ghostReps) : '';
        const weightPh = r.ghostWeight != null ? String(r.ghostWeight) : '';
        const isPr = done && r.existing.is_pr;
        return `
          <div class="set-row ${done ? 'done' : ''}" data-set-row="${r.set_number}">
            <div class="set-num">${r.set_number}</div>
            <div class="set-cell">
              <input type="number" inputmode="numeric" min="0" max="100" class="set-input" data-field="reps" value="${reps}" placeholder="${escapeHtml(repsPh)}">
              <span class="unit-suffix">reps</span>
            </div>
            <div class="set-cell">
              <input type="number" inputmode="numeric" min="0" class="set-input" data-field="weight" value="${weight}" placeholder="${escapeHtml(weightPh)}">
              <span class="unit-suffix">lb${isPr ? '<span class="pr-badge">PR</span>' : ''}</span>
            </div>
            <div class="set-check" data-set-check="${r.set_number}">${done ? '✓' : ''}</div>
          </div>
        `;
      }).join('') + `
        <button class="add-set more-btn" id="set-add" style="margin-top: 4px">+ Add set</button>
      `;
    };

    const wireSets = () => {
      const m = document.querySelector('.modal');
      m.querySelectorAll('[data-set-check]').forEach(cb => cb.onclick = async () => {
        const setNum = parseInt(cb.dataset.setCheck, 10);
        const row = m.querySelector(`[data-set-row="${setNum}"]`);
        const repsInput = row.querySelector('[data-field="reps"]');
        const weightInput = row.querySelector('[data-field="weight"]');
        // Accept the placeholder ghost value if input is empty
        const reps = parseInt(repsInput.value || repsInput.placeholder, 10);
        const weight_lb = parseFloat(weightInput.value || weightInput.placeholder);
        if (!Number.isFinite(reps) && !Number.isFinite(weight_lb)) {
          toast('Enter reps or weight');
          return;
        }
        const existingRow = existing.find(r => r.set_number === setNum);
        const willBePr = Number.isFinite(weight_lb) && weight_lb > prFloor;
        const payload = {
          activity_id: activity.id,
          exercise: ex,
          set_number: setNum,
          reps: Number.isFinite(reps) ? reps : null,
          weight_lb: Number.isFinite(weight_lb) ? weight_lb : null,
          is_pr: willBePr,
        };
        try {
          if (existingRow) {
            const result = await sbFetch(`/tide_strength_sessions?id=eq.${existingRow.id}`, {
              method: 'PATCH', body: JSON.stringify(payload),
            });
            if (result && result[0]) Object.assign(existingRow, result[0]);
          } else {
            const result = await sbFetch('/tide_strength_sessions', {
              method: 'POST', body: JSON.stringify(payload),
            });
            if (result && result[0]) existing.push(result[0]);
          }
          $('#set-sheet').innerHTML = renderSets();
          wireSets();
        } catch (e) {
          toast('Could not save set: ' + e.message);
        }
      });
      m.querySelector('#set-add').onclick = () => {
        displaySets = Math.max(displaySets, existing.length) + 1;
        $('#set-sheet').innerHTML = renderSets();
        wireSets();
      };
    };

    $('#set-sheet').innerHTML = renderSets();
    wireSets();
  });
}

// Promote today's strength activities into a reusable template. User picks
// the subset to include (all checked by default), names the template, saves.
function openSaveTodayAsTemplateModal() {
  const strength = (state.todayActivities || [])
    .filter(a => a.category === 'strength' && (a.type || '').trim())
    .slice()
    .reverse(); // chronological top-to-bottom
  if (!strength.length) {
    toast('No strength activities to save');
    return;
  }
  // Default-suggest a name from the first activity's source_template name if
  // every activity came from the same template, otherwise leave blank.
  const sources = new Set(strength.map(a => a.metadata?.source_template).filter(Boolean));
  const suggestedName = sources.size === 1 ? [...sources][0] : '';

  // Track which row ids are selected. Default = all.
  const selected = new Set(strength.map(a => a.id));

  const renderRows = () => strength.map(a => {
    const m = a.metadata || {};
    const meta = (m.sets || m.reps || m.weight_lb)
      ? `${m.sets || '?'} × ${m.reps || '?'}${m.weight_lb != null ? ` @ ${m.weight_lb} lb` : ''}`
      : '—';
    const checked = selected.has(a.id);
    return `
      <div class="stack-item ${checked ? 'taken' : ''}" data-sat-id="${a.id}">
        <div class="stack-cb">${checked ? '✓' : ''}</div>
        <div class="stack-item-body">
          <div class="stack-item-name">${escapeHtml(a.type)}</div>
          <div class="stack-item-meta">${escapeHtml(meta)}</div>
        </div>
      </div>
    `;
  }).join('');

  showModal(`
    <h2>Save today as template</h2>
    <p class="small muted" style="margin-bottom: 12px">Pick the exercises to include. Sets/reps/weight are captured as the template's targets.</p>

    <div class="modal-section">
      <div class="label">Template name</div>
      <input id="sat-name" type="text" value="${escapeHtml(suggestedName)}" placeholder="Push Day, Pull A, …">
    </div>

    <div id="sat-list" style="max-height: 40vh; overflow-y: auto; margin-bottom: 14px">
      ${renderRows()}
    </div>

    <div class="btn-row">
      <button class="btn btn-soft" data-close>Cancel</button>
      <button class="btn" id="sat-save">Save (${selected.size})</button>
    </div>
  `, (m) => {
    const refreshBtn = () => {
      const n = selected.size;
      const btn = $('#sat-save');
      btn.textContent = `Save (${n})`;
      btn.disabled = n === 0 || !$('#sat-name').value.trim();
      btn.style.opacity = btn.disabled ? 0.5 : 1;
    };
    const wireRows = () => {
      m.querySelectorAll('[data-sat-id]').forEach(row => row.onclick = () => {
        const id = row.dataset.satId;
        if (selected.has(id)) {
          selected.delete(id);
          row.classList.remove('taken');
          row.querySelector('.stack-cb').textContent = '';
        } else {
          selected.add(id);
          row.classList.add('taken');
          row.querySelector('.stack-cb').textContent = '✓';
        }
        refreshBtn();
      });
    };
    wireRows();
    $('#sat-name').oninput = refreshBtn;
    refreshBtn();

    $('#sat-save').onclick = async () => {
      const name = $('#sat-name').value.trim();
      if (!name || selected.size === 0) return;
      const btn = $('#sat-save');
      btn.disabled = true; btn.textContent = 'Saving…';
      try {
        const created = await createWorkoutTemplate(name);
        if (!created) throw new Error('template create returned no row');
        const items = strength
          .filter(a => selected.has(a.id))
          .map(a => {
            const meta = a.metadata || {};
            return {
              exercise_name: a.type,
              set_count: meta.sets || 3,
              target_reps: meta.reps ?? null,
              target_weight_lb: meta.weight_lb ?? null,
            };
          });
        await addTemplateExercisesBulk(created.id, items);
        await loadRecentTemplateUses();
        closeModal();
        toast(`Saved · ${name}`);
        render();
      } catch (e) {
        toast('Could not save: ' + e.message);
        btn.disabled = false;
        refreshBtn();
      }
    };
  });
}

// Fuel tab (v2 chunk 5) — kcal ring + macros + Claude-estimated meal logging
// ---------------------------------------------------------------------------

// Default macro split, applied to a Mifflin-derived kcal goal when profile is set.
// Cut-friendly: 0.75g protein / lb bodyweight, 25% fat, remainder carbs.
function computeMacroGoals(profile) {
  const kcalGoal = computeDailyCalorieGoal(profile) || DEFAULT_KCAL_GOAL;
  const proteinG = profile && profile.weight_lb ? Math.round(profile.weight_lb * 0.75) : Math.round(kcalGoal * 0.25 / 4);
  const fatG     = Math.round(kcalGoal * 0.25 / 9);
  const carbsG   = Math.max(0, Math.round((kcalGoal - proteinG * 4 - fatG * 9) / 4));
  return { kcal: kcalGoal, protein_g: proteinG, carbs_g: carbsG, fat_g: fatG };
}

function mealMacros(row) {
  const m = (row && row.metadata) || {};
  return {
    kcal: Number(m.kcal) || 0,
    protein_g: Number(m.protein_g) || 0,
    carbs_g: Number(m.carbs_g) || 0,
    fat_g: Number(m.fat_g) || 0,
  };
}

function todayFoodTotals() {
  // Template rows (recipes imported but not eaten today) don't count toward today's intake.
  const rows = (state.todayIntake || []).filter(r => r.category === 'food' && !r.metadata?.template);
  return rows.reduce((acc, r) => {
    const m = mealMacros(r);
    acc.kcal += m.kcal;
    acc.protein_g += m.protein_g;
    acc.carbs_g += m.carbs_g;
    acc.fat_g += m.fat_g;
    return acc;
  }, { kcal: 0, protein_g: 0, carbs_g: 0, fat_g: 0 });
}

// Today's alcohol entries (the "fourth macro" — energy only, not P/C/F).
// Merges the active session's live state.drinks with state.todayAlcohol
// (earlier ended-session drinks loaded at boot), deduped by id, so the count
// is correct whether or not a session is currently active.
function todayAlcoholEntries() {
  const today = todayISO();
  const map = new Map();
  (state.todayAlcohol || []).forEach(e => map.set(e.id, e));
  (state.drinks || []).forEach(e => {
    const d = e.log_date || (e.entry_at || e.drink_at || '').slice(0, 10);
    if (d === today) map.set(e.id, e);
  });
  return [...map.values()].filter(e => !e.kind || e.kind === 'alcohol');
}

function todayAlcoholKcal() {
  return todayAlcoholEntries().reduce((s, e) => s + drinkKcal(e), 0);
}

// Normalize a meal name into a library key — lowercased + collapsed whitespace.
function libraryKey(name) {
  return (name || '').trim().toLowerCase().replace(/\s+/g, ' ');
}

// Build the library (derived from all food intake rows). Returns ordered list of
// { key, name, count, kcal, protein_g, carbs_g, fat_g, last_at, recent_30d }.
function buildFoodLibrary(allFoodRows) {
  const map = new Map();
  const since30 = addDays(todayISO(), -30);
  (allFoodRows || []).forEach(r => {
    if (r.category !== 'food') return;
    const key = libraryKey(r.item_type);
    if (!key) return;
    const m = mealMacros(r);
    if (!map.has(key)) {
      map.set(key, {
        key,
        name: r.item_type,
        count: 0,
        kcal_sum: 0, p_sum: 0, c_sum: 0, f_sum: 0, n_with_macros: 0,
        last_at: r.logged_at,
        recent_30d: false,
      });
    }
    const e = map.get(key);
    e.count += 1;
    if (m.kcal) { e.kcal_sum += m.kcal; e.n_with_macros += 1; }
    e.p_sum += m.protein_g;
    e.c_sum += m.carbs_g;
    e.f_sum += m.fat_g;
    if (r.logged_at > e.last_at) e.last_at = r.logged_at;
    if ((r.log_date || r.logged_at?.slice(0, 10)) >= since30) e.recent_30d = true;
  });
  return [...map.values()].map(e => {
    const n = e.n_with_macros || 1;
    return {
      key: e.key, name: e.name, count: e.count, last_at: e.last_at, recent_30d: e.recent_30d,
      kcal: Math.round(e.kcal_sum / n),
      protein_g: Math.round(e.p_sum / e.count),
      carbs_g:   Math.round(e.c_sum / e.count),
      fat_g:     Math.round(e.f_sum / e.count),
    };
  });
}

// Pull last-90d food rows to seed the library. Cached in state.foodLibraryRows.
async function loadFoodLibrary() {
  try {
    const since = addDays(todayISO(), -90);
    const rows = await sbFetch(`/tide_intake_logs?category=eq.food&log_date=gte.${since}&order=logged_at.desc`);
    state.foodLibraryRows = rows || [];
  } catch (e) {
    console.warn('loadFoodLibrary failed:', e.message);
    state.foodLibraryRows = [];
  }
}

// Generate a per-day "remaining" planning sentence. Cached in localStorage by date+totals.
async function fuelRemainingHint(totals, goal) {
  const left = Math.max(0, goal.kcal - totals.kcal);
  const proteinLeft = Math.max(0, goal.protein_g - totals.protein_g);
  if (left <= 0) {
    return 'You\'re at goal. Tomorrow opens with a clean ring.';
  }
  const ctx = {
    kcal_left: left,
    protein_left: proteinLeft,
    hour: new Date().getHours(),
    logged_meals: (state.todayIntake || []).filter(r => r.category === 'food').length,
  };
  const cacheKey = `tide_fuel_hint_${todayISO()}_${left}_${proteinLeft}`;
  const cached = localStorage.getItem(cacheKey);
  if (cached) return cached;
  const fallback = { text: `~${left} kcal left. Aim for ${proteinLeft}g more protein.` };
  const pj = await callClaudeJSON(
    `Write ONE planning sentence for someone about to plan their next meal. Tight, imperative, single sentence, under 20 words. Use the numbers literally. Return JSON: {"text": "..."}\n\nData: ${JSON.stringify(ctx)}`,
    fallback
  );
  const text = pj.text || fallback.text;
  try { localStorage.setItem(cacheKey, text); } catch {}
  return text;
}

function renderFuelTab() {
  const profile = getProfile();

  const totals = todayFoodTotals();
  const todayMeals = (state.todayIntake || [])
    .filter(r => r.category === 'food' && !r.metadata?.template)
    .sort((a, b) => new Date(a.logged_at) - new Date(b.logged_at));

  const lib = buildFoodLibrary(state.foodLibraryRows || []);

    .filter(e => e.recent_30d)
    .sort((a, b) => (b.count - a.count) || (new Date(b.last_at) - new Date(a.last_at)))

  // Trim: food-only energy. (No alcohol/indulge tracking.)
  const alcEntries = [];
  const alcoholKcal = 0;
  const energyTotal = totals.kcal;

  // Ring math (radius 42 → circumference 263.89) — based on total energy.
  const pct = Math.min(1, energyTotal / Math.max(1, goal.kcal));
  const dashoffset = 263.89 * (1 - pct);
  const kcalLeft = Math.max(0, goal.kcal - energyTotal);

      </div>
    </header>

    <div class="summary-card">
      <div class="ring-wrap">
        <svg viewBox="0 0 100 100">
          <circle cx="50" cy="50" r="42" class="ring-bg" />
          <circle cx="50" cy="50" r="42" class="ring-fill"

        ${renderMacroRow('Carbs',   totals.carbs_g,   goal.carbs_g,   'carbs')}
        ${renderMacroRow('Fat',     totals.fat_g,     goal.fat_g,     'fat')}
      </div>
    </div>

    ${recents.length ? `
      <div class="section-label">Recents</div>
      <div class="recents-row" id="recents-row">
        ${recents.map(e => `
          <div class="recent-chip" data-recent-key="${escapeHtml(e.key)}">
            <span class="recent-chip-name">${escapeHtml(e.name)}</span>
            <span class="recent-chip-dot"></span>
            <span class="recent-chip-kcal">${e.kcal || '—'}</span>
          </div>
        `).join('')}
        <div class="recent-chip lib" id="recent-library">
          <span class="recent-chip-name">All in Library</span>
          <span style="font-size: 14px; line-height: 1; color: var(--muted);">›</span>
        </div>
      </div>
    ` : ''}

    <div class="meal-input-wrap">
      <input type="text" class="meal-input" id="meal-input" placeholder="Log a meal — or describe it" />
      <button class="meal-input-icon" id="meal-input-go" aria-label="Estimate">
        <svg viewBox="0 0 24 24"><path d="M5 12h14M12 5v14"/></svg>
      </button>
    </div>
    <div class="meal-input-hint">Describe what you ate — Claude itemizes it into the tray to review.</div>

    ${(state.tray && state.tray.length) ? `
      <div class="tray-banner" id="tray-banner">
        <span><strong>${state.tray.length}</strong> staged · ${trayTotals().kcal} kcal</span>

    <button class="log-more-btn" id="log-more">＋ More ways to log — quick add · search · barcode</button>

            <div class="meal-kcal-num">${alcoholKcal}</div>
            <div class="meal-kcal-label">kcal</div>
          </div>
        </div>
      ` : ''}

    <div class="remaining-hint">

  $$('.meal:not(.meal-alc)').forEach(row => row.onclick = () => openMealDetail(row.dataset.mealId));

    onDelete: async (id) => {
      await sbFetch(`/tide_intake_logs?id=eq.${id}`, { method: 'DELETE' });
      state.todayIntake = state.todayIntake.filter(x => x.id !== id);
      state.foodLibraryRows = (state.foodLibraryRows || []).filter(x => x.id !== id);
      render();
    },
    // Swipe-right → move this meal to the previous logical day (the common
    // "logged after midnight, belongs to yesterday" case).
    onReschedule: async (id) => {
      const r = (state.todayIntake || []).find(x => x.id === id);
      if (!r) return;
      const curDate = r.log_date || (r.logged_at || '').slice(0, 10);
      const newDate = addDays(curDate, -1);
      const newLoggedAt = new Date(new Date(r.logged_at).getTime() - 86400000).toISOString();
      const patch = { logged_at: newLoggedAt, log_date: newDate };
      const result = await sbFetch(`/tide_intake_logs?id=eq.${id}`, { method: 'PATCH', body: JSON.stringify(patch) });

      render();
    },
  });

  // Async hint refresh (Claude). Don't block initial paint. Uses combined
  // energy (food + alcohol) so the "kcal left" nudge matches the ring.
  fuelRemainingHint({ ...totals, kcal: energyTotal }, goal).then(t => {
    if (state.screen === 'home' && state.tab === 'food') {
      const el = $('#fuel-hint');
      if (el) el.textContent = t;
    }
  });

function renderMacroRow(label, current, target, key) {
  const pct = target ? Math.min(100, (current / target) * 100) : 0;
  return `
    <div class="macro">
      <div class="macro-row">
        <div class="macro-label">${escapeHtml(label)}</div>
        <div class="macro-value">${Math.round(current)} <span class="target">/ ${target} g</span></div>
      </div>
      <div class="macro-bar-track">
        <div class="macro-bar-fill ${key}" style="width: ${pct.toFixed(1)}%"></div>
      </div>
    </div>
  `;
}

function renderMealRow(r) {

async function submitMealDescription(text) {
  if (!text) { openTray(); return; }
  const go = $('#meal-input-go');
  if (go) go.classList.add('loading');
  toast('Reading the plate…');
  const items = await describeToItems(text);
  if (go) go.classList.remove('loading');
  if (!items.length) { toast('Could not parse — try Quick add'); openTray(); return; }
  items.forEach(it => trayAdd({
    input_method: 'describe',
    display_name: it.display_name || it.name || text,
    quantity: it.quantity ?? 1,
    serving_unit: it.serving_unit || 'serving',
    kcal: it.kcal, protein_g: it.protein_g, carbs_g: it.carbs_g ?? it.carb_g, fat_g: it.fat_g,
    fiber_g: it.fiber_g, needs_review: true, confidence: it.confidence,
    source_payload: { describe: text, item: it },
  }));
  const inp = $('#meal-input'); if (inp) inp.value = '';
  openTray();
}

// --- Tray state ---
function trayAdd(draft) {
  const num = (v) => Math.max(0, Math.round(Number(v) || 0));
  const d = {
    tid: 't' + (state._traySeq = (state._traySeq || 0) + 1),
    input_method: draft.input_method || 'quick_add',
    display_name: (draft.display_name || 'Food').toString().slice(0, 80),
    quantity: draft.quantity != null ? Number(draft.quantity) : 1,
    serving_unit: draft.serving_unit || 'serving',
    kcal: num(draft.kcal),
    protein_g: num(draft.protein_g),
    carbs_g: num(draft.carbs_g),
    fat_g: num(draft.fat_g),
    fiber_g: draft.fiber_g != null ? num(draft.fiber_g) : null,
    needs_review: !!draft.needs_review,
    confidence: draft.confidence ?? null,
    source_payload: draft.source_payload ?? null,
  };
  state.tray.push(d);
  trayPersist();
  return d;
}
function trayRemove(tid) { state.tray = (state.tray || []).filter(d => d.tid !== tid); trayPersist(); }
function trayClear() { state.tray = []; trayPersist(); }
// Persist the tray so staged drafts survive a refresh / app switch.
const LS_TRAY = 'trim_tray';
function trayPersist() { try { localStorage.setItem(LS_TRAY, JSON.stringify(state.tray || [])); } catch {} }
function trayLoad() { try { const a = JSON.parse(localStorage.getItem(LS_TRAY) || '[]'); if (Array.isArray(a)) state.tray = a; } catch {} }
function trayTotals() {
  return (state.tray || []).reduce((a, d) => ({
    kcal: a.kcal + d.kcal, protein_g: a.protein_g + d.protein_g,
    carbs_g: a.carbs_g + d.carbs_g, fat_g: a.fat_g + d.fat_g,
  }), { kcal: 0, protein_g: 0, carbs_g: 0, fat_g: 0 });
}
function openTray(returnScreen) {
  state.trayReturn = returnScreen || (state.screen === 'tray' ? state.trayReturn : state.screen) || 'home';
  state.screen = 'tray';
  render();
}

// --- Commit: one tide_intake_logs row per draft ---
async function commitTray() {
  if (!state.tray.length) return;
  const drafts = state.tray.slice();
  const nowIso = new Date().toISOString();
  const rows = drafts.map(d => ({
    category: 'food',
    item_type: d.display_name,
    quantity: d.kcal,
    unit: 'kcal',
    logged_at: nowIso,
    log_date: todayISO(),
    metadata: {
      kcal: d.kcal, protein_g: d.protein_g, carbs_g: d.carbs_g, fat_g: d.fat_g, fiber_g: d.fiber_g,
      source: d.input_method, input_method: d.input_method,
      serving_qty: d.quantity, serving_unit: d.serving_unit,
      source_payload: d.source_payload || undefined,
    },
  }));
  const leave = (msg) => { trayClear(); toast(msg); state.screen = state.trayReturn || 'home'; if (state.screen === 'home') state.tab = 'food'; render(); };
  try {
    const result = await sbFetch('/tide_intake_logs', { method: 'POST', body: JSON.stringify(rows) });
    if (Array.isArray(result)) {
      state.todayIntake = (state.todayIntake || []).concat(result);
      state.foodLibraryRows = result.concat(state.foodLibraryRows || []);
    }
    leave(`Logged ${drafts.length} item${drafts.length === 1 ? '' : 's'}`);
  } catch (e) {
    // Offline / network failure → queue for later, optimistically show today.
    const q = outboxGet(); q.push(rows); outboxSet(q);
    const stamp = Date.now();
    const optimistic = rows.map((row, i) => ({ id: `pending-${stamp}-${i}`, ...row, _pending: true }));
    state.todayIntake = (state.todayIntake || []).concat(optimistic);
    leave(`Saved offline — ${drafts.length} item${drafts.length === 1 ? '' : 's'} will sync`);
  }
}

// --- Offline commit outbox (queues whole draft-batches; flush on reconnect) ---
const LS_OUTBOX = 'trim_food_outbox';
function outboxGet() { try { return JSON.parse(localStorage.getItem(LS_OUTBOX) || '[]'); } catch { return []; } }
function outboxSet(a) { try { localStorage.setItem(LS_OUTBOX, JSON.stringify(a)); } catch {} }
let _flushing = false;
async function flushOutbox() {
  if (_flushing || !hasSession()) return;
  let q = outboxGet();
  if (!q.length || (typeof navigator !== 'undefined' && navigator.onLine === false)) return;
  _flushing = true;
  const remaining = [];
  for (const rows of q) {
    try { await sbFetch('/tide_intake_logs', { method: 'POST', body: JSON.stringify(rows) }); }
    catch (e) { remaining.push(rows); }
  }
  outboxSet(remaining);
  _flushing = false;
  if (remaining.length !== q.length) {
    // Replace optimistic rows with server truth.
    state.todayIntake = (state.todayIntake || []).filter(r => !r._pending);
    await loadTodayIntake().catch(() => {});
    await loadFoodLibrary().catch(() => {});
    toast('Offline meals synced');
    if (state.screen) render();
  }
}
if (typeof window !== 'undefined') window.addEventListener('online', () => flushOutbox());

// --- Personal food DB: cache picked OFF products so they're instant next time ---
const LS_OFFCACHE = 'trim_off_cache';
function cacheOffFood(h) {
  if (!h || h.custom) return;
  try {
    const c = lsGet(LS_OFFCACHE);
    const key = (h.code || h.name || '').toString().toLowerCase();
    if (!key || c.find(x => (x.code || x.name || '').toString().toLowerCase() === key)) return;
    c.unshift({ name: h.name, brand: h.brand, kcal100: h.kcal100, protein100: h.protein100, carb100: h.carb100, fat100: h.fat100, fiber100: h.fiber100 ?? null, serving_grams: h.serving_grams || null, code: h.code || null });
    lsSet(LS_OFFCACHE, c.slice(0, 250));
  } catch {}
}

    kcal: it.kcal, protein_g: it.protein_g, carbs_g: it.carbs_g ?? it.carb_g, fat_g: it.fat_g,
    fiber_g: it.fiber_g, needs_review: true, confidence: it.confidence,
    source_payload: { describe: text, item: it },
  }));
  if (state.screen !== 'tray') openTray();
  else renderTrayScreen();
}

// Returns array of parsed items via the JWT-gated claude proxy. Falls back to [].
async function describeToItems(text) {
  const prompt = `Itemize this meal into individual foods with calorie + macro estimates. Be honest about uncertainty; default to conservative central portions rather than confident-but-high guesses. Return ONLY JSON (no fences): {"items":[{"display_name":"short label 2-5 words","quantity":number,"serving_unit":"g|ml|item label","kcal":int,"protein_g":int,"carbs_g":int,"fat_g":int,"confidence":0..1}]}. One object per distinct food. Meal: "${text}"`;
  try {
    const raw = await callClaude(prompt, {
      system: 'You output ONLY valid JSON, no preamble or code fences. Be terse and grounded.',
      maxTokens: 900,
    });
    const cleaned = raw.replace(/^```json\s*/i, '').replace(/```$/i, '').trim();
    const pj = JSON.parse(cleaned);
    const arr = Array.isArray(pj) ? pj : (pj && Array.isArray(pj.items) ? pj.items : []);
    return arr.filter(x => x && (x.kcal != null || x.display_name));
  } catch (e) { console.warn('describeToItems failed:', e.message); return []; }
}

async function offSearch(term) {
  const box = $('#off-remote') || $('#off-results'); if (!box) return;

    // Via the off-search edge proxy (search-a-licious has no CORS; legacy search.pl 503s).
    const r = await fetch(`${SB_URL}/functions/v1/off-search?q=${encodeURIComponent(term)}`, {

    });

    if (!hits.length) { box.innerHTML = `<p class="muted small" style="padding:12px 0">No web matches. Try Quick add or Describe.</p>`; return; }

function offToFood(p) {
  const n = p.nutriments || {};
  const kcal100 = Math.round(n['energy-kcal_100g'] ?? (n['energy_100g'] ? n['energy_100g'] / 4.184 : NaN));
  if (!Number.isFinite(kcal100)) return null;
  const basis = (p.serving_size && /ml/i.test(p.serving_size)) ? 'per_100ml' : 'per_100g';
  const brand = Array.isArray(p.brands) ? (p.brands[0] || '') : (p.brand || (p.brands ? String(p.brands).split(',')[0] : ''));
  return {
    name: (p.product_name || 'Unknown').slice(0, 80),
    brand,
    basis, kcal100,
    protein100: Math.round(n.proteins_100g || 0),
    carb100: Math.round(n.carbohydrates_100g || 0),
    fat100: Math.round(n.fat_100g || 0),
    fiber100: n.fiber_100g != null ? Math.round(n.fiber_100g) : null,
    serving_grams: parseServingGrams(p.serving_size),
    code: p.code,
  };
}
function parseServingGrams(s) { if (!s) return null; const m = String(s).match(/([\d.]+)\s*(g|ml)/i); return m ? Number(m[1]) : null; }

function openServingPicker(h) {

// Voice dictation helper (progressive enhancement; flaky on iOS PWAs by design)
function wireDictation(btnId, targetId, noteId) {
  const Rec = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!Rec) return;
  let rec = null, on = false;
  const btn = document.getElementById(btnId), note = noteId ? document.getElementById(noteId) : null;
  if (!btn) return;
  btn.onclick = () => {
    if (on && rec) { rec.stop(); return; }
    try {
      rec = new Rec(); rec.lang = 'en-US'; rec.interimResults = true; rec.continuous = false;
      let base = (document.getElementById(targetId).value || '').trim();
      rec.onstart = () => { on = true; btn.textContent = '● Listening — tap to stop'; if (note) note.textContent = ''; };
      rec.onerror = (e) => { if (note) note.textContent = 'Dictation unavailable here — type instead.'; };
      rec.onend = () => { on = false; btn.textContent = '🎙 Dictate'; };
      rec.onresult = (ev) => {
        let txt = '';
        for (let i = 0; i < ev.results.length; i++) txt += ev.results[i][0].transcript;
        document.getElementById(targetId).value = (base ? base + ' ' : '') + txt;
      };
      rec.start();
    } catch (e) { if (note) note.textContent = 'Dictation unavailable here — type instead.'; }
  };
}

// ===== Food logging v2 — phase 2+: capture (barcode/photo/label), reuse =====
// Local persistence (no new tables; per the data-model decision). Cloud sync of
// these is a later add — for a single-user device localStorage is enough.
const LS_CUSTOM = 'trim_custom_foods', LS_RECIPES = 'trim_recipes', LS_MEALS = 'trim_saved_meals';
function lsGet(k) { try { return JSON.parse(localStorage.getItem(k) || '[]'); } catch { return []; } }
function lsSet(k, v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} if (REUSE_KEYS[k]) scheduleReuseSave(); }
// Cloud sync of reuse data (custom foods / recipes / saved meals / OFF cache)
// to the per-user tide_food_reuse table, so it follows the user across devices.
const REUSE_KEYS = { [LS_CUSTOM]: 'custom_foods', [LS_RECIPES]: 'recipes', [LS_MEALS]: 'saved_meals', [LS_OFFCACHE]: 'off_cache' };
let _reuseSaveTimer = null;
function scheduleReuseSave() { if (_reuseSaveTimer) clearTimeout(_reuseSaveTimer); _reuseSaveTimer = setTimeout(() => saveReuseToCloud(), 800); }
async function saveReuseToCloud() {
  if (!hasSession()) return;
  try {
    await sbFetch('/tide_food_reuse?on_conflict=user_id', {
      method: 'POST', headers: { Prefer: 'resolution=merge-duplicates,return=minimal' },
      body: JSON.stringify({ custom_foods: getCustomFoods(), recipes: getRecipes(), saved_meals: getSavedMeals(), off_cache: getOffCache(), updated_at: new Date().toISOString() }),
    });
  } catch (e) { console.warn('reuse cloud save failed:', e.message); }
}
async function syncReuseOnBoot() {
  if (!hasSession()) return;
  try {
    const rows = await sbFetch('/tide_food_reuse?limit=1');
    const c = rows && rows[0];
    if (c) {
      if (Array.isArray(c.custom_foods)) localStorage.setItem(LS_CUSTOM, JSON.stringify(c.custom_foods));
      if (Array.isArray(c.recipes)) localStorage.setItem(LS_RECIPES, JSON.stringify(c.recipes));
      if (Array.isArray(c.saved_meals)) localStorage.setItem(LS_MEALS, JSON.stringify(c.saved_meals));
      if (Array.isArray(c.off_cache)) localStorage.setItem(LS_OFFCACHE, JSON.stringify(c.off_cache));
    } else if (getCustomFoods().length || getRecipes().length || getSavedMeals().length || getOffCache().length) {
      await saveReuseToCloud();
    }
  } catch (e) { console.warn('syncReuseOnBoot failed:', e.message); }
}
function getCustomFoods() { return lsGet(LS_CUSTOM); }
function getRecipes() { return lsGet(LS_RECIPES); }
function getSavedMeals() { return lsGet(LS_MEALS); }

// --- Vision via the JWT-gated claude proxy (image content block) ---
async function callClaudeVision(base64, mediaType, prompt, maxTokens = 1000) {
  if (!hasSession()) throw new Error('Sign in to use AI');
  const mt = /^image\/(jpeg|png|gif|webp)$/.test(mediaType || '') ? mediaType : 'image/jpeg';
  const body = {
    model: CLAUDE_MODEL, max_tokens: maxTokens,
    system: 'You output ONLY valid JSON, no preamble or code fences.',
    messages: [{ role: 'user', content: [
      { type: 'image', source: { type: 'base64', media_type: mt, data: base64 } },
      { type: 'text', text: prompt },
    ] }],
  };
  const r = await fetch(`${SB_URL}/functions/v1/claude`, {
    method: 'POST',
    headers: { apikey: SB_KEY, Authorization: `Bearer ${await sbBearer()}`, 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  if (!r.ok) throw new Error('vision ' + r.status + ': ' + (await r.text()).slice(0, 150));
  const data = await r.json();
  const text = typeof data.text === 'string' ? data.text : (data.content || []).map(c => c.text || '').join('');
  return JSON.parse(text.replace(/^```json\s*/i, '').replace(/```$/i, '').trim());
}
function pickImage(cb) {
  const inp = document.createElement('input');
  inp.type = 'file'; inp.accept = 'image/*'; inp.capture = 'environment';
  inp.onchange = () => { const f = inp.files && inp.files[0]; if (!f) return; const rd = new FileReader(); rd.onload = () => cb(rd.result.split(',')[1], f.type); rd.readAsDataURL(f); };
  inp.click();
}

// 4.3 Barcode scan — BarcodeDetector → zxing fallback (iOS) → manual entry → OFF
function openBarcodeScan() {
  const native = 'BarcodeDetector' in window;
  showModal(`
    <h2>Scan barcode</h2>
    <video id="bc-video" playsinline muted style="width:100%;max-height:230px;border-radius:var(--radius);background:#000;object-fit:cover"></video>
    <p class="small muted" id="bc-note" style="margin-top:8px">Point the camera at the barcode.</p>
    <div class="modal-section"><div class="label">Or type the barcode digits</div>
      <input id="bc-manual" inputmode="numeric" placeholder="e.g., 0123456789012" style="width:100%;padding:12px;border:1px solid var(--border);border-radius:var(--radius);background:var(--card-bg);color:var(--text);font-size:15px"></div>
    <div class="btn-row"><button class="btn btn-soft" id="bc-cancel">Cancel</button><button class="btn" id="bc-lookup">Look up</button></div>
  `, async () => {
    let stream = null, raf = null, zreader = null, done = false;
    const stop = () => { done = true; if (raf) cancelAnimationFrame(raf); try { zreader && zreader.reset && zreader.reset(); } catch {} if (stream) stream.getTracks().forEach(t => t.stop()); };
    const hit = (code) => { if (done) return; stop(); barcodeResolve(code); };
    $('#bc-cancel').onclick = () => { stop(); closeModal(); };
    $('#bc-lookup').onclick = () => { const c = $('#bc-manual').value.trim(); if (c) hit(c); };
    const v = $('#bc-video');
    try {
      stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
      v.srcObject = stream; await v.play();
    } catch (e) { $('#bc-note').textContent = 'Camera unavailable — type the digits or use Label scan.'; return; }
    if (native) {
      try {
        const det = new BarcodeDetector({ formats: ['ean_13', 'ean_8', 'upc_a', 'upc_e', 'code_128'] });
        const tick = async () => { if (done) return; try { const codes = await det.detect(v); if (codes && codes.length) return hit(codes[0].rawValue); } catch {} raf = requestAnimationFrame(tick); };
        raf = requestAnimationFrame(tick); return;
      } catch (e) { /* fall through to zxing */ }
    }
    // zxing fallback (iOS / no BarcodeDetector). Lazy-load; if it fails, manual entry remains.
    try {
      const z = await import('https://esm.sh/@zxing/browser@0.1.5');
      zreader = new z.BrowserMultiFormatReader();
      zreader.decodeFromVideoElement(v, (result) => { if (result) hit(result.getText()); });
    } catch (e) { $('#bc-note').textContent = 'Live scan not supported — type the digits or use Label scan.'; }
  });
}
async function barcodeResolve(code) {
  toast('Looking up…');
  try {
    const r = await fetch(`https://world.openfoodfacts.org/api/v2/product/${encodeURIComponent(code)}.json?fields=product_name,brands,nutriments,serving_size,code`);
    const data = await r.json();
    if (data.status === 1 && data.product) { const h = offToFood(data.product); if (h) { closeModal(); openServingPicker(h); return; } }
    closeModal(); toast('Not in Open Food Facts — try Label scan'); openLabelScan();
  } catch (e) { closeModal(); toast('Lookup failed'); }
}

// Swipe-left-to-delete on a list. Each row must look like:
//   <div class="swipe-row" data-id="...">
//     <div class="swipe-content">...row content...</div>
//     <div class="swipe-action">Delete</div>
//   </div>
// onDelete is async (id) => void. Supports touch + mouse drag.
// Backward-compatible: delete-only (swipe-left). Existing callers unchanged.
function attachSwipeToDelete(rows, onDelete) {
  attachSwipeActions(rows, { onDelete });
}

// Generalized swipe row. Swipe LEFT reveals the right-side `.swipe-action`
// (delete); swipe RIGHT reveals the optional left-side `.swipe-action-left`
// (reschedule). A row only opens in a direction whose handler + element exist.
function attachSwipeActions(rows, { onDelete, onReschedule } = {}) {
  rows.forEach(row => {
    const content    = row.querySelector(':scope > .swipe-content');
    const action     = row.querySelector(':scope > .swipe-action');
    const actionLeft = row.querySelector(':scope > .swipe-action-left');
    if (!content) return;
    const canDelete = !!action && typeof onDelete === 'function';
    const canResched = !!actionLeft && typeof onReschedule === 'function';
    if (!canDelete && !canResched) return;

    let startX = 0, currentX = 0, dragging = false, pointerMoved = false;
    let openSide = null; // 'left' | 'right' | null
    const OPEN_RIGHT = -88;   // delete panel revealed
    const OPEN_LEFT  = 104;   // reschedule panel revealed
    const COMMIT = 44;

    const setX = (x) => {
      const min = canDelete ? -110 : 0;
      const max = canResched ? 120 : 0;
      const clamped = Math.max(min, Math.min(max, x));
      content.style.transform = `translateX(${clamped}px)`;
      currentX = clamped;
    };
    const openRight = () => { content.style.transform = `translateX(${OPEN_RIGHT}px)`; currentX = OPEN_RIGHT; openSide = 'right'; };
    const openLeft  = () => { content.style.transform = `translateX(${OPEN_LEFT}px)`;  currentX = OPEN_LEFT;  openSide = 'left'; };
    const close     = () => { content.style.transform = ''; currentX = 0; openSide = null; };

    const onStart = (clientX) => {
      startX = clientX - currentX;
      dragging = true;
      pointerMoved = false;
      content.classList.add('dragging');
    };
    const onMove = (clientX) => {
      if (!dragging) return;
      const dx = clientX - startX;
      if (Math.abs(dx - currentX) > 3) pointerMoved = true;
      setX(dx);
    };
    const onEnd = () => {
      if (!dragging) return;
      dragging = false;
      content.classList.remove('dragging');
      if (canDelete && currentX < -COMMIT) openRight();
      else if (canResched && currentX > COMMIT) openLeft();
      else close();
    };

    content.addEventListener('touchstart', (e) => onStart(e.touches[0].clientX), { passive: true });
    content.addEventListener('touchmove',  (e) => onMove(e.touches[0].clientX),  { passive: true });
    content.addEventListener('touchend',   onEnd);
    content.addEventListener('touchcancel', onEnd);

    // Mouse drag fallback (desktop testing)
    content.addEventListener('mousedown', (e) => {
      if (e.target.closest('input, textarea, button, select, [contenteditable]')) return;
      onStart(e.clientX);
      const onMouseMove = (ev) => onMove(ev.clientX);
      const onMouseUp = () => {
        onEnd();
        window.removeEventListener('mousemove', onMouseMove);
        window.removeEventListener('mouseup', onMouseUp);
      };
      window.addEventListener('mousemove', onMouseMove);
      window.addEventListener('mouseup', onMouseUp);
    });

    // Intercept click while open OR right after a drag (so tap-to-edit doesn't
    // fire after a swipe).
    content.addEventListener('click', (e) => {
      if (openSide) { e.preventDefault(); e.stopPropagation(); close(); }
      else if (pointerMoved) { e.preventDefault(); e.stopPropagation(); pointerMoved = false; }
    }, { capture: true });

    if (canDelete) action.addEventListener('click', async (e) => {
      e.stopPropagation();
      try { await onDelete(row.dataset.id); }
      catch (err) { toast('Could not delete: ' + err.message); close(); }
    });
    if (canResched) actionLeft.addEventListener('click', async (e) => {
      e.stopPropagation();
      try { await onReschedule(row.dataset.id); }
      catch (err) { toast('Could not move: ' + err.message); close(); }
    });
  });
}

// Helpers for the <input type="datetime-local"> control (browser expects naive local-time strings).
function isoToLocalDatetimeInput(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  const pad = n => String(n).padStart(2, '0');
  return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
}
function localDatetimeInputToIso(s) {
  if (!s) return null;
  return new Date(s).toISOString();
}

// ---------------------------------------------------------------------------
// Library screen (v2 chunk 5) — search + filter + sort + grouped meal list
// ---------------------------------------------------------------------------
const LIB_FILTERS = ['all', 'meals', 'snacks', 'drinks', 'high_protein'];
const LIB_SORTS = [
  { id: 'most',   label: 'Most logged'    },
  { id: 'recent', label: 'Recently logged'},
  { id: 'name',   label: 'A–Z'            },
  { id: 'kcal',   label: 'Highest kcal'   },
];

function libFilterPredicate(filterId) {
  if (filterId === 'all') return () => true;
  if (filterId === 'meals')   return e => e.kcal >= 300;
  if (filterId === 'snacks')  return e => e.kcal > 0 && e.kcal < 300;
  if (filterId === 'drinks')  return e => /shake|coffee|tea|smoothie|drink|water|juice/i.test(e.name);
  if (filterId === 'high_protein') return e => e.protein_g >= 25;
  return () => true;
}

function libSortFn(sortId) {
  if (sortId === 'most')   return (a, b) => b.count - a.count;
  if (sortId === 'recent') return (a, b) => new Date(b.last_at) - new Date(a.last_at);
  if (sortId === 'name')   return (a, b) => a.name.localeCompare(b.name);
  if (sortId === 'kcal')   return (a, b) => b.kcal - a.kcal;
  return () => 0;
}

function renderLibraryScreen() {
  const q = (state.libQuery || '').trim().toLowerCase();
  const filter = state.libFilter || 'all';
  const sort   = state.libSort   || 'most';

  const all = buildFoodLibrary(state.foodLibraryRows || []);
  const filtered = all
    .filter(libFilterPredicate(filter))
    .filter(e => !q || e.name.toLowerCase().includes(q))
    .sort(libSortFn(sort));

  // Group by activity. "Most logged" tier = top 5 by count; "Last 30 days" = recent_30d minus above; "Earlier" = rest.
  const mostLogged = filtered.filter(e => e.count >= 3).slice(0, 5);
  const mostIds = new Set(mostLogged.map(e => e.key));
  const recent  = filtered.filter(e => e.recent_30d && !mostIds.has(e.key));
  const recentIds = new Set([...mostIds, ...recent.map(e => e.key)]);
  const earlier = filtered.filter(e => !recentIds.has(e.key));

  const sortLabel = (LIB_SORTS.find(s => s.id === sort) || LIB_SORTS[0]).label;

  $('#app').innerHTML = `
    <header class="tab-head">
      <div>
        <div class="lib-back" id="lib-back">‹ Fuel</div>
        <div class="tab-title">Library</div>
        <div class="tab-sub">${all.length} meals</div>
      </div>
      <div class="head-link" id="lib-add-recipe">+ Recipe</div>
    </header>

    <div class="search-wrap">
      <div class="search-icon"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M16 16l4 4"/></svg></div>
      <input class="search-input" id="lib-search" type="text" placeholder="Search meals" value="${escapeHtml(q)}">
    </div>

    <div class="filter-row" id="lib-filters">
      ${LIB_FILTERS.map(f => `<div class="filter-chip ${f === filter ? 'active' : ''}" data-filter="${f}">${escapeHtml(f === 'high_protein' ? 'High protein' : f[0].toUpperCase() + f.slice(1))}</div>`).join('')}
    </div>

    <div class="sort-row">
      <div class="sort-count">${filtered.length} entries</div>
      <button class="sort-toggle" id="lib-sort">${escapeHtml(sortLabel)} <span class="caret">▾</span></button>
    </div>

    ${filtered.length === 0
      ? `<div class="muted small" style="text-align: center; padding: 30px 0">${q ? 'No matches.' : 'No meals logged yet.'}</div>`
      : `
        ${mostLogged.length ? `<div class="group-label">Most logged</div>${mostLogged.map(renderLibEntry).join('')}` : ''}
        ${recent.length     ? `<div class="group-label">Last 30 days</div>${recent.map(renderLibEntry).join('')}` : ''}
        ${earlier.length    ? `<div class="group-label">Earlier</div>${earlier.map(renderLibEntry).join('')}` : ''}
      `
    }
  `;

  $('#lib-back').onclick = () => { state.screen = 'home'; state.tab = 'food'; render(); };
  $('#lib-add-recipe').onclick = openAddRecipeSheet;
  $('#lib-search').oninput = (e) => { state.libQuery = e.target.value; renderLibraryScreen(); };
  $$('[data-filter]').forEach(c => c.onclick = () => { state.libFilter = c.dataset.filter; renderLibraryScreen(); });
  $('#lib-sort').onclick = () => openLibSortPicker();
  $$('.lib-entry').forEach(row => {
    row.onclick = () => {
      const key = row.dataset.libKey;
      const e = all.find(x => x.key === key);
      if (e) logMealFromLibrary(e);
    };
  });
  $$('.lib-entry-add').forEach(b => b.onclick = (ev) => {
    ev.stopPropagation();
    const key = b.closest('.lib-entry').dataset.libKey;
    const e = all.find(x => x.key === key);
    if (e) logMealFromLibrary(e);
  });
}

function renderLibEntry(e) {
  return `
    <div class="lib-entry" data-lib-key="${escapeHtml(e.key)}">

        </div>
        <div class="lib-entry-macros">${e.protein_g} P · ${e.carbs_g} C · ${e.fat_g} F · ${e.kcal || '—'} kcal</div>

    </div>
  `;
}

// Calls the recipe-proxy edge function to fetch a recipe URL server-side and
// extract its JSON-LD Recipe schema. Returns { recipe, title } or null on miss.
async function fetchRecipeFromUrl(url) {
  const proxyUrl = `${SB_URL}/functions/v1/recipe-proxy?url=${encodeURIComponent(url)}`;
  const r = await fetch(proxyUrl, {
    headers: { apikey: SB_KEY, Authorization: `Bearer ${await sbBearer()}` },
  });
  if (!r.ok) {
    let detail = '';
    try { detail = (await r.json()).error || ''; } catch {}
    throw new Error(`${r.status}${detail ? ' · ' + detail : ''}`);
  }
  return r.json();
}

// Paste ingredients + servings, get per-serving macro estimate, save to library.
// The library entry is stored as a "template" intake_log (metadata.template=true).
// Templates don't count toward today's totals or appear in Today; they only seed
// the library so the user can tap to log a serving when they actually eat one.
function openAddRecipeSheet() {
  showModal(`
    <h2>Add recipe</h2>
    <p class="small muted" style="margin-bottom: 12px">Paste a recipe URL (NYT Cooking, etc.) to auto-fill, or fill the fields by hand. Claude estimates per-serving macros and saves to your library without counting today.</p>

      <div style="display: flex; gap: 8px">
        <input id="rec-url" type="url" inputmode="url" placeholder="https://cooking.nytimes.com/recipes/…" autocomplete="off" style="flex: 1">
        <button class="btn btn-soft" id="rec-fetch" style="width: auto; flex-shrink: 0; padding: 0 14px">Fetch</button>
      </div>
      <p id="rec-fetch-status" class="small muted" style="margin: 6px 0 0; min-height: 14px"></p>
    </div>

    <div class="modal-section">
      <div class="label">Recipe name</div>
      <input id="rec-name" type="text" placeholder="e.g., Sheet-pan salmon &amp; broccoli" autocomplete="off">
    </div>

    <div class="modal-section">
      <div class="label">Servings</div>
      <input id="rec-servings" type="number" inputmode="numeric" min="1" value="4">
    </div>

    <div class="modal-section">
      <div class="label">Ingredients (paste)</div>
      <textarea id="rec-text" rows="8" placeholder="Paste the ingredients list. Quantities matter — '1 lb salmon' lands better than 'salmon'."></textarea>
    </div>

    <div class="btn-row">
      <button class="btn btn-soft" data-close>Cancel</button>
      <button class="btn" id="rec-estimate" disabled style="opacity: 0.5">Estimate</button>
    </div>
  `, (m) => {
    const refresh = () => {
      const name = $('#rec-name').value.trim();
      const text = $('#rec-text').value.trim();
      const servings = parseInt($('#rec-servings').value, 10);
      const ok = name && text && servings && servings > 0;
      $('#rec-estimate').disabled = !ok;
      $('#rec-estimate').style.opacity = ok ? 1 : 0.5;
    };
    $('#rec-name').oninput = refresh;
    $('#rec-text').oninput = refresh;
    $('#rec-servings').oninput = refresh;

    $('#rec-fetch').onclick = async () => {
      const url = $('#rec-url').value.trim();
      if (!url) { toast('Paste a URL first'); return; }
      const btn = $('#rec-fetch');
      const status = $('#rec-fetch-status');
      btn.disabled = true; btn.textContent = 'Fetching…';
      status.textContent = '';
      try {
        const data = await fetchRecipeFromUrl(url);
        if (!data || !data.recipe) {
          status.textContent = data?.title
            ? `No structured recipe data found. Paste the ingredients by hand below.`
            : 'No recipe data returned. Paste the ingredients by hand.';
          if (data?.title && !$('#rec-name').value.trim()) $('#rec-name').value = data.title;
          return;
        }
        const r = data.recipe;
        if (r.name) $('#rec-name').value = r.name;
        if (r.servings && r.servings > 0) $('#rec-servings').value = String(r.servings);
        if (Array.isArray(r.ingredients) && r.ingredients.length) {
          $('#rec-text').value = r.ingredients.join('\n');
        }
        const bits = [];
        if (r.servings) bits.push(`${r.servings} servings`);
        if (r.ingredients?.length) bits.push(`${r.ingredients.length} ingredients`);
        if (r.nutrition) bits.push('nutrition included');
        status.textContent = `Pulled · ${bits.join(' · ')}`;
        refresh();
      } catch (e) {
        status.textContent = 'Could not fetch: ' + e.message;
      } finally {
        btn.disabled = false; btn.textContent = 'Fetch';
      }
    };

    $('#rec-estimate').onclick = async () => {
      const name = $('#rec-name').value.trim();
      const servings = parseInt($('#rec-servings').value, 10) || 1;
      const ingredients = $('#rec-text').value.trim();
      const btn = $('#rec-estimate');
      btn.disabled = true; btn.textContent = 'Estimating…';
      try {
        const fallback = { kcal_per_serving: null, protein_g: null, carbs_g: null, fat_g: null, confidence: 'low' };
        const pj = await callClaudeJSON(
          `Estimate the per-serving nutrition for a recipe. The recipe name is "${name}". It makes ${servings} servings. Ingredients:\n${ingredients}\n\nReturn JSON: {"kcal_per_serving": int, "protein_g": int, "carbs_g": int, "fat_g": int, "confidence": "high"|"medium"|"low"}. Be honest if quantities are ambiguous — use "low" confidence and conservative central estimates.`,
          fallback
        );
        const kcal = pj.kcal_per_serving ?? 0;
        const p = pj.protein_g ?? 0;
        const c = pj.carbs_g ?? 0;
        const f = pj.fat_g ?? 0;
        // Save as template intake_log (doesn't count toward today).
        const row = {
          category: 'food',
          item_type: name,
          quantity: kcal,
          unit: 'kcal',
          logged_at: new Date().toISOString(),
          log_date: todayISO(),
          metadata: {
            kcal, protein_g: p, carbs_g: c, fat_g: f,
            source: 'recipe',
            template: true,
            servings_count: servings,
            ingredients_preview: ingredients.slice(0, 600),
            confidence: pj.confidence || 'low',
          },
        };
        const result = await sbFetch('/tide_intake_logs', { method: 'POST', body: JSON.stringify(row) });
        if (result && result[0]) {
          state.foodLibraryRows = [result[0]].concat(state.foodLibraryRows || []);
          // Don't push to state.todayIntake — templates aren't "today" meals.
        }
        closeModal();
        toast(`Saved · ${kcal} kcal/serving`);
        render();
      } catch (e) {
        toast('Could not estimate: ' + e.message);
        btn.disabled = false; btn.textContent = 'Estimate';
      }
    };
  });
}

const SIP_BAR_HOURS = 12;     // 12 buckets, two-hour windows from 6am → 8pm
const SIP_BAR_START_HR = 6;
const SIP_BAR_BUCKET_HR = 1.2; // 12 buckets over 14.4 hours feels about right

function dateSubLabel(d = new Date()) {
  return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' }).replace(/,/g, ' ·');
}

function sipBuckets(rows, valueKey = 'quantity') {
  // 12 buckets starting at 6am, each ~1.2h wide.
  const buckets = new Array(SIP_BAR_HOURS).fill(0);
  const now = new Date();
  const nowHr = now.getHours() + now.getMinutes() / 60;
  const nowBucket = Math.min(SIP_BAR_HOURS - 1, Math.max(0, Math.floor((nowHr - SIP_BAR_START_HR) / SIP_BAR_BUCKET_HR)));
  rows.forEach(r => {
    const d = new Date(r.logged_at);
    const hr = d.getHours() + d.getMinutes() / 60;
    const idx = Math.floor((hr - SIP_BAR_START_HR) / SIP_BAR_BUCKET_HR);
    if (idx >= 0 && idx < SIP_BAR_HOURS) buckets[idx] += (Number(r[valueKey]) || 0);
  });
  return { buckets, nowBucket };
}

function renderSipBars(rows, valueKey, maxSuggested) {
  const { buckets, nowBucket } = sipBuckets(rows, valueKey);
  const max = Math.max(maxSuggested, ...buckets, 1);
  const bars = buckets.map((v, i) => {
    const pct = Math.round((v / max) * 100);
    const cls = i === nowBucket ? 'now' : (v > 0 ? 'filled' : '');
    return `<div class="v2-bar ${cls}" style="height: ${Math.max(pct, v > 0 ? 6 : 6)}%"></div>`;
  }).join('');
  return `
    <div class="bars-row">${bars}</div>
    <div class="bars-time-row">
      <span>6a</span><span></span><span>10a</span><span></span><span>2p</span><span></span><span>6p</span><span></span><span>10p</span>
    </div>
  `;
}

function wireSipAdd(sub) {
  if (sub === 'water') {

      const presetId = t.dataset.caffPresetId;
      const fire = () => { if (!longPressed) logCaffeine(t.dataset.caffId, parseInt(t.dataset.caffMg, 10)); };
      if (presetId) {
        const startLP = () => {
          longPressed = false;
          lp = setTimeout(() => { longPressed = true; t.classList.add('removing'); confirmDeleteCaffeinePreset(presetId, t.dataset.caffId, () => t.classList.remove('removing')); }, 550);
        };
        const cancelLP = () => clearTimeout(lp);
        t.addEventListener('touchstart', startLP, { passive: true });
        t.addEventListener('touchend', cancelLP);
        t.addEventListener('touchmove', cancelLP, { passive: true });
        t.addEventListener('mousedown', startLP);
        t.addEventListener('mouseup', cancelLP);
        t.addEventListener('mouseleave', cancelLP);
      }
      t.onclick = fire;
    });
    $('#caff-custom')?.addEventListener('click', openLogCustomCaffeine);
  }
}

// ---------------------------------------------------------------------------
// Stack tab (v2 chunk 4) — three groups + per-item streak + full-stack streak
// ---------------------------------------------------------------------------
function stackItemStreak(itemId) {
  // Consecutive days, counting back from today (or yesterday if today not logged),
  // where this item has at least one tide_stack_logs row.
  const dates = new Set((state.stackLogs || []).filter(l => l.stack_item_id === itemId).map(l => l.log_date));
  if (!dates.size) return 0;
  const today = todayISO();
  // If today logged → start at today; else start at yesterday
  let cursor = dates.has(today) ? today : addDays(today, -1);
  let streak = 0;
  while (dates.has(cursor)) {
    streak++;
    cursor = addDays(cursor, -1);
  }
  return streak;
}

function fullStackStreak() {
  // Number of consecutive days where every REQUIRED active item has at least one log.
  // Required is opt-in per item — if nothing is marked required, no streak fires.
  // Skip as_needed since they're legacy/hidden in v2.
  const required = (state.stackItems || []).filter(s => s.required && s.schedule !== 'as_needed');
  if (!required.length) return 0;
  const requiredIds = required.map(s => s.id);
  // Group logs by date → Set of stack_item_ids
  const byDate = {};
  (state.stackLogs || []).forEach(l => {
    if (!byDate[l.log_date]) byDate[l.log_date] = new Set();
    byDate[l.log_date].add(l.stack_item_id);
  });
  const hitAll = (date) => requiredIds.every(id => byDate[date] && byDate[date].has(id));
  const today = todayISO();
  let cursor = hitAll(today) ? today : addDays(today, -1);
  let streak = 0;
  while (hitDayExists(cursor) && hitAll(cursor)) {
    streak++;
    cursor = addDays(cursor, -1);
  }
  return streak;
}
function hitDayExists(date) {
  // Safety floor — never count back beyond the load window of stackLogs (60d).
  const earliest = addDays(todayISO(), -60);
  return date >= earliest;
}

function renderStackTab() {
  const items = state.stackItems || [];
  const today = todayISO();
  const takenSet = new Set(
    (state.stackLogs || [])
      .filter(l => l.log_date === today)
      .map(l => l.stack_item_id)
  );

  const morning   = items.filter(s => s.schedule === 'morning');
  const afternoon = items.filter(s => s.schedule === 'afternoon');
  const evening   = items.filter(s => s.schedule === 'evening');
  // as_needed rows still exist in the DB for legacy items; we just don't render them.

  const scheduledItems = [...morning, ...afternoon, ...evening];
  const requiredScheduled = scheduledItems.filter(s => s.required);
  const requiredDone = requiredScheduled.filter(s => takenSet.has(s.id)).length;
  // Fall back to all scheduled when nothing is marked required, so the count
  // is never empty on first run.
  const progressDenom = requiredScheduled.length || scheduledItems.length;
  const progressNum   = requiredScheduled.length
    ? requiredDone
    : scheduledItems.filter(s => takenSet.has(s.id)).length;
  const progressLabel = requiredScheduled.length ? 'Required today' : 'Today';
  const fullStreak = fullStackStreak();
  const morningDone   = morning.filter(s => takenSet.has(s.id)).length;
  const afternoonDone = afternoon.filter(s => takenSet.has(s.id)).length;
  const eveningDone   = evening.filter(s => takenSet.has(s.id)).length;

  $('#app').innerHTML = `
    <header class="tab-head">
      <div>
        <div class="tab-title" data-brand>Stack</div>
        <div class="tab-sub">${escapeHtml(dateSubLabel())}</div>
      </div>
      <div class="head-link" id="stack-manage">Manage</div>
    </header>

    <div class="stack-progress">
      <div class="stack-progress-left">
        <div class="stack-progress-label">${escapeHtml(progressLabel)}</div>
        <div class="stack-progress-num">${progressNum}<span class="stack-progress-num-suffix">/ ${progressDenom}</span></div>
      </div>
      ${fullStreak > 0 ? `
        <div class="stack-streak">
          <div class="stack-streak-num">${fullStreak} day${fullStreak === 1 ? '' : 's'}</div>
          <div class="stack-streak-label">Required streak</div>
        </div>
      ` : ''}
    </div>

    ${renderStackGroup('Morning', morning, takenSet, morningDone, 'morning')}
    ${renderStackGroup('Afternoon', afternoon, takenSet, afternoonDone, 'afternoon')}
    ${renderStackGroup('Evening', evening, takenSet, eveningDone, 'evening')}

    ${items.length === 0 ? `
      <div class="card" style="margin-top: 14px">
        <p class="small" style="margin: 0">No stack items yet. Tap a <strong>+ Add</strong> button below, or open <strong>Manage</strong> in the header.</p>
      </div>
    ` : ''}

    <button class="quick-fab" id="any-fab" aria-label="Log anything">+</button>
  `;

  $('[data-brand]')?.addEventListener('click', () => { state.tab = null; render(); });
  $('#any-fab').onclick = openLogAny;

// Compute weekly stats from history (calendar week starting Sunday)
function renderWeekSummary() {
  const now = new Date();
  const today = new Date(now); today.setHours(0, 0, 0, 0);
  const sunday = new Date(today);
  sunday.setDate(today.getDate() - today.getDay()); // getDay: Sun=0
  const days = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(sunday);
    d.setDate(sunday.getDate() + i);
    days.push(d);
  }
  const isFuture = days.map(d => d > today);
  const dayCounts = days.map((d, i) => {
    if (isFuture[i]) return 0;
    const next = new Date(d); next.setDate(next.getDate() + 1);
    const sessions = state.history.filter(s => {
      const sd = new Date(s.started_at);
      return sd >= d && sd < next;
    });
    return sessions.reduce((sum, s) => sum + (s.drink_count || 0), 0);
  });
  const max = Math.max(1, ...dayCounts);
  const total = dayCounts.reduce((a, b) => a + b, 0);
  const noDrinkDays = dayCounts.filter((c, i) => !isFuture[i] && c === 0).length;

  return `
    <div class="card">
      <h3>This week</h3>
      <div class="week-bar">
        ${dayCounts.map((c, i) => {
          const future = isFuture[i];
          const cls = future ? 'future' : (c === 0 ? 'zero' : '');
          const h = future ? 2 : (c === 0 ? 4 : Math.round(c / max * 70));
          return `
            <div class="bar">
              <div class="bar-fill ${cls}" style="height: ${h}px"></div>
              <div class="bar-label${future ? ' future' : ''}">${'SMTWTFS'[days[i].getDay()]}</div>
            </div>
          `;
        }).join('')}
      </div>
      <div class="row small muted" style="margin-top: 6px">
        <div>${total} ${total === 1 ? 'drink' : 'drinks'} this week</div>
        ${noDrinkDays > 0 ? `<div class="pill pill-good">${noDrinkDays} low/no-drink ${noDrinkDays === 1 ? 'night' : 'nights'}</div>` : ''}
      </div>
    </div>
  `;
}

  $('#profile-save').onclick = () => {
    const age = parseInt($('#age-input').value, 10);

    const goal_weight_lb_raw = parseFloat($('#goal-weight-input').value);

function showModal(innerHtml, afterInsert) {
  closeModal();
  const m = el(`<div class="modal-backdrop"><div class="modal">${innerHtml}</div></div>`);
  document.body.appendChild(m);
  m.addEventListener('click', (e) => { if (e.target === m) closeModal(); });

  m.querySelectorAll('#modal-close, [data-close]').forEach(b => b.onclick = closeModal);
  if (afterInsert) afterInsert(m);
}
function closeModal() { document.querySelectorAll('.modal-backdrop').forEach(m => m.remove()); }

    m.querySelectorAll('[data-type]').forEach(c => c.onclick = () => {
      m.querySelectorAll('[data-type]').forEach(x => x.classList.remove('selected'));

        $('#log-go').disabled = false; $('#log-go').textContent = 'Log drink';
      }
    };

async function logDrink(sel) {
  const row = {
    session_id: state.activeSession.id,
    kind: 'alcohol',
    drink_type: sel.drink_type,
    standard_units: sel.standard_units,
    entry_at: new Date().toISOString(),
    log_date: todayISO(),
  };
  const result = await sbFetch('/tide_indulge_entries', { method: 'POST', body: JSON.stringify(row) });
  // Keep drink_at alias for computePace/computeBAC/renderDrinkList compatibility.
  const r = result[0];
  state.drinks.push({ ...r, drink_at: r.entry_at });
  // Mirror into today's alcohol so the Fuel energy ring stays right even
  // after the session ends (state.drinks gets cleared then).
  if ((r.log_date || (r.entry_at || '').slice(0, 10)) === todayISO()) {
    state.todayAlcohol = (state.todayAlcohol || []).concat(r);
  }
  saveLocal();
  render();
}

async function undoDrink(id) {
  await sbFetch(`/tide_indulge_entries?id=eq.${id}`, { method: 'DELETE' });
  state.drinks = state.drinks.filter(d => d.id !== id);
  state.todayAlcohol = (state.todayAlcohol || []).filter(d => d.id !== id);
  saveLocal();
  render();
}

async function estimateMealKcal(type, note) {
  const prompt = `Estimate total calories for this meal. Reply ONLY as JSON: {"kcal": <integer>}.
Meal type: ${type}
Description: ${note}

Be realistic — a typical portion as described. If multiple items, sum them. Round to nearest 10.`;
  const fallback = { kcal: MEAL_DEFAULTS[type] || 400 };
  const result = await callClaudeJSON(prompt, fallback);
  const k = parseInt(result.kcal, 10);
  return (Number.isFinite(k) && k > 0 && k < 5000) ? k : fallback.kcal;
}

function openLogFood() {
  showModal(`
    <h2>Log a meal</h2>
    <div class="modal-section">
      <div class="label">Type</div>
      <div class="grid-4">
        ${MEAL_TYPES.map(t => `<div class="chip" data-meal="${t}" style="text-transform: capitalize">${t}</div>`).join('')}
      </div>
    </div>
    <div class="modal-section">
      <div class="label">What did you have</div>
      <textarea id="meal-note" rows="2" placeholder="2 eggs, toast, a coffee"></textarea>
    </div>
    <div class="modal-section">
      <div class="label">Calories</div>
      <div class="row" style="gap: 8px">
        <input id="meal-kcal" type="number" inputmode="numeric" min="0" max="5000" placeholder="—" style="flex: 1">
        <button class="nav-btn" id="meal-estimate" disabled style="opacity: 0.5">Estimate</button>
      </div>
      <div class="small muted" style="margin-top: 6px">Pick a meal type for a default; tap Estimate to ask AI based on your note.</div>
    </div>
    <button class="btn" id="meal-go" disabled style="opacity: 0.5">Log</button>
  `, (m) => {
    let type = null;
    const kcalInput = $('#meal-kcal');
    const noteInput = $('#meal-note');
    const estBtn = $('#meal-estimate');

    const refreshEstBtn = () => {
      const ok = !!type && noteInput.value.trim().length >= 3;
      estBtn.disabled = !ok; estBtn.style.opacity = ok ? 1 : 0.5;
    };
    const refreshGoBtn = () => {
      const ok = !!type;
      $('#meal-go').disabled = !ok; $('#meal-go').style.opacity = ok ? 1 : 0.5;
    };

    m.querySelectorAll('[data-meal]').forEach(c => c.onclick = () => {
      m.querySelectorAll('[data-meal]').forEach(x => x.classList.remove('selected'));
      c.classList.add('selected'); type = c.dataset.meal;
      if (!kcalInput.value) kcalInput.value = MEAL_DEFAULTS[type];
      refreshEstBtn(); refreshGoBtn();
    });
    noteInput.oninput = refreshEstBtn;

    estBtn.onclick = async () => {
      const note = noteInput.value.trim();
      if (!type || note.length < 3) return;
      estBtn.disabled = true; estBtn.textContent = '…';
      try {
        const k = await estimateMealKcal(type, note);
        kcalInput.value = k;
        toast('Estimated by AI — edit if needed');
      } catch (e) {
        toast('Estimate failed — using default');
        kcalInput.value = MEAL_DEFAULTS[type];
      } finally {
        estBtn.textContent = 'Estimate';
        refreshEstBtn();
      }
    };

    $('#meal-go').onclick = async () => {
      if (!type) return;
      $('#meal-go').disabled = true; $('#meal-go').textContent = 'Logging…';
      try {
        const kcal = parseInt(kcalInput.value, 10) || MEAL_DEFAULTS[type];
        await logFood(type, noteInput.value.trim() || null, kcal);
        closeModal();
      } catch (e) {
        toast('Could not log: ' + e.message);
        $('#meal-go').disabled = false; $('#meal-go').textContent = 'Log';
      }
    };
  });
}

  const sectionLabel = preselectSchedule ? preselectSchedule.replace('_', ' ') : null;
  // De-duplicated history names for the datalist (most recently used first).

  (state.allStackItems || []).slice().reverse().forEach(s => {
    const key = (s.name || '').trim();

        <div class="chip" data-category="medication">Medication</div>
      </div>
      <div class="grid-2" style="margin-top: 8px">

        <div class="chip selected" data-required-toggle="0">Optional</div>

    <div class="btn-row">
      <button class="btn btn-soft" data-close>Done</button>
