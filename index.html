// Routed through the JWT-gated `claude` edge proxy — the Anthropic key lives
// server-side, never in the browser. Requires a login.
async function callClaude(userPrompt, { system = null, maxTokens = 400 } = {}) {
  if (!hasSession()) throw new Error('Sign in to use Tide AI');
  const body = {
    model: CLAUDE_MODEL,
    max_tokens: maxTokens,
    messages: [{ role: 'user', content: userPrompt }],
  };
  if (system) body.system = system;
  const r = await fetch(`${SB_URL}/functions/v1/claude`, {
    method: 'POST',
    headers: {
      apikey: SB_KEY,
      Authorization: `Bearer ${await sbBearer()}`,
      'Content-Type': 'application/json',
    },
    body: JSON.stringify(body),
  });
  if (!r.ok) {
    const t = await r.text();
    throw new Error(`Claude proxy ${r.status}: ${t.slice(0, 200)}`);
  }
  const data = await r.json();
  if (typeof data.text === 'string') return data.text.trim();
  return (data.content || []).map(c => c.text || '').join('').trim();
}

async function callClaudeJSON(userPrompt, fallback) {
  try {
    const text = await callClaude(userPrompt, {
      system: 'You output ONLY valid JSON, no preamble or code fences. Be terse and grounded.',
    });
    const cleaned = text.replace(/^```json\s*/i, '').replace(/```$/i, '').trim();
    return JSON.parse(cleaned);
  } catch (e) {
    console.warn('Claude JSON failed, using fallback:', e.message);
    return fallback;
  }
}

// ---------------------------------------------------------------------------
// Oura biometric pull. Shares PAT + edge fn with Still (same origin → same localStorage).
// Sleep for night ending on day D is reported as Oura's daily_sleep row with day=D.
// We sync periodically into tide_oura_daily so the Patterns view can join with drinking data.
// ---------------------------------------------------------------------------
const OURA_PROXY_PATH = '/functions/v1/smooth-processor';
const OURA_SYNC_MS = 4 * 60 * 60 * 1000;

function getOuraPat() { return localStorage.getItem('still_oura_pat') || ''; }
function setOuraPat(v) {
  const trimmed = (v || '').trim();
  localStorage.setItem('still_oura_pat', trimmed);
  // Sync to cloud profile so other devices pick it up.
  sbFetch('/tide_profile?on_conflict=id', {
    method: 'POST',
    headers: { Prefer: 'resolution=merge-duplicates,return=minimal' },
    body: JSON.stringify({ id: PROFILE_ID, oura_pat: trimmed || null, updated_at: new Date().toISOString() }),
  }).catch(e => console.warn('PAT cloud sync failed:', e.message));
}

// Pure calendar arithmetic on a YYYY-MM-DD string. Uses UTC-component math so
// the result never shifts by the viewer's local timezone offset.
function addDays(iso, n) {
  const [y, m, d] = iso.split('-').map(Number);
  const t = new Date(Date.UTC(y, m - 1, d));
  t.setUTCDate(t.getUTCDate() + n);
  const pad = x => String(x).padStart(2, '0');
  return `${t.getUTCFullYear()}-${pad(t.getUTCMonth() + 1)}-${pad(t.getUTCDate())}`;
}

async function ouraFetch(path, startDate, endDate) {
  const pat = getOuraPat();
  if (!pat) throw new Error('Oura PAT not set');
  const u = new URL(SB_URL + OURA_PROXY_PATH);
  u.searchParams.set('path', path);
  if (startDate) u.searchParams.set('start_date', startDate);
  if (endDate) u.searchParams.set('end_date', endDate);
  const r = await fetch(u.toString(), { headers: { 'x-oura-pat': pat } });
  if (!r.ok) {
    let detail = '';
    try { detail = (await r.json()).error || ''; } catch {}
    throw new Error('Oura ' + r.status + (detail ? ' — ' + detail : ''));
  }
  return r.json();
}

// Bump when the normalized row shape changes — forces a one-time full
// re-sync so already-stored rows backfill the new fields.
const OURA_SCHEMA_V = '3';

// Build one tide_oura_daily row.
// `dailyRow`   = a `daily_sleep` record (carries the sleep SCORE only).
// `sleepPeriod`= a `sleep` record (carries durations / efficiency / HRV-ms /
//                lowest HR — the `daily_sleep` endpoint does NOT have these,
//                which is why sleep duration never loaded).
function normalizeOuraRow(date, dailyRow, sleepPeriod, readinessRow, activityRow) {
  const totalSec = sleepPeriod?.total_sleep_duration ?? null;
  const remSec   = sleepPeriod?.rem_sleep_duration ?? null;
  const deepSec  = sleepPeriod?.deep_sleep_duration ?? null;
  return {
    date,
    sleep_score:      dailyRow?.score ?? null,
    total_sleep_min:  totalSec != null ? Math.round(totalSec / 60) : null,
    rem_sleep_min:    remSec   != null ? Math.round(remSec   / 60) : null,
    deep_sleep_min:   deepSec  != null ? Math.round(deepSec  / 60) : null,
    // Sleep-period-only metrics. NO readiness-contributor fallback: those are
    // 0–100 balance scores, not real %/ms/bpm — mixing units corrupts the
    // 7-day deltas. Null until Oura finalizes the night's `sleep` doc; the
    // loader then carries the last complete night forward (see loadOuraToday).
    sleep_efficiency: sleepPeriod?.efficiency ?? null,
    hrv_avg:          sleepPeriod?.average_hrv ?? null,
    resting_hr:       sleepPeriod?.lowest_heart_rate ?? null,
    readiness_score:  readinessRow?.score ?? null,
    activity_score:   activityRow?.score ?? null,
    raw: { daily_sleep: dailyRow || null, sleep: sleepPeriod || null, readiness: readinessRow || null, activity: activityRow || null },
    fetched_at: new Date().toISOString(),
  };
}

// Pick the main sleep period for each `day` from the `sleep` endpoint:
// prefer type 'long_sleep', else the record with the most total sleep.
// (Naps / 'rest' periods would otherwise win on days you napped.)
function mainSleepByDate(sleepRes) {
  const by = {};
  (sleepRes?.data || []).forEach(rec => {
    const d = rec.day;
    if (!d) return;
    const cur = by[d];
    if (!cur) { by[d] = rec; return; }
    const score = r => (r.type === 'long_sleep' ? 1e9 : 0) + (Number(r.total_sleep_duration) || 0);
    if (score(rec) > score(cur)) by[d] = rec;
  });
  return by;
}

async function syncOura({ days = 14, force = false } = {}) {
  if (!getOuraPat()) return { ok: false, skipped: 'no_pat' };
  // One-time forced re-sync after the row-shape change (backfills durations/HRV
  // onto rows stored by the old daily_sleep-only code path).
  const schemaStale = localStorage.getItem('tide_oura_schema_v') !== OURA_SCHEMA_V;
  const lastSync = parseInt(localStorage.getItem('tide_oura_last_sync') || '0', 10);
  if (!force && !schemaStale && Date.now() - lastSync < OURA_SYNC_MS) return { ok: true, skipped: 'recent' };
  const endDate = todayISO();
  const startDate = addDays(endDate, -(days - 1));
  try {
    const [dailySleepRes, sleepRes, readinessRes, activityRes] = await Promise.all([
      ouraFetch('daily_sleep', startDate, endDate).catch(() => null),
      ouraFetch('sleep', startDate, endDate).catch(() => null),
      ouraFetch('daily_readiness', startDate, endDate).catch(() => null),
      ouraFetch('daily_activity', startDate, endDate).catch(() => null),
    ]);
    const byDate = (res) => Object.fromEntries((res?.data || []).map(r => [r.day, r]));
    const dailySleepByDate = byDate(dailySleepRes);
    const sleepByDate      = mainSleepByDate(sleepRes);
    const readinessByDate  = byDate(readinessRes);
    const activityByDate   = byDate(activityRes);
    const dates = new Set([
      ...Object.keys(dailySleepByDate),
      ...Object.keys(sleepByDate),
      ...Object.keys(readinessByDate),
      ...Object.keys(activityByDate),
    ]);
    if (!dates.size) {
      localStorage.setItem('tide_oura_last_sync', String(Date.now()));
      localStorage.setItem('tide_oura_schema_v', OURA_SCHEMA_V);
      return { ok: true, count: 0 };
    }
    const rows = [...dates].map(d => normalizeOuraRow(d, dailySleepByDate[d], sleepByDate[d], readinessByDate[d], activityByDate[d]));
    await sbFetch('/tide_oura_daily?on_conflict=date', {
      method: 'POST',
      headers: { Prefer: 'resolution=merge-duplicates,return=minimal' },
      body: JSON.stringify(rows),
    });
    localStorage.setItem('tide_oura_last_sync', String(Date.now()));
    localStorage.setItem('tide_oura_schema_v', OURA_SCHEMA_V);
    return { ok: true, count: rows.length };
  } catch (e) {
    console.warn('Oura sync failed:', e.message);
    return { ok: false, error: e.message };
  }
}

async function loadOuraRange(startDate, endDate) {
  try {
    return await sbFetch(`/tide_oura_daily?date=gte.${startDate}&date=lte.${endDate}&order=date.desc`);
  } catch (e) {
    console.warn('loadOuraRange failed:', e.message);
    return [];
  }
}

// Latest Oura snapshot for the home stat grid. Readiness/activity come from
// the newest row (Oura publishes those early), but Oura finalizes the detailed
// `sleep` doc hours later — so when the newest row has no sleep yet, we carry
// the last COMPLETE night's sleep + HRV forward instead of showing "—".
async function loadOuraToday() {
  if (!getOuraPat()) { state.ouraToday = null; return null; }
  const end = todayISO();
  const start = addDays(end, -4);
  try {
    const rows = await sbFetch(`/tide_oura_daily?date=gte.${start}&date=lte.${end}&order=date.desc&limit=5`);
    if (!rows || !rows.length) { state.ouraToday = null; return null; }
    const base = { ...rows[0] };
    if (base.total_sleep_min == null) {
      const lastSleep = rows.find(r => r.total_sleep_min != null);
      if (lastSleep) {
        base.sleep_score      = lastSleep.sleep_score;
        base.total_sleep_min  = lastSleep.total_sleep_min;
        base.rem_sleep_min    = lastSleep.rem_sleep_min;
        base.deep_sleep_min   = lastSleep.deep_sleep_min;
        base.sleep_efficiency = lastSleep.sleep_efficiency;
        base.hrv_avg          = lastSleep.hrv_avg;
        base.resting_hr       = lastSleep.resting_hr;
        base._sleep_date      = lastSleep.date; // available if a label ever wants it
      }
    }
    state.ouraToday = base;
    return state.ouraToday;
  } catch (e) {
    console.warn('loadOuraToday failed:', e.message);
    state.ouraToday = null;
    return null;
  }
}

// Last 7 Oura rows for trailing-average deltas on the Pulse stat grid.
async function loadOura7d() {
  if (!getOuraPat()) { state.oura7d = []; return []; }
  const end = todayISO();
  const start = addDays(end, -7);
  try {
    const rows = await sbFetch(`/tide_oura_daily?date=gte.${start}&date=lte.${end}&order=date.desc`);
    state.oura7d = rows || [];
    return state.oura7d;
  } catch (e) {
    console.warn('loadOura7d failed:', e.message);
    state.oura7d = [];
    return [];
  }
}

function average(arr) {
  const vals = arr.filter(v => v != null && Number.isFinite(v));
  if (!vals.length) return null;
  return vals.reduce((s, v) => s + v, 0) / vals.length;
}

const PULSE_CACHE_KEY = 'tide_pulse_today';
const PULSE_VERSION = 1;

function getCachedPulse() {
  try {
    const raw = localStorage.getItem(PULSE_CACHE_KEY);
    if (!raw) return null;
    const p = JSON.parse(raw);
    if (p.date !== todayISO() || p.v !== PULSE_VERSION) return null;
    return p;
  } catch { return null; }
}

function setCachedPulse(text) {
  try {
    localStorage.setItem(PULSE_CACHE_KEY, JSON.stringify({
      v: PULSE_VERSION, date: todayISO(), text, generated_at: new Date().toISOString(),
    }));
  } catch {}
}

function hydrationStats(now = new Date()) {
  const target = waterPaceTarget(now);
  const actualMl = (state.todayIntake || [])
    .filter(r => r.category === 'water')
    .reduce((s, r) => s + (Number(r.quantity) || 0), 0);
  const delta = actualMl - target;
  let status;
  if (target === 0) status = 'idle';
  else if (delta > 200) status = 'ahead';
  else if (delta < -300) status = 'behind';
  else status = 'on-pace';
  return { actualMl, target, delta, status, goal: WATER_GOAL_ML };
}

function readinessBand(score) {
  if (score == null) return 'flat';
  if (score >= 80) return 'good';
  if (score >= 65) return 'accent';
  return 'warn';
}

function formatDelta(curr, avg, suffix = '') {
  if (curr == null || avg == null) return '';
  const d = curr - avg;
  if (Math.abs(d) < 1) return `<span class="delta-flat">flat vs 7d</span>`;
  const sign = d > 0 ? '+' : '';
  const cls = d > 0 ? 'delta-up' : 'delta-down';
  return `<span class="${cls}">${sign}${Math.round(d)}${suffix} vs 7d</span>`;
}

function formatSleepDelta(currMin, avgMin) {
  if (currMin == null || avgMin == null) return '';
  const d = currMin - avgMin;
  if (Math.abs(d) < 6) return `<span class="delta-flat">flat vs 7d</span>`;
  const sign = d > 0 ? '+' : '−';
  const cls = d > 0 ? 'delta-up' : 'delta-down';
  const mins = Math.abs(d);
  const lbl = mins >= 60 ? `${Math.floor(mins/60)}h${mins%60 ? ' ' + (mins%60) + 'm' : ''}` : `${mins}m`;
  return `<span class="${cls}">${sign}${lbl} vs 7d</span>`;
}

// Returns one of:
//   { label, target: { screen?, tab?, openLog?, fab? } }
// Highest-priority rule fires first.
function computePulseAction() {
  const o   = state.ouraToday || {};
  const hyd = hydrationStats();
  const readiness = o.readiness_score;
  const now = new Date();
  const hour = now.getHours();
  const dayOfWeek = now.getDay(); // 0 Sun … 6 Sat
  const todayCaff = (state.todayIntake || []).filter(r => r.category === 'caffeine');
  const lastCaff = todayCaff.length ? new Date(todayCaff[todayCaff.length - 1].logged_at) : null;
  const lastCaffHour = lastCaff ? lastCaff.getHours() + lastCaff.getMinutes() / 60 : null;
  const hasActiveSession = !!state.activeSession;
  const recentIndulge = (state.history || []).some(s => {
    const days = (Date.now() - new Date(s.started_at).getTime()) / 86400000;
    return days < 7;
  });
  // Morning stack heuristic: any supplement check-offs logged today
  const tookMorningStack = (state.todayIntake || []).some(r => r.category === 'supplement');
  // Workout logged today (tide_activities doesn't exist yet — placeholder false)
  const workoutLogged = false;

  // 1. Recovery override
  if (readiness != null && readiness < 65) {
    return { label: 'Mark a recovery day', target: { fab: true } };
  }
  // 2. Hydration deficit
  if (hyd.status === 'behind' && hyd.delta < -300) {
    return { label: 'Log a glass', target: { tab: 'water' } };
  }
  // 3. Active session
  if (hasActiveSession) {
    return { label: "Open tonight's session", target: { tab: 'drinks' } };
  }
  // 4. Caffeine late
  if (lastCaffHour != null && lastCaffHour >= 14) {
    return { label: 'Note caffeine time', target: { tab: 'water' } };
  }
  // 5. Indulge intention (Fri/Sat after 4pm, indulge active last 7d)
  if ((dayOfWeek === 5 || dayOfWeek === 6) && hour >= 16 && recentIndulge) {
    return { label: "Set tonight's intention", target: { tab: 'drinks' } };
  }
  // 6. Morning stack unchecked past 10am
  if (hour >= 10 && !tookMorningStack) {
    return { label: 'Mark morning stack', target: { tab: 'supplements' } };
  }
  // 7. Training opportunity (high readiness, no workout logged by 4pm) — placeholder until Train tab
  if (readiness != null && readiness > 80 && hour >= 16 && !workoutLogged) {
    return { label: 'Log workout', target: { fab: true } };
  }
  // 8. Default
  const defaultTab = state.tab || 'water';
  return { label: 'Log what you have had', target: { tab: defaultTab } };
}

async function generatePulse() {
  const o = state.ouraToday || {};
  const hyd = hydrationStats();
  const todayCaff = (state.todayIntake || []).filter(r => r.category === 'caffeine');
  const caffMg = todayCaff.reduce((s, r) => s + (Number(r.quantity) || 0), 0);
  const lastIndulge = (state.history || [])[0] || null;
  const lastDrinkCount = lastIndulge ? (lastIndulge.drink_count || 0) : null;
  const lastFeeling = lastIndulge ? lastIndulge.feeling : null;

  const haveOura = o.readiness_score != null || o.sleep_score != null || o.hrv_avg != null;
  if (!haveOura) {
    const fallback = 'Not enough signal today — log as you go.';
    setCachedPulse(fallback);
    return fallback;
  }

  const ctx = {
    readiness: o.readiness_score,
    sleep_score: o.sleep_score,
    sleep_min: o.total_sleep_min,
    hrv: o.hrv_avg,
    activity_score: o.activity_score,
    hydration_actual_ml: hyd.actualMl,
    hydration_expected_ml: hyd.target,
    caffeine_mg: caffMg,
    last_indulge_drinks: lastDrinkCount,
    last_indulge_feeling: lastFeeling,
  };

  const fallback = { text: 'Solid baseline today. Log as you go.' };
  const pj = await callClaudeJSON(
    `You are writing today's "Pulse" for a body-signal tracking app. ONE sentence, tight, imperative, Course's clipped voice. Wrap ONE load-bearing phrase in <em>…</em> for italic emphasis (a directive or the key observation). No preamble. No emoji. No second sentence. Max 18 words.\n\nData: ${JSON.stringify(ctx)}\n\nReturn JSON: {"text": "..."}`,
    fallback
  );
  const text = pj.text || fallback.text;
  setCachedPulse(text);
  return text;
}

// ---------------------------------------------------------------------------
// Standard drink units (US standard = 14g pure alcohol)
// ---------------------------------------------------------------------------
const DRINK_UNITS = {
  beer:     1.0,   // 12oz @ ~5%
  wine:     1.0,   // 5oz @ ~12%
  spirits:  1.0,   // 1.5oz @ ~40%
  cocktail: 1.4,   // varies; assume slightly stronger
};

const DRINK_LABELS = {
  beer:     'Beer',
  wine:     'Wine',
  spirits:  'Spirits',
  cocktail: 'Cocktail',
};

// kcal per ONE standard unit, by drink type. Awareness-grade estimates —
// consistent with how the app already abstracts real pours into standard
// units. Multiplied by the entry's standard_units. Unknown/alias types fall
// back to ~100 (pure-ethanol floor: 14g × 7 kcal/g).
const DRINK_KCAL = {

  spirits:  100,  // 1.5oz @ ~40% neat / soda — ethanol only
  cocktail: 150,  // per standard unit; logs at 1.4–1.5 → ~210–225 kcal
};

  const per = DRINK_KCAL[entry && entry.drink_type] ?? 100;
  return Math.round(per * (Number(entry && entry.standard_units) || 1));
}

// ---------------------------------------------------------------------------
// Pace logic
// ---------------------------------------------------------------------------
function computePace(drinks) {
  if (drinks.length === 0) return { perHour: 0, status: 'none', minSinceLast: null };
  const now = Date.now();
  const start = new Date(drinks[0].drink_at).getTime();
  const elapsedHr = Math.max((now - start) / 3600000, 0.25); // floor at 15min so we don't divide by tiny numbers
  const total = drinks.reduce((s, d) => s + (Number(d.standard_units) || 1), 0);
  const perHour = total / elapsedHr;
  const last = new Date(drinks[drinks.length - 1].drink_at).getTime();
  const minSinceLast = Math.floor((now - last) / 60000);
  let status = 'good';
  if (perHour >= 2.5) status = 'fast';
  else if (perHour >= 1.5) status = 'moderate';
  else status = 'easy';
  return { perHour, status, minSinceLast, total };
}

// Widmark BAC estimate. Inaccurate by ~20% — for awareness, not legal/medical decisions.
function computeBAC(drinks, profile) {
  if (!profile || drinks.length === 0) return null;
  const { age, gender, weight_lb } = profile;
  const baseR = gender === 'female' ? 0.55 : 0.68;
  const floorR = gender === 'female' ? 0.45 : 0.58;
  const r = Math.max(floorR, baseR - Math.max(0, age - 30) * 0.001);
  const grams = drinks.reduce((s, d) => s + (Number(d.standard_units) || 1) * 14, 0);
  const weightG = weight_lb * 453.592;
  const firstDrink = new Date(drinks[0].drink_at).getTime();
  const hoursElapsed = Math.max(0, (Date.now() - firstDrink) / 3600000);
  const rawBac = (grams / (weightG * r)) * 100;
  const bac = Math.max(0, rawBac - 0.015 * hoursElapsed);
  const soberInHours = bac / 0.015;
  let status = 'safe';
  if (bac >= 0.08) status = 'over';
  else if (bac >= 0.05) status = 'high';
  else if (bac >= 0.02) status = 'moderate';
  return { bac, status, soberInHours };
}

function renderPulseStatGrid() {
  const o   = state.ouraToday || {};
  const avg = sevenDayAverages(state.oura7d || []);
  const hyd = hydrationStats();

  const readiness = o.readiness_score;
  const readinessClass = (() => {
    if (readiness == null) return '';
    if (readiness >= 80) return 'readiness-good';
    if (readiness >= 65) return 'readiness-amber';
    return 'readiness-warn';
  })();

  const readinessDelta = (readiness != null && avg.readiness != null)
    ? deltaSpan(readiness - avg.readiness, '')
    : '<span class="stat-delta flat">—</span>';

  const sleepScore = o.sleep_score;
  const sleepMin = o.total_sleep_min;
  const sleepValueHtml = sleepMin != null
    ? `${Math.floor(sleepMin / 60)}<span class="stat-unit">h</span> ${String(sleepMin % 60).padStart(2, '0')}<span class="stat-unit">m</span>`
    : `<span class="stat-value dim">—</span>`;
  const sleepDelta = (sleepMin != null && avg.sleep_min != null)
    ? sleepDeltaSpan(sleepMin - avg.sleep_min)
    : '<span class="stat-delta flat">—</span>';

  const hrv = o.hrv_avg;
  const hrvValueHtml = hrv != null ? `${hrv}<span class="stat-unit">ms</span>` : `<span class="stat-value dim">—</span>`;
  const hrvDelta = (hrv != null && avg.hrv != null)
    ? deltaSpan(hrv - avg.hrv, '')
    : '<span class="stat-delta flat">—</span>';

  // Hydration cell
  let hydValueHtml, hydDeltaHtml;
  if (hyd.actualMl >= 1000) {
    hydValueHtml = `${(hyd.actualMl / 1000).toFixed(1)}<span class="stat-unit">L</span>`;
  } else {
    hydValueHtml = `${hyd.actualMl}<span class="stat-unit">ml</span>`;
  }
  if (hyd.status === 'behind') {
    hydDeltaHtml = `<span class="stat-delta warn">behind ${Math.abs(hyd.delta)}ml</span>`;
  } else if (hyd.status === 'ahead') {
    hydDeltaHtml = `<span class="stat-delta up">ahead ${hyd.delta}ml</span>`;
  } else if (hyd.status === 'idle') {
    hydDeltaHtml = `<span class="stat-delta flat">starting the day</span>`;
  } else {
    hydDeltaHtml = `<span class="stat-delta flat">on pace</span>`;
  }

  return `
    <div class="stat-grid">
      <div class="stat-cell ${readinessClass}">
        <div class="stat-label">Readiness</div>
        <div class="stat-value">${readiness != null ? readiness : '—'}</div>
        ${readinessDelta}
      </div>
      <div class="stat-cell">
        <div class="stat-label">Sleep${sleepScore != null ? ` <span class="stat-label-score">${sleepScore}</span>` : ''}</div>
        <div class="stat-value">${sleepValueHtml}</div>
        ${sleepDelta}
      </div>
      <div class="stat-cell">
        <div class="stat-label">HRV</div>
        <div class="stat-value">${hrvValueHtml}</div>
        ${hrvDelta}
      </div>
      <div class="stat-cell">
        <div class="stat-label">Hydration</div>
        <div class="stat-value">${hydValueHtml}</div>
        ${hydDeltaHtml}
      </div>
    </div>
  `;
}

function sevenDayAverages(rows) {
  return {
    readiness: average(rows.map(r => r.readiness_score)),
    sleep_min: average(rows.map(r => r.total_sleep_min)),
    hrv:       average(rows.map(r => r.hrv_avg)),
  };
}

function deltaSpan(diff, suffix) {
  if (diff == null || !Number.isFinite(diff)) return '<span class="stat-delta flat">—</span>';
  const rounded = Math.round(diff);
  if (Math.abs(rounded) < 1) return '<span class="stat-delta flat">flat vs avg</span>';
  const sign = rounded > 0 ? '+' : '−';
  const cls = rounded > 0 ? 'up' : 'down';
  return `<span class="stat-delta ${cls}">${sign}${Math.abs(rounded)}${suffix} vs avg</span>`;
}

function sleepDeltaSpan(diffMin) {
  if (diffMin == null || !Number.isFinite(diffMin)) return '<span class="stat-delta flat">—</span>';
  const total = Math.round(Math.abs(diffMin)); // whole minutes — the raw value is a float average
  if (total < 6) return '<span class="stat-delta flat">flat vs avg</span>';
  const sign = diffMin > 0 ? '+' : '−';
  const cls = diffMin > 0 ? 'up' : 'down';
  const lbl = `${Math.floor(total / 60)}:${String(total % 60).padStart(2, '0')}`;
  return `<span class="stat-delta ${cls}">${sign}${lbl} vs avg</span>`;
}

function renderDigestHeadlinePlaceholder() {

// Reflection prompt card — surfaces when a session ended 6-36hr ago has no
// reflection yet. Dashed warm-bg card with × (permanent), Not now (today),
// and Reflect (opens the morning reflection sheet).
// ---------------------------------------------------------------------------
const REFLECT_DISMISS_KEY = 'tide_reflect_dismissed';
const REFLECT_NOTNOW_KEY  = 'tide_reflect_notnow';

function getReflectDismissed() {
  try { return new Set(JSON.parse(localStorage.getItem(REFLECT_DISMISS_KEY) || '[]')); }
  catch { return new Set(); }
}
function addReflectDismiss(id) {
  const set = getReflectDismissed();
  set.add(id);
  localStorage.setItem(REFLECT_DISMISS_KEY, JSON.stringify([...set]));
}

function getReflectNotNow() {
  try {
    const raw = JSON.parse(localStorage.getItem(REFLECT_NOTNOW_KEY) || '{}');
    if (raw.date !== todayISO()) return new Set();
    return new Set(raw.ids || []);
  } catch { return new Set(); }
}
function addReflectNotNow(id) {
  const set = getReflectNotNow();
  set.add(id);
  localStorage.setItem(REFLECT_NOTNOW_KEY, JSON.stringify({ date: todayISO(), ids: [...set] }));
}

function findPendingReflection() {
  if (!state.history || state.activeSession) return null;
  const dismissed = getReflectDismissed();
  const notNow = getReflectNotNow();
  return state.history.find(s =>
    s.morning_pending && !dismissed.has(s.id) && !notNow.has(s.id)
  ) || null;
}

// BAC trend: compare current BAC to what we'd compute 15 minutes ago.
// Returns "trending up" / "trending down" / "holding" / etc.
function computeBacTrend(drinks, profile, currentBac) {
  if (!profile || !drinks.length || currentBac == null) return '';
  // Re-run BAC with all drinks logged in the last 15min REMOVED to model the past state.
  const past = drinks.filter(d => {
    const t = new Date(d.entry_at || d.drink_at).getTime();
    return Date.now() - t > 15 * 60 * 1000;
  });
  if (!past.length) return 'first read';
  const pastBac = computeBAC(past, profile);
  if (!pastBac) return 'first read';
  const delta = currentBac - pastBac.bac;
  if (delta > 0.005) return 'trending up';
  if (delta < -0.005) return 'trending down';
  return 'holding';
}

// Single-select picker for the activity log modal. Shows a category-appropriate
// library plus the user's own past activity types under "Yours". Invokes onPick
// with the chosen library item and closes itself.
function openActivityTypePicker(category, onPick) {
  let library = EXERCISE_LIBRARY;
  if (category === 'cardio')   library = CARDIO_LIBRARY;
  if (category === 'recovery') library = RECOVERY_LIBRARY;

  // User's past types for this category — pulled from today + history (state.todayActivities only for now)
  const seen = new Set();
  const yours = [];
  (state.todayActivities || []).forEach(a => {
    if (a.category !== category) return;
    const key = (a.type || '').trim();
    if (!key) return;
    if (library.some(x => x.name.toLowerCase() === key.toLowerCase())) return;
    if (!seen.has(key.toLowerCase())) {
      seen.add(key.toLowerCase());
      yours.push({ name: key, group: 'Yours', sets: a.metadata?.sets || null, reps: a.metadata?.reps || null });
    }
  });

  const all = [...yours, ...library];
  const groups = {};
  all.forEach(item => {
    if (!groups[item.group]) groups[item.group] = [];
    groups[item.group].push(item);
  });
  const groupOrder = ['Yours', 'Push', 'Pull', 'Legs', 'Core', 'Walking', 'Running', 'Cycling', 'Swimming', 'Rowing', 'Climbing', 'Mobility', 'Conditioning', 'Heat', 'Cold', 'Mind'];
  const orderedGroups = groupOrder.filter(g => groups[g]);

  showModal(`
    <h2>Pick ${escapeHtml(category)}</h2>
    <div class="search-wrap" style="margin-bottom: 12px">
      <div class="search-icon"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M16 16l4 4"/></svg></div>
      <input class="search-input" id="act-pick-search" type="text" placeholder="Filter" autocomplete="off">
    </div>
    <div id="act-pick-list" style="max-height: 50vh; overflow-y: auto; margin-bottom: 14px">
      ${orderedGroups.map(g => `
        <div class="group-label">${escapeHtml(g)}</div>
        ${groups[g].map(item => `
          <div class="stack-item" data-pick-name="${escapeHtml(item.name)}" data-pick-sets="${item.sets ?? ''}" data-pick-reps="${item.reps ?? ''}">
            <div class="stack-item-body">
              <div class="stack-item-name">${escapeHtml(item.name)}</div>
              ${(item.sets && item.reps) ? `<div class="stack-item-meta">${item.sets} × ${item.reps}</div>` : ''}
            </div>
          </div>
        `).join('')}
      `).join('')}
    </div>
    <div class="btn-row">
      <button class="btn btn-soft" data-close>Cancel</button>
    </div>
  `, (m) => {
    $('#act-pick-search').oninput = (e) => {
      const q = e.target.value.toLowerCase();
      m.querySelectorAll('[data-pick-name]').forEach(row => {
        row.style.display = !q || row.dataset.pickName.toLowerCase().includes(q) ? '' : 'none';
      });
      m.querySelectorAll('.group-label').forEach(h => {
        let next = h.nextElementSibling;
        let anyVisible = false;
        while (next && !next.classList.contains('group-label')) {
          if (next.style.display !== 'none') { anyVisible = true; break; }
          next = next.nextElementSibling;
        }
        h.style.display = anyVisible || !q ? '' : 'none';
      });
    };
    m.querySelectorAll('[data-pick-name]').forEach(row => row.onclick = () => {
      const item = {
        name: row.dataset.pickName,
        sets: row.dataset.pickSets ? parseInt(row.dataset.pickSets, 10) : null,
        reps: row.dataset.pickReps ? parseInt(row.dataset.pickReps, 10) : null,
      };
      closeModal();
      if (onPick) onPick(item);
    });
  });
}

  (state.workoutTemplates || []).forEach(t => (t.exercises || []).forEach(e => {
    const key = (e.exercise_name || '').trim();
    if (!key) return;
    if (EXERCISE_LIBRARY.some(x => x.name === key)) return; // dedupe against seed library

async function startSessionFromTemplate(template) {
  const exercises = template.exercises || [];
  if (!exercises.length) {
    toast(`${template.name} has no exercises — add some in Workouts first`);
    return;
  }
  const nowIso = new Date().toISOString();
  // Sub-second spacing on logged_at so ordering is deterministic in the
  // Today list (newest first → first exercise on top).
  const rows = exercises.map((e, i) => ({
    date: todayISO(),
    type: e.exercise_name,
    category: 'strength',
    source: 'manual',
    template_id: template.id,
    notes: null,
    perceived_effort: null,
    duration_min: null,
    logged_at: new Date(Date.now() + i).toISOString(),
    metadata: {
      sets: e.set_count || null,
      reps: e.target_reps || null,
      weight_lb: e.target_weight_lb ?? null,
      source_template: template.name,
      source_template_id: template.id,
    },
  }));
  try {
    const result = await sbFetch('/tide_activities', {
      method: 'POST',
      body: JSON.stringify(rows),
    });
    if (Array.isArray(result)) {
      // Newest first to match the existing order=logged_at.desc load.
      state.todayActivities = result.slice().reverse().concat(state.todayActivities || []);
      state.templateLastUse = { ...(state.templateLastUse || {}), [template.id]: todayISO() };
    }
    toast(`Started · ${template.name} (${rows.length})`);
  } catch (e) {
    toast('Could not start: ' + e.message);
    return;
  }
  render();
}

function openTemplateEditModal(template) {
  const editing = !!template;
  const fmtTargets = (e) => {
    const sets = e.set_count || 3;
    const reps = e.target_reps;
    const wt = e.target_weight_lb;
    const left = reps ? `${sets} × ${reps}` : `${sets} sets`;
    const right = wt != null ? ` @ ${wt} lb` : '';
    return left + right;
  };

  const renderExercises = () => {
    const t = state.workoutTemplates.find(x => x.id === (template?.id || ''));
    const list = (t?.exercises || []);
    if (!list.length) return '<div class="muted small" style="margin-bottom: 10px">No exercises yet. Tap below to pick some.</div>';
    return list.map(e => `
      <div class="exercise-row" data-ex-edit="${e.id}">
        <div class="exercise-row-name">${escapeHtml(e.exercise_name)}</div>
        <div class="exercise-row-sets">${escapeHtml(fmtTargets(e))}</div>
        <span class="exercise-row-x" data-ex-remove="${e.id}" role="button" aria-label="Remove">×</span>
      </div>
    `).join('');
  };

  showModal(`
    <h2>${editing ? 'Edit template' : 'New template'}</h2>

    <div class="modal-section">
      <div class="label">Name</div>
      <input id="tpl-name" type="text" value="${escapeHtml(template?.name || '')}" placeholder="Push Day, Pull Day, Leg Day…">
    </div>

    ${editing ? `
      <div class="modal-section">
        <div class="label">Exercises</div>
        <div id="tpl-exercises">${renderExercises()}</div>
        <div class="btn-row" style="gap: 8px; margin-top: 10px">
          <button class="btn btn-soft" id="tpl-pick" style="flex: 1">+ Pick from list</button>
          <button class="btn btn-soft" id="tpl-custom" style="flex: 1">+ Custom</button>
        </div>
        <p class="small muted" style="margin-top: 8px; margin-bottom: 0">Tap an exercise row to set reps + weight.</p>
      </div>
    ` : ''}

    <div class="btn-row">
      ${editing ? '<button class="btn btn-warm" id="tpl-delete">Delete</button>' : '<button class="btn btn-soft" data-close>Cancel</button>'}
      <button class="btn" id="tpl-save">${editing ? 'Save' : 'Next: add exercises'}</button>
    </div>
  `, (m) => {
    const refreshList = () => {
      const list = $('#tpl-exercises');
      if (!list) return;
      list.innerHTML = renderExercises();
      wireRows();
    };
    const wireRows = () => {
      m.querySelectorAll('[data-ex-remove]').forEach(b => b.onclick = async (ev) => {
        ev.stopPropagation();
        await removeTemplateExercise(template.id, b.dataset.exRemove);
        refreshList();
      });
      m.querySelectorAll('[data-ex-edit]').forEach(row => row.onclick = () => {
        const ex = state.workoutTemplates.find(t => t.id === template.id)?.exercises.find(e => e.id === row.dataset.exEdit);
        if (ex) openExerciseTargetsModal(ex, refreshList);
      });
    };
    wireRows();

    if (editing) {
      $('#tpl-pick').onclick = () => {
        // Don't fully close — show the picker on top
        openExercisePickerModal(template.id, () => {
          closeModal();
          openTemplateEditModal(state.workoutTemplates.find(t => t.id === template.id));
        });
      };
      $('#tpl-custom').onclick = () => openCustomExerciseModal(template.id, refreshList);
    }

    $('#tpl-save').onclick = async () => {
      const name = $('#tpl-name').value.trim();
      if (!name) { toast('Add a template name'); return; }
      try {
        if (editing) {
          await updateWorkoutTemplate(template.id, { name });
        } else {
          const created = await createWorkoutTemplate(name);
          if (created) {
            closeModal();
            openTemplateEditModal({ ...created, exercises: [] });
            return;
          }
        }
        closeModal();
        render();
      } catch (e) {
        toast('Could not save: ' + e.message);
      }
    };

    if (editing) {
      $('#tpl-delete').onclick = async () => {
        try {
          await deleteWorkoutTemplate(template.id);
          closeModal();
          render();
        } catch (e) {
          toast('Could not delete: ' + e.message);
        }
      };
    }
  });
}

// Multi-select sheet — check exercises from the library + the user's own past
// exercise names, then bulk-add to the template with default sets/reps.
function openExercisePickerModal(templateId, onDone) {
  const template = state.workoutTemplates.find(t => t.id === templateId);
  const alreadyInTemplate = new Set((template?.exercises || []).map(e => (e.exercise_name || '').toLowerCase()));
  const yours = userExerciseHistory();
  const allPool = [...yours, ...EXERCISE_LIBRARY];
  // Group by `group`
  const groups = {};
  allPool.forEach(item => {
    if (!groups[item.group]) groups[item.group] = [];
    groups[item.group].push(item);
  });
  const groupOrder = ['Yours', 'Push', 'Pull', 'Legs', 'Core'];
  const orderedGroups = groupOrder.filter(g => groups[g]);

  const selected = new Set();

  showModal(`
    <h2>Pick exercises</h2>
    <p class="small muted" style="margin-bottom: 12px">Tap to select, then add the batch.</p>
    <div class="search-wrap" style="margin-bottom: 12px">
      <div class="search-icon"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M16 16l4 4"/></svg></div>
      <input class="search-input" id="pick-search" type="text" placeholder="Filter">
    </div>
    <div id="pick-list" style="max-height: 50vh; overflow-y: auto; margin-bottom: 14px">
      ${orderedGroups.map(g => `
        <div class="group-label">${escapeHtml(g)}</div>
        ${groups[g].map(item => {
          const dim = alreadyInTemplate.has(item.name.toLowerCase());
          return `
            <div class="stack-item ${dim ? 'taken' : ''}" data-pick="${escapeHtml(item.name)}" data-sets="${item.sets}" data-reps="${item.reps}">
              <div class="stack-cb"></div>
              <div class="stack-item-body">
                <div class="stack-item-name">${escapeHtml(item.name)}</div>
                <div class="stack-item-meta">${item.sets} × ${item.reps}${dim ? ' · already in template' : ''}</div>
              </div>
              <input type="number" inputmode="numeric" min="0" class="picker-weight" placeholder="lb" style="width: 64px; padding: 8px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); font-family: var(--font-display); font-size: 13px; font-variant-numeric: tabular-nums; text-align: right;${dim ? ' opacity: 0.4; pointer-events: none;' : ''}">
            </div>
          `;
        }).join('')}
      `).join('')}
    </div>
    <div class="btn-row">
      <button class="btn btn-soft" data-close>Cancel</button>
      <button class="btn" id="pick-add" disabled style="opacity: 0.5">Add (0)</button>
    </div>
  `, (m) => {
    const updateBtn = () => {
      const n = selected.size;
      const btn = $('#pick-add');
      btn.textContent = `Add (${n})`;
      btn.disabled = n === 0;
      btn.style.opacity = n === 0 ? 0.5 : 1;
    };
    // Clicking the weight input shouldn't toggle the row selection.
    m.querySelectorAll('.picker-weight').forEach(input => {
      input.addEventListener('click', e => e.stopPropagation());
      input.addEventListener('input', () => {
        // Typing a weight auto-selects the row (so user can type-and-go).
        const row = input.closest('[data-pick]');
        if (!row || alreadyInTemplate.has(row.dataset.pick.toLowerCase())) return;
        if (input.value && !selected.has(row.dataset.pick)) {
          selected.add(row.dataset.pick);
          row.classList.add('taken');
          row.querySelector('.stack-cb').textContent = '✓';
          updateBtn();
        }
      });
    });
    m.querySelectorAll('[data-pick]').forEach(row => row.onclick = () => {
      const key = row.dataset.pick;
      if (alreadyInTemplate.has(key.toLowerCase())) return; // already in template, skip
      if (selected.has(key)) {
        selected.delete(key);
        row.classList.remove('taken');
        row.querySelector('.stack-cb').textContent = '';
      } else {
        selected.add(key);
        row.classList.add('taken');
        row.querySelector('.stack-cb').textContent = '✓';
      }
      updateBtn();
    });
    $('#pick-search').oninput = (e) => {
      const q = e.target.value.toLowerCase();
      m.querySelectorAll('[data-pick]').forEach(row => {
        row.style.display = !q || row.dataset.pick.toLowerCase().includes(q) ? '' : 'none';
      });
      m.querySelectorAll('.group-label').forEach(h => {
        // Hide group label if all its rows are hidden
        let next = h.nextElementSibling;
        let anyVisible = false;
        while (next && !next.classList.contains('group-label')) {
          if (next.style.display !== 'none') { anyVisible = true; break; }
          next = next.nextElementSibling;
        }
        h.style.display = anyVisible || !q ? '' : 'none';
      });
    };
    $('#pick-add').onclick = async () => {
      const items = [];
      m.querySelectorAll('[data-pick]').forEach(row => {
        if (!selected.has(row.dataset.pick)) return;
        const wtRaw = parseFloat(row.querySelector('.picker-weight')?.value);
        items.push({
          exercise_name: row.dataset.pick,
          set_count: parseInt(row.dataset.sets, 10) || 3,
          target_reps: parseInt(row.dataset.reps, 10) || 8,
          target_weight_lb: Number.isFinite(wtRaw) ? wtRaw : null,
        });
      });
      try {
        await addTemplateExercisesBulk(templateId, items);
        closeModal();
        toast(`Added ${items.length}`);
        if (onDone) onDone();
      } catch (e) {
        toast('Could not add: ' + e.message);
      }
    };
  });
}

const ACTIVITY_CATEGORIES = [
  { id: 'strength', label: 'Strength' },
  { id: 'cardio',   label: 'Cardio'   },
  { id: 'recovery', label: 'Recovery' },
];
const CARDIO_FEELINGS = ['tough', 'fine', 'good', 'great'];

// Icons keyed by category — minimal SVG glyphs.
const ACTIVITY_ICONS = {
  strength: '<path d="M3 12h2m14 0h2M6 12h12M7 9v6M17 9v6"/>',
  cardio:   '<path d="M4 12h4l3-7 4 14 3-7h2"/>',
  recovery: '<path d="M7 14c0-2 1.5-3 1.5-4.5S7 7 7 5"/><path d="M12 14c0-2 1.5-3 1.5-4.5S12 7 12 5"/><path d="M17 14c0-2 1.5-3 1.5-4.5S17 7 17 5"/><path d="M4 18h16"/>',
  oura:     '<path d="M4 12h4l3-7 4 14 3-7h2"/>',
};

async function loadTodayActivities() {
  try {
    const rows = await sbFetch(`/tide_activities?date=eq.${todayISO()}&order=logged_at.desc`);
    state.todayActivities = rows || [];
  } catch (e) {
    console.warn('loadTodayActivities failed:', e.message);
    state.todayActivities = [];
  }
}

function renderTrainTab() {
  const acts = state.todayActivities || [];
  const oura = state.ouraToday || null;
  const tpls = state.workoutTemplates || [];
  const showOuraCard = oura && oura.activity_score != null;
  // Hide quick-start once any strength activity is logged today (per spec, the
  // quick-start row only appears when no session is active).
  const hasStrengthToday = acts.some(a => a.category === 'strength');
  const showQuickStart = !hasStrengthToday && tpls.length > 0;

  const sub = new Date().toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' }).replace(/,/g, ' ·');

  $('#app').innerHTML = `
    <header class="tab-head">
      <div>
        <div class="tab-title" data-brand>Train</div>
        <div class="tab-sub">${escapeHtml(sub)}</div>
      </div>
      <div style="display: flex; gap: 16px; align-self: flex-start; margin-top: 10px; flex-wrap: wrap; justify-content: flex-end;">
        ${hasStrengthToday ? '<div class="head-link" id="train-save-template">Save as template</div>' : ''}
        <div class="head-link" id="train-workouts">Workouts</div>
        <div class="head-link" id="train-progress">Progress</div>
        <div class="head-link" id="train-body">Body</div>
      </div>
    </header>

    ${showQuickStart ? `
      <div class="section-label">Quick start</div>
      <div class="quickstart-row">
        ${tpls.map(t => {
          const lastDate = state.templateLastUse?.[t.id];
          const lastLabel = lastDate ? `Last ${fmtDate(lastDate + 'T12:00:00')}` : 'Not yet done';
          return `
            <div class="quickstart-chip" data-template-start="${t.id}">
              <div class="quickstart-chip-name">${escapeHtml(t.name)}</div>
              <div class="quickstart-chip-meta">${escapeHtml(lastLabel)}</div>
            </div>
          `;
        }).join('')}
        <div class="quickstart-chip empty" id="quickstart-manage">

          <div class="quickstart-chip-meta">+ new workout</div>
        </div>

    ${acts.length === 0 && !showOuraCard && !showQuickStart ? `
      <div class="card" style="margin-bottom: 14px">
        <p class="small" style="margin: 0">Nothing logged today. Tap <strong>Workouts</strong> in the header to create a template, or log a one-off activity below.</p>

    ` : ''}

    ${acts.map(renderActivityCard).join('')}
    ${showOuraCard ? renderOuraActivityCard(oura) : ''}

      <span class="arrow">→</span>

  $('#log-activity-btn').onclick = () => openLogActivityModal();

    await sbFetch(`/tide_activities?id=eq.${id}`, { method: 'DELETE' });

    render();
  });
  $('#train-workouts').onclick = () => { state.screen = 'workouts'; render(); };
  $('#train-progress').onclick = async () => {
    state.screen = 'progress';
    render();

    state.progressItems = shapeProgress(sets);
    if (state.screen === 'progress') renderProgressScreen();
  };
  $('#train-body').onclick = async () => {
    state.screen = 'body';
    render();
    await loadBodyMetrics();
    if (state.screen === 'body') renderBodyScreen();

  $('#train-save-template')?.addEventListener('click', () => openSaveTodayAsTemplateModal());
  $$('[data-template-start]').forEach(c => c.onclick = () => {
    const t = state.workoutTemplates.find(x => x.id === c.dataset.templateStart);

  });
  $('#quickstart-manage')?.addEventListener('click', () => { state.screen = 'workouts'; render(); });
}

function renderActivityCard(a) {
  const cls = a.category === 'recovery' ? 'recovery' : '';
  const m = a.metadata || {};
  const strengthBit = (a.category === 'strength' && (m.sets || m.reps || m.weight_lb))
    ? `${m.sets || '?'} × ${m.reps || '?'}${m.weight_lb != null ? ` @ ${m.weight_lb} lb` : ''}`
    : null;
  const cardioFeel = (a.category === 'cardio' && m.feeling)
    ? `felt ${m.feeling}`
    : null;
  const meta = [
    strengthBit,
    (a.category !== 'strength' && a.duration_min) ? `${a.duration_min} min` : null,
    a.category === 'strength' && a.perceived_effort ? `RPE ${a.perceived_effort}` : null,
    cardioFeel,
    a.notes ? a.notes : null,
  ].filter(Boolean).join(' · ');
  const icon = ACTIVITY_ICONS[a.category] || ACTIVITY_ICONS.cardio;
  const source = (a.source || 'manual').toUpperCase();
  return `
    <div class="swipe-row swipe-activity" data-id="${a.id}">
      <div class="swipe-content">

            ...existing,
            type: item.name,
            category,

              ...(existing?.metadata || {}),
              ...(category === 'strength' ? {
                sets: item.sets ?? existing?.metadata?.sets ?? null,

            },
          };

          openLogActivityModal(draft);
        });

    $('#act-save').onclick = async () => {
      const type = $('#act-type').value.trim() || null;

      const perceived_effort = (category === 'strength' && rpeInput) ? (parseInt(rpeInput.value, 10) || null) : null;

        const sets = parseInt($('#act-sets').value, 10);
        const reps = parseInt($('#act-reps').value, 10);
        const weight_lb = parseFloat($('#act-weight').value);
        metadata = {
          ...(existing?.metadata || {}),
          sets: Number.isFinite(sets) ? sets : null,
          reps: Number.isFinite(reps) ? reps : null,
          weight_lb: Number.isFinite(weight_lb) ? weight_lb : null,
          feeling: null,
        };
      } else if (category === 'cardio') {
        metadata = { ...(existing?.metadata || {}), feeling };
      } else if (category === 'recovery') {
        // Strip cardio-specific fields if we switched to recovery mid-edit.
        const base = { ...(existing?.metadata || {}) };
        delete base.feeling;
        metadata = Object.keys(base).length ? base : null;
      }
      if (!type && !duration_min) { toast('Add a name or duration'); return; }
      const payload = { category, type, duration_min, perceived_effort, notes, metadata };
      const btn = $('#act-save');
      btn.disabled = true; btn.textContent = editing ? 'Saving…' : 'Logging…';
      try {
        if (editing) {
          const result = await sbFetch(`/tide_activities?id=eq.${existing.id}`, { method: 'PATCH', body: JSON.stringify(payload) });
          const updated = result && result[0];
          if (updated) state.todayActivities = state.todayActivities.map(a => a.id === existing.id ? updated : a);
        } else {
          const row = { ...payload, date: todayISO(), source: 'manual', logged_at: new Date().toISOString() };
          const result = await sbFetch('/tide_activities', { method: 'POST', body: JSON.stringify(row) });
          if (result && result[0]) state.todayActivities = [result[0]].concat(state.todayActivities);
        }
        closeModal();
        render();
      } catch (e) {
        toast('Could not save: ' + e.message);
        btn.disabled = false; btn.textContent = editing ? 'Save' : 'Log';
      }
    };

    if (editing) {
      $('#act-delete').onclick = async () => {
        try {
          await sbFetch(`/tide_activities?id=eq.${existing.id}`, { method: 'DELETE' });
          state.todayActivities = state.todayActivities.filter(a => a.id !== existing.id);
          closeModal();
          render();
        } catch (e) {
          toast('Could not delete: ' + e.message);
        }
      };
    }
  });
}

// ---------------------------------------------------------------------------
// Weekly Digest (v2 chunk 11) — magazine-style summary, four acts
// ---------------------------------------------------------------------------

const DIGEST_LENSES = [
  { id: 'drinks_sleep',      label: 'Drinks × Sleep' },
  { id: 'caffeine_hrv',      label: 'Caffeine × HRV' },
  { id: 'hydration_readiness', label: 'Hydration × Readiness' },
  { id: 'train_recovery',    label: 'Train × Recovery' },
];

// Monday of the most recently *completed* week, in YYYY-MM-DD.
function lastCompletedWeekStart(today = new Date()) {
  const d = new Date(today);
  d.setHours(0, 0, 0, 0);
  const day = d.getDay(); // 0 Sun … 6 Sat
  // Days since the last Monday (today inclusive)
  const sinceMonday = (day + 6) % 7;
  // Go back to that Monday, then another 7 days for "last completed week"
  d.setDate(d.getDate() - sinceMonday - 7);
  return d.toISOString().slice(0, 10);
}

function weekRange(weekStart) {
  // weekStart is Monday YYYY-MM-DD; return [start, end] dates (Mon..Sun inclusive)
  return [weekStart, addDays(weekStart, 6)];
}

async function loadLatestDigest() {
  try {
    const rows = await sbFetch('/tide_digests?order=week_start.desc&limit=1');
    state.latestDigest = (rows && rows[0]) || null;
    return state.latestDigest;
  } catch (e) {
    console.warn('loadLatestDigest failed:', e.message);
    state.latestDigest = null;
    return null;
  }
}

async function loadDigestByWeek(weekStart) {
  try {
    const rows = await sbFetch(`/tide_digests?week_start=eq.${weekStart}&limit=1`);
    return (rows && rows[0]) || null;
  } catch (e) {
    console.warn('loadDigestByWeek failed:', e.message);
    return null;
  }
}

// Pull every input we need for the week + the prior week (for deltas).
async function loadDigestSourceData(weekStart) {
  const [start, end] = weekRange(weekStart);
  const prevStart = addDays(start, -7);
  const overallStart = prevStart;
  const overallEnd   = end;
  try {
    const [oura, intake, indulgeSessions, activities, stackLogs, stackItems] = await Promise.all([
      sbFetch(`/tide_oura_daily?date=gte.${overallStart}&date=lte.${overallEnd}&order=date.asc`).catch(() => []),
      sbFetch(`/tide_intake_logs?log_date=gte.${overallStart}&log_date=lte.${overallEnd}&order=logged_at.asc`).catch(() => []),
      sbFetch(`/tide_indulge_sessions?started_at=gte.${overallStart}T00:00:00&order=started_at.asc&select=*,entries:tide_indulge_entries(id,kind,standard_units)`).catch(() => []),
      sbFetch(`/tide_activities?date=gte.${overallStart}&date=lte.${overallEnd}&order=date.asc`).catch(() => []),
      sbFetch(`/tide_stack_logs?log_date=gte.${overallStart}&log_date=lte.${overallEnd}&order=log_date.asc`).catch(() => []),
      sbFetch('/tide_stack_items?active=eq.true').catch(() => []),
    ]);
    return { weekStart, start, end, prevStart,
      oura: oura || [], intake: intake || [], indulge: indulgeSessions || [],
      activities: activities || [], stackLogs: stackLogs || [], stackItems: stackItems || [] };
  } catch (e) {
    console.warn('loadDigestSourceData failed:', e.message);
    throw e;
  }
}

// Helpers
const inRange = (d, start, end) => d >= start && d <= end;
const meanOf = (arr) => arr.length ? arr.reduce((s, v) => s + v, 0) / arr.length : null;

function digestWeekMeta(data) {
  const { start, end, prevStart, oura, stackLogs, stackItems } = data;
  const thisWeek = oura.filter(r => inRange(r.date, start, end));
  const prevWeek = oura.filter(r => inRange(r.date, prevStart, addDays(start, -1)));

  const avgReadiness = meanOf(thisWeek.map(r => r.readiness_score).filter(v => v != null));
  const prevReadiness = meanOf(prevWeek.map(r => r.readiness_score).filter(v => v != null));
  const avgHrv = meanOf(thisWeek.map(r => r.hrv_avg).filter(v => v != null));
  const prevHrv = meanOf(prevWeek.map(r => r.hrv_avg).filter(v => v != null));

  // Stack hit: % of (scheduled, required) item check-offs done this week
  const requiredItems = stackItems.filter(s => s.required && s.schedule !== 'as_needed');
  const expected = requiredItems.length * 7;
  const hits = stackLogs.filter(l => inRange(l.log_date, start, end) && requiredItems.some(s => s.id === l.stack_item_id)).length;
  const stackHitPct = expected ? Math.round((hits / expected) * 100) : null;
  // For prev-week comparison
  const prevHits = stackLogs.filter(l => inRange(l.log_date, prevStart, addDays(start, -1)) && requiredItems.some(s => s.id === l.stack_item_id)).length;
  const prevStackPct = expected ? Math.round((prevHits / expected) * 100) : null;

  return {
    readiness: { avg: avgReadiness != null ? Math.round(avgReadiness) : null, delta: (avgReadiness != null && prevReadiness != null) ? Math.round(avgReadiness - prevReadiness) : null },
    hrv:       { avg: avgHrv != null ? Math.round(avgHrv) : null,             delta: (avgHrv != null && prevHrv != null) ? Math.round(avgHrv - prevHrv) : null },
    stack:     { pct: stackHitPct,                                            delta: (stackHitPct != null && prevStackPct != null) ? stackHitPct - prevStackPct : null },
  };
}

// Bucket helpers — each returns { buckets: [{label, n, avg}], unit, label }
function lensDrinksSleep(data) {
  const { start, end, indulge, oura } = data;
  const sessions = indulge.filter(s => {
    const d = (s.started_at || '').slice(0, 10);
    return inRange(d, start, end);
  });
  const drinksByOuraDate = {};
  sessions.forEach(s => {
    const od = ouraDateForSession(s.started_at);
    const alc = (s.entries || []).filter(e => e.kind === 'alcohol').length;
    drinksByOuraDate[od] = (drinksByOuraDate[od] || 0) + alc;
  });
  const rows = oura.filter(r => inRange(r.date, start, end)).map(r => ({
    sleep: r.sleep_score, count: drinksByOuraDate[r.date] || 0,
  }));
  const buckets = ['0', '1-2', '3-4', '5+'].map(b => {
    const matches = rows.filter(r => drinkBucket(r.count) === b && r.sleep != null);
    return { label: b === '0' ? 'No drinks' : b + ' drinks', n: matches.length, avg: meanOf(matches.map(r => r.sleep)) };
  });
  return { id: 'drinks_sleep', label: 'Sleep score', max: 100, buckets };
}

function lensCaffeineHrv(data) {
  const { start, end, intake, oura } = data;
  // Daily caffeine mg sum
  const mgByDate = {};
  intake.filter(r => r.category === 'caffeine').forEach(r => {
    const d = r.log_date || (r.logged_at || '').slice(0, 10);
    if (!d) return;
    mgByDate[d] = (mgByDate[d] || 0) + (Number(r.quantity) || 0);
  });
  const bucketFor = (mg) => mg < 50 ? 'none' : mg < 150 ? 'low' : mg < 300 ? 'mid' : 'high';
  const labels = { none: '< 50mg', low: '50–150', mid: '150–300', high: '300+' };
  // HRV next morning ≈ same date's row (Oura reports last night's sleep as today's date)
  const rows = oura.filter(r => inRange(r.date, start, end)).map(r => {
    const prev = addDays(r.date, -1); // caffeine taken day before sleep
    return { hrv: r.hrv_avg, mg: mgByDate[prev] || 0 };
  });
  const buckets = ['none', 'low', 'mid', 'high'].map(b => {
    const matches = rows.filter(r => bucketFor(r.mg) === b && r.hrv != null);
    return { label: labels[b], n: matches.length, avg: meanOf(matches.map(r => r.hrv)) };
  });
  return { id: 'caffeine_hrv', label: 'HRV', max: 100, buckets };
}

function lensHydrationReadiness(data) {
  const { start, end, intake, oura } = data;
  const mlByDate = {};
  intake.filter(r => r.category === 'water').forEach(r => {
    const d = r.log_date || (r.logged_at || '').slice(0, 10);
    if (!d) return;
    mlByDate[d] = (mlByDate[d] || 0) + (Number(r.quantity) || 0);
  });
  const bucketFor = (ml) => ml < 1000 ? 'low' : ml < 2000 ? 'mid' : ml < 3000 ? 'good' : 'high';
  const labels = { low: '< 1L', mid: '1–2L', good: '2–3L', high: '3L+' };
  // Readiness reflects same-day state
  const rows = oura.filter(r => inRange(r.date, start, end)).map(r => ({
    readiness: r.readiness_score, ml: mlByDate[r.date] || 0,
  }));
  const buckets = ['low', 'mid', 'good', 'high'].map(b => {
    const matches = rows.filter(r => bucketFor(r.ml) === b && r.readiness != null);
    return { label: labels[b], n: matches.length, avg: meanOf(matches.map(r => r.readiness)) };
  });
  return { id: 'hydration_readiness', label: 'Readiness', max: 100, buckets };
}

function lensTrainRecovery(data) {
  const { start, end, activities, oura } = data;
  // Sessions per day (strength only)
  const sessByDate = {};
  activities.filter(a => a.category === 'strength').forEach(a => {
    const d = a.date;
    if (!d) return;
    sessByDate[d] = (sessByDate[d] || 0) + 1;
  });
  const bucketFor = (n) => n === 0 ? 'rest' : n <= 2 ? 'light' : n <= 5 ? 'mid' : 'heavy';
  const labels = { rest: 'Rest day', light: '1–2 ex', mid: '3–5 ex', heavy: '6+ ex' };
  const rows = oura.filter(r => inRange(r.date, start, end)).map(r => {
    const prev = addDays(r.date, -1);
    return { readiness: r.readiness_score, n: sessByDate[prev] || 0 };
  });
  const buckets = ['rest', 'light', 'mid', 'heavy'].map(b => {
    const matches = rows.filter(r => bucketFor(r.n) === b && r.readiness != null);
    return { label: labels[b], n: matches.length, avg: meanOf(matches.map(r => r.readiness)) };
  });
  return { id: 'train_recovery', label: 'Next-morning readiness', max: 100, buckets };
}

function buildAllLenses(data) {
  return [lensDrinksSleep(data), lensCaffeineHrv(data), lensHydrationReadiness(data), lensTrainRecovery(data)];
}

async function generateDigestForWeek(weekStart) {
  const data = await loadDigestSourceData(weekStart);
  const week_meta = digestWeekMeta(data);
  const lenses = buildAllLenses(data);

  // Lightweight payload for Claude — counts + bucket averages, not raw rows.
  const promptCtx = {
    week_start: weekStart,
    avg_readiness_this_week: week_meta.readiness.avg,
    avg_readiness_delta_vs_prev: week_meta.readiness.delta,
    avg_hrv_this_week: week_meta.hrv.avg,
    avg_hrv_delta_vs_prev: week_meta.hrv.delta,
    stack_hit_pct: week_meta.stack.pct,
    stack_delta_vs_prev: week_meta.stack.delta,
    lenses: lenses.map(l => ({
      id: l.id,
      label: l.label,
      buckets: l.buckets.map(b => ({ label: b.label, n: b.n, avg: b.avg != null ? Math.round(b.avg) : null })),
    })),
  };

  const fallback = {
    headline: 'A week of inputs.',
    narrative: 'Not enough joined signal to draw a sharp conclusion this week. Keep logging, the picture sharpens fast.',
    wins: [],
    drags: [],
    experiment: 'Pick one input that felt sloppy this week and tighten it.',
    experiment_candidates: [],
  };
  const pj = await callClaudeJSON(
    `You are writing this week's "digest" for a body-signal tracking app. Magazine-style, tight, calm.
Return JSON with EXACTLY these fields:
- headline (string, 8-14 words, one short Fraunces-style sentence with ONE clause wrapped in <em>…</em> to emphasize)
- narrative (string, 2-3 sentences, muted reflective tone, no numbers that aren't in the data)
- wins (array of 1-3 strings, each one short bullet, "<em>…</em>" allowed around one phrase per bullet)
- drags (array of 0-3 strings, same shape as wins)
- experiment (string, ONE actionable change to try this week, 8-16 words, "<em>…</em>" allowed)
- experiment_candidates (array of 2-3 strings, alternate experiments)

Data: ${JSON.stringify(promptCtx)}`,
    fallback
  );

  const payload = {
    week_start: weekStart,
    headline: pj.headline || fallback.headline,
    narrative: pj.narrative || fallback.narrative,
    week_meta_json: week_meta,
    wins_json: Array.isArray(pj.wins) ? pj.wins : fallback.wins,
    drags_json: Array.isArray(pj.drags) ? pj.drags : fallback.drags,
    evidence_lenses_json: lenses,
    experiment_text: pj.experiment || fallback.experiment,
    experiment_candidates_json: Array.isArray(pj.experiment_candidates) ? pj.experiment_candidates : fallback.experiment_candidates,
    generated_at: new Date().toISOString(),
  };

  // Upsert by week_start
  const existing = await loadDigestByWeek(weekStart);
  let saved = null;
  if (existing) {
    const result = await sbFetch(`/tide_digests?id=eq.${existing.id}`, {
      method: 'PATCH',
      body: JSON.stringify(payload),
    });
    saved = result && result[0];
  } else {
    const result = await sbFetch('/tide_digests', { method: 'POST', body: JSON.stringify(payload) });
    saved = result && result[0];
  }
  state.latestDigest = saved;
  return saved;
}

function renderLensBars(lens) {
  if (!lens || !lens.buckets) return '';
  const max = lens.max || Math.max(1, ...lens.buckets.map(b => b.avg || 0));
  return lens.buckets.map(b => {
    if (b.avg == null) {
      return `
        <div class="lens-bar-row">
          <div class="lens-bar-label">${escapeHtml(b.label)}</div>
          <div class="lens-bar-track"><div class="lens-bar-fill dim" style="width: 0%"></div></div>
          <div class="lens-bar-val">—</div>
        </div>
      `;
    }
    const pct = Math.max(2, Math.min(100, (b.avg / max) * 100));
    // Quality coding: higher = good across all these metrics, so the bar color
    // shifts good above the median bucket value, warn below, neutral otherwise.
    let cls = '';
    const knownAvgs = lens.buckets.map(x => x.avg).filter(v => v != null);
    if (knownAvgs.length > 1) {
      const median = knownAvgs.slice().sort((a, b) => a - b)[Math.floor(knownAvgs.length / 2)];
      if (b.avg > median) cls = 'good';
      else if (b.avg < median) cls = 'warn';
    }
    return `
      <div class="lens-bar-row">
        <div class="lens-bar-label">${escapeHtml(b.label)}</div>
        <div class="lens-bar-track"><div class="lens-bar-fill ${cls}" style="width: ${pct.toFixed(1)}%"></div></div>
        <div class="lens-bar-val">${Math.round(b.avg)}<span class="n">n=${b.n}</span></div>
      </div>
    `;
  }).join('');
}

function renderMetaDelta(delta, suffix = '') {
  if (delta == null) return '<span class="dig-meta-delta flat">—</span>';
  if (delta === 0) return '<span class="dig-meta-delta flat">flat</span>';
  const cls = delta > 0 ? 'up' : 'down';
  const sign = delta > 0 ? '+' : '−';
  return `<span class="dig-meta-delta ${cls}">${sign}${Math.abs(delta)}${suffix}</span>`;
}

async function cycleExperiment() {
  const d = state.latestDigest;
  if (!d) return;
  const candidates = d.experiment_candidates_json || [];
  if (!candidates.length) { toast('No alternates'); return; }
  const current = d.experiment_text || '';
  const idx = candidates.findIndex(c => c === current);
  const next = candidates[(idx + 1) % candidates.length] || candidates[0];
  if (next === current) { toast('Only one alternate'); return; }
  // Swap in place; push the previous text into the candidates pool.
  const newCandidates = [current, ...candidates.filter(c => c !== next && c !== current)];
  const result = await sbFetch(`/tide_digests?id=eq.${d.id}`, {
    method: 'PATCH',
    body: JSON.stringify({ experiment_text: next, experiment_candidates_json: newCandidates }),
  });
  if (result && result[0]) state.latestDigest = result[0];
  renderDigestScreen();
}

const BODY_RANGES = [
  { id: '1M', days: 30 },
  { id: '3M', days: 90 },
  { id: '6M', days: 180 },
  { id: '1Y', days: 365 },
];
const MEAS_KEYS = [
  { key: 'chest_in',  label: 'Chest'  },
  { key: 'waist_in',  label: 'Waist'  },
  { key: 'hips_in',   label: 'Hips'   },

async function loadBodyMetrics() {

    console.warn('loadBodyMetrics failed:', e.message);

// Pick the most recent non-null value for a given column across all rows.
function latestField(rows, key) {
  for (const r of rows) if (r[key] != null) return r;
  return null;
}

function pinSet() { return !!localStorage.getItem('tide_body_pin'); }
function pinUnlocked() { return sessionStorage.getItem('tide_body_unlocked') === '1'; }
function pinSetValue(v) { localStorage.setItem('tide_body_pin', btoa(unescape(encodeURIComponent(v)))); }
function pinMatches(v) {
  const stored = localStorage.getItem('tide_body_pin');
  if (!stored) return false;
  try { return atob(stored) === unescape(encodeURIComponent(v)); } catch { return false; }
}

function renderBodyScreen() {
  const rows = state.bodyMetrics || []; // already date-desc
  const profile = getProfile() || {};
  const goalWeight = Number(profile.goal_weight_lb) || null;

  const currentWeight = latestField(rows, 'weight_lb')?.weight_lb ?? null;

  // Weight delta over the chosen range
  const range = state.bodyRange || '3M';
  const days = (BODY_RANGES.find(r => r.id === range) || BODY_RANGES[1]).days;
  const cutoff = addDays(todayISO(), -days);
  const inRange = rows.filter(r => r.weight_lb != null && r.date >= cutoff).slice().reverse(); // ascending
  const startWeight = inRange[0]?.weight_lb ?? null;
  const weightDelta = (currentWeight != null && startWeight != null) ? (currentWeight - startWeight) : null;
  // Cut intent: dropping is good if you have a goal below current OR no goal set
  const cutIntent = !goalWeight || (currentWeight != null && currentWeight > goalWeight);
  const deltaCls = (weightDelta == null)
    ? 'flat'
    : Math.abs(weightDelta) < 0.5
      ? 'flat'
      : (weightDelta < 0
          ? (cutIntent ? 'good' : 'warn')
          : (cutIntent ? 'warn' : 'good'));
  const deltaTxt = (weightDelta == null)
    ? 'first entry'
    : (Math.abs(weightDelta) < 0.5
        ? `flat in ${range}`
        : `${weightDelta > 0 ? '+' : '−'}${Math.abs(weightDelta).toFixed(1)} lb in ${range}`);

  // Latest measurement values + deltas (vs oldest in range)
  const measDelta = (key) => {
    const latest = latestField(rows, key)?.[key] ?? null;
    if (latest == null) return { latest: null, delta: null };
    const earlier = inRange.find(r => r[key] != null && r[key] !== latest)?.[key] ?? null;
    return { latest, delta: earlier != null ? (latest - earlier) : null };
  };

  $('#app').innerHTML = `
    <header class="tab-head">
      <div>
        <div class="tab-title">Weight</div>
        <div class="tab-sub">${rows.length ? `${rows.length} ${rows.length === 1 ? 'entry' : 'entries'}` : 'no entries yet'}</div>
      </div>
      <div style="width: 60px"></div>
    </header>

    <div class="body-hero">
      <div>
        <div class="body-hero-num">${currentWeight != null ? currentWeight : '—'}<span class="body-hero-unit">${currentWeight != null ? 'lb' : ''}</span></div>
        <div class="body-hero-label">Current</div>
        <div class="body-hero-delta ${deltaCls}">${escapeHtml(deltaTxt)}</div>
        ${goalWeight ? `<div class="body-hero-delta flat" style="margin-top: 2px">Goal · ${goalWeight} lb</div>` : ''}
      </div>
      <button class="body-hero-log" id="body-log-weight">Log weight</button>
    </div>

    <div class="body-chart">
      <div class="body-chart-head">
        <div class="body-chart-title">Weight · ${range}</div>
        <div class="filter-row" style="margin-bottom: 0; padding: 0">
          ${BODY_RANGES.map(r => `<div class="filter-chip ${r.id === range ? 'active' : ''}" data-body-range="${r.id}">${r.id}</div>`).join('')}
        </div>
      </div>
      ${renderWeightChart(inRange)}
    </div>

    <div class="section-label">Measurements</div>
    <div class="meas-grid">
      ${MEAS_KEYS.map(m => {
        const { latest, delta } = measDelta(m.key);
        const deltaTxt = (delta == null) ? '—' : (Math.abs(delta) < 0.1 ? 'flat' : `${delta > 0 ? '+' : '−'}${Math.abs(delta).toFixed(1)}″`);
        // For body measurements default-direction is "smaller = good" (recomp/cut)
        const deltaCls = (delta == null || Math.abs(delta) < 0.1) ? 'flat' : (delta < 0 ? 'good' : 'warn');
        return `
          <div class="meas-cell" data-meas-edit="${m.key}">
            <div class="meas-cell-label">${escapeHtml(m.label)}</div>
            <div class="meas-cell-val ${latest == null ? 'dim' : ''}">${latest != null ? latest : '—'}${latest != null ? '<span class="unit">″</span>' : ''}</div>
            <div class="meas-cell-delta ${deltaCls}">${escapeHtml(deltaTxt)}</div>
          </div>
        `;
      }).join('')}
    </div>

    ${renderPhotosSection()}
  `;

  $('#body-log-weight').onclick = () => openLogWeightModal();
  $$('[data-body-range]').forEach(c => c.onclick = () => { state.bodyRange = c.dataset.bodyRange; renderBodyScreen(); });
  $$('[data-meas-edit]').forEach(c => c.onclick = () => openLogMeasurementsModal(c.dataset.measEdit));
  wirePhotosSection();
}

function renderWeightChart(asc) {
  if (!asc || asc.length === 0) {
    return '<div class="muted small" style="text-align: center; padding: 22px 0">Log a few weights to see the trend.</div>';
  }
  const width = 280;
  const height = 80;
  const pad = 6;
  const weights = asc.map(r => Number(r.weight_lb));
  const max = Math.max(...weights);
  const min = Math.min(...weights);
  const range = Math.max(1, max - min);
  const span = asc.length === 1 ? 1 : asc.length - 1;
  const x = (i) => pad + (width - 2 * pad) * (i / span);
  const y = (w) => pad + (height - 2 * pad) * (1 - ((w - min) / range));
  const points = asc.map((r, i) => [x(i), y(Number(r.weight_lb))]);
  const linePath = points.map((p, i) => `${i === 0 ? 'M' : 'L'} ${p[0].toFixed(2)} ${p[1].toFixed(2)}`).join(' ');
  const areaPath = `${linePath} L ${points[points.length - 1][0].toFixed(2)} ${height - pad} L ${points[0][0].toFixed(2)} ${height - pad} Z`;
  const dots = points.map((p) => `<circle class="prog-spark-dot" cx="${p[0].toFixed(2)}" cy="${p[1].toFixed(2)}" r="2"/>`).join('');
  return `
    <svg class="body-chart-svg" viewBox="0 0 ${width} ${height}" preserveAspectRatio="none">
      <path class="prog-spark-area" d="${areaPath}"/>
      <path class="prog-spark-line" d="${linePath}"/>
      ${dots}
    </svg>
  `;
}

const BODY_PHOTO_BUCKET = 'tide-body-photos';
const SIGNED_URL_TTL_SEC = 60 * 30; // 30 min — refreshed each render

// In-memory signed-URL cache keyed by path. We discard the cache when the
// Body screen unmounts (state.screen changes away from 'body').
let signedUrlCache = {};

function normalizePhotoEntries(raw) {
  // Forward-compat: paths can be plain strings or { path, hidden, uploaded_at }.
  if (!Array.isArray(raw)) return [];
  return raw.map(p => typeof p === 'string' ? { path: p, hidden: false } : { path: p.path, hidden: !!p.hidden, uploaded_at: p.uploaded_at });
}

async function getSignedUrl(path) {
  if (!path) return null;
  if (signedUrlCache[path]) return signedUrlCache[path];
  const r = await fetch(`${SB_URL}/storage/v1/object/sign/${BODY_PHOTO_BUCKET}/${encodeURIComponent(path)}`, {
    method: 'POST',
    headers: {
      apikey: SB_KEY,
      Authorization: `Bearer ${await sbBearer()}`,
      'Content-Type': 'application/json',
    },
    body: JSON.stringify({ expiresIn: SIGNED_URL_TTL_SEC }),
  });
  if (!r.ok) {
    const txt = await r.text();
    console.warn('Sign failed:', txt);
    return null;
  }
  const data = await r.json();
  const url = `${SB_URL}/storage/v1${data.signedURL || data.signedUrl || ''}`;
  signedUrlCache[path] = url;
  return url;
}

async function uploadBodyPhoto(file, dateISO) {
  // Random path so we never collide.
  const ext = (file.name?.split('.').pop() || 'jpg').toLowerCase().replace(/[^a-z0-9]/g, '');
  const path = `body/${dateISO}/${crypto.randomUUID()}.${ext || 'jpg'}`;
  const r = await fetch(`${SB_URL}/storage/v1/object/${BODY_PHOTO_BUCKET}/${path}`, {
    method: 'POST',
    headers: {
      apikey: SB_KEY,
      Authorization: `Bearer ${await sbBearer()}`,
      'x-upsert': 'true',
      'Content-Type': file.type || 'application/octet-stream',
    },
    body: file,
  });
  if (!r.ok) {
    let detail = '';
    try { detail = (await r.json()).message || ''; } catch {}
    throw new Error(`Upload ${r.status}${detail ? ': ' + detail : ''}`);
  }
  return path;
}

async function deletePhotoFromStorage(path) {
  await fetch(`${SB_URL}/storage/v1/object/${BODY_PHOTO_BUCKET}/${encodeURIComponent(path)}`, {
    method: 'DELETE',
    headers: { apikey: SB_KEY, Authorization: `Bearer ${await sbBearer()}` },
  });
  delete signedUrlCache[path];
}

// Persist a patched photo_paths array onto a tide_body_metrics row.
async function setRowPhotoPaths(row, paths) {
  const result = await sbFetch(`/tide_body_metrics?id=eq.${row.id}`, {
    method: 'PATCH',
    body: JSON.stringify({ photo_paths: paths }),
  });
  const updated = result && result[0];
  if (updated) {
    state.bodyMetrics = state.bodyMetrics.map(r => r.id === row.id ? updated : r);
  }
  return updated;
}

// Add a photo to today's body_metric (create the row if needed).
async function addPhotoForToday(file) {
  const date = todayISO();
  let row = (state.bodyMetrics || []).find(r => r.date === date);
  if (!row) {
    const created = await sbFetch('/tide_body_metrics', {
      method: 'POST',
      body: JSON.stringify({ date, photo_paths: [] }),
    });
    row = created && created[0];
    if (row) {
      state.bodyMetrics = [row].concat(state.bodyMetrics);
      state.bodyMetrics.sort((a, b) => (b.date || '').localeCompare(a.date || ''));
    }
  }
  const path = await uploadBodyPhoto(file, date);
  const next = normalizePhotoEntries(row.photo_paths).concat([{ path, hidden: false, uploaded_at: new Date().toISOString() }]);
  await setRowPhotoPaths(row, next);
}

async function togglePhotoHidden(row, path) {
  const next = normalizePhotoEntries(row.photo_paths).map(p =>
    p.path === path ? { ...p, hidden: !p.hidden } : p
  );
  await setRowPhotoPaths(row, next);
}

async function deletePhoto(row, path) {
  await deletePhotoFromStorage(path);
  const next = normalizePhotoEntries(row.photo_paths).filter(p => p.path !== path);
  await setRowPhotoPaths(row, next);
}

function wirePhotosSection() {
  $('#photos-set-pin-btn')?.addEventListener('click', () => openSetPinModal());
  $('#photos-unlock-btn')?.addEventListener('click', () => openUnlockPinModal());
  $('#photos-lock')?.addEventListener('click', () => {
    sessionStorage.removeItem('tide_body_unlocked');
    signedUrlCache = {};
    renderBodyScreen();
  });
  $('#photos-add')?.addEventListener('click', () => $('#photos-input')?.click());
  $('#photos-input')?.addEventListener('change', async (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    toast('Uploading…');
    try {
      await addPhotoForToday(file);
      renderBodyScreen();
    } catch (err) {
      toast('Upload failed: ' + err.message);
    } finally {
      e.target.value = '';
    }
  });

  // Async-resolve signed URLs for each thumb. Wire tap/long-press.
  $$('.photo-thumb[data-photo-path]').forEach(thumb => {
    const path = thumb.dataset.photoPath;
    const rowId = thumb.dataset.rowId;
    if (!thumb.classList.contains('hidden')) {
      getSignedUrl(path).then(url => {
        if (!url) {
          thumb.classList.remove('loading');
          thumb.classList.add('hidden');
          return;
        }
        const img = document.createElement('img');
        img.src = url;
        img.onload = () => thumb.classList.remove('loading');
        img.onerror = () => { thumb.classList.remove('loading'); thumb.classList.add('hidden'); };
        thumb.appendChild(img);
      });
    } else {
      thumb.classList.remove('loading');
    }

    // Long-press → toggle hidden flag
    let pressTimer = null;
    let longPressed = false;
    const onPressStart = () => {
      longPressed = false;
      pressTimer = setTimeout(async () => {
        longPressed = true;
        const row = state.bodyMetrics.find(r => r.id === rowId);
        if (!row) return;
        await togglePhotoHidden(row, path);
        renderBodyScreen();
      }, 500);
    };
    const onPressEnd = () => {
      if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; }
    };
    thumb.addEventListener('touchstart', onPressStart, { passive: true });
    thumb.addEventListener('touchend', onPressEnd);
    thumb.addEventListener('touchcancel', onPressEnd);
    thumb.addEventListener('mousedown', onPressStart);
    thumb.addEventListener('mouseup', onPressEnd);
    thumb.addEventListener('mouseleave', onPressEnd);

    thumb.addEventListener('click', () => {
      if (longPressed) return;
      openPhotoViewer(path);
    });
  });
}

// Flatten all unhidden photos into a chronological list and open the viewer
// starting at the tapped path.
function openPhotoViewer(startPath) {
  const flat = [];
  (state.bodyMetrics || []).slice().reverse().forEach(row => {
    normalizePhotoEntries(row.photo_paths).forEach(p => {
      if (!p.hidden) flat.push({ path: p.path, date: row.date, row });
    });
  });
  if (!flat.length) return;
  const startIndex = Math.max(0, flat.findIndex(p => p.path === startPath));
  let idx = startIndex;

  const wrap = document.createElement('div');
  wrap.className = 'photo-fullscreen';
  document.body.appendChild(wrap);

  const render = async () => {
    const cur = flat[idx];
    const url = await getSignedUrl(cur.path);
    wrap.innerHTML = `
      <button class="pfs-close" aria-label="Close">×</button>
      ${idx > 0 ? '<button class="pfs-nav pfs-prev" aria-label="Previous">‹</button>' : ''}
      ${idx < flat.length - 1 ? '<button class="pfs-nav pfs-next" aria-label="Next">›</button>' : ''}
      ${url ? `<img src="${url}" alt="">` : '<div style="color: rgba(255,255,255,0.5)">Could not load image.</div>'}
      <div class="pfs-actions">
        <button class="pfs-act" data-pfs-hide>Hide</button>
        <button class="pfs-act" data-pfs-delete>Delete</button>
      </div>
      <div class="pfs-meta">${escapeHtml(fmtDate(cur.date + 'T12:00:00'))} · ${idx + 1} / ${flat.length}</div>
    `;
    wrap.querySelector('.pfs-close').onclick = close;
    wrap.querySelector('.pfs-prev')?.addEventListener('click', () => { idx--; render(); });
    wrap.querySelector('.pfs-next')?.addEventListener('click', () => { idx++; render(); });
    wrap.querySelector('[data-pfs-hide]').onclick = async () => {
      await togglePhotoHidden(cur.row, cur.path);
      close();
      renderBodyScreen();
    };
    wrap.querySelector('[data-pfs-delete]').onclick = async () => {
      if (!confirm('Delete this photo? This cannot be undone.')) return;
      await deletePhoto(cur.row, cur.path);
      close();
      renderBodyScreen();
    };
  };
  const close = () => { wrap.remove(); };
  render();
}
