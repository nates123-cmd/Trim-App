<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#1a3a5c">
<title>Trim</title>
<link rel="manifest" href="./manifest.json">
<link rel="icon" type="image/png" sizes="32x32" href="./icons/icon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="./icons/icon-16.png">
<link rel="apple-touch-icon" sizes="180x180" href="./icons/icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Trim">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400;1,9..144,500&family=Inter:wght@400;500;600&display=swap">
<style>
  :root {
    --bg: #F5F2EE;
    --text: #1C1C1C;
    --muted: #6B6560;
    --muted-soft: #8E8884;
    --accent: #A89880;
    --accent-deep: #8C7A60;
    --accent-soft: #C5B89E;
    --card-bg: #EDEBE7;
    --card-bg-warm: #EFE9E0;
    --border: #D8D4CE;
    --border-soft: #E3DFD9;
    --warn: #B5754A;
    --good: #7A8B6F;
    --radius: 14px;
    --radius-sm: 10px;
    --radius-lg: 20px;
    --font-display: 'Fraunces', Georgia, serif;
    --font-body: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  /* Suite text-selection sweep: suppress accidental highlight-drag on chrome
     (buttons, tabs, rows), re-enable on form fields + the user's own logged
     text/notes below. */
  body { -webkit-user-select: none; -moz-user-select: none; user-select: none; }
  input, textarea, select, [contenteditable],
  .ind-entry-title, .ind-entry-body, .ind-entry-meta,
  .lib-entry-name, .stack-item-name,
  .stat-value, .macro-value,
  .pace-fused-intention, .reflect-prompt-text {
    -webkit-user-select: text; -moz-user-select: text; user-select: text;
  }
  /* Lock horizontal motion + pinch zoom at the document level. Inner
     elements with their own gestures (swipe-to-delete rows) still work
     because they declare their own touch-action. */
  html, body {
    overflow-x: hidden;
    overscroll-behavior-x: none;
    touch-action: pan-y;
  }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: var(--font-body); line-height: 1.5; -webkit-font-smoothing: antialiased; }
  body { padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left); min-height: 100vh; }
  #app { max-width: 560px; margin: 0 auto; padding: 20px 18px calc(96px + env(safe-area-inset-bottom)); }
  h1, h2, h3 { font-family: var(--font-display); font-weight: 600; letter-spacing: -0.01em; margin: 0 0 8px; }
  h1 { font-size: 28px; }
  h2 { font-size: 20px; }
  h3 { font-size: 16px; }
  .font-display { font-family: var(--font-display); }
  .font-body { font-family: var(--font-body); }
  .label-up { font-family: var(--font-body); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); font-weight: 500; }
  .label-up-soft { font-family: var(--font-body); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted-soft); font-weight: 500; }
  .em-accent { font-family: var(--font-display); font-style: italic; color: var(--accent-deep); }
  .tnum { font-variant-numeric: tabular-nums; }
  p { margin: 0 0 12px; color: var(--muted); }
  button { font-family: inherit; font-size: 15px; cursor: pointer; border: none; background: none; color: inherit; padding: 0; }
  .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 14px 20px; border-radius: var(--radius); background: var(--accent); color: white; font-weight: 500; min-height: 48px; transition: opacity 0.15s; width: 100%; }
  .btn:active { opacity: 0.85; }
  .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text); }
  .btn-soft { background: var(--card-bg); color: var(--text); }
  .btn-warm { background: var(--warn); color: white; }
  .btn-row { display: flex; gap: 10px; }
  .btn-row .btn { flex: 1; }
  .card { background: var(--card-bg); border-radius: var(--radius-lg); padding: 18px; margin-bottom: 14px; }
  .card-warm { background: var(--card-bg-warm); }
  .muted { color: var(--muted); font-size: 14px; }
  .small { font-size: 13px; }
  .row { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .stack { display: flex; flex-direction: column; gap: 6px; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .chip { padding: 10px 8px; background: var(--card-bg); border-radius: var(--radius); text-align: center; font-size: 14px; cursor: pointer; transition: background 0.15s, color 0.15s; border: 1px solid transparent; }
  .chip:active, .chip.selected { background: var(--accent); color: white; border-color: var(--accent); }
  .chip-soft.selected { background: var(--accent-soft); }
  header.app-head { display: flex; align-items: center; justify-content: space-between; padding: 4px 2px 18px; }
  header.app-head .title { font-size: 22px; font-weight: 600; letter-spacing: -0.01em; }
  header.app-head .nav-btn { padding: 8px 12px; border-radius: 10px; background: var(--card-bg); font-size: 14px; }
  .screen { display: none; }
  .screen.active { display: block; animation: fade 0.2s ease; }
  @keyframes fade { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }

  .quote { font-style: italic; font-size: 16px; line-height: 1.55; color: var(--text); padding: 4px 0; }
  .quote-author { font-size: 13px; color: var(--muted); margin-top: 8px; letter-spacing: 0.02em; }
  .quote-meta { display: flex; gap: 12px; margin-top: 14px; }
  .quote-meta button { font-size: 13px; color: var(--muted); }

  .stat-big { font-size: 36px; font-weight: 600; letter-spacing: -0.02em; }
  .stat-label { font-size: 13px; color: var(--muted); margin-top: 2px; }
  .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .stats-row.stats-4 { grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .stats-row.stats-4 .stat-big { font-size: 26px; }
  .stats-row.stats-4 .card { padding: 12px 6px; }
  .stats-row .card { margin-bottom: 0; padding: 14px 12px; text-align: center; }

  .pace-good { color: var(--good); }
  .pace-warn { color: var(--warn); }

  .drink-list { margin-top: 8px; }
  .drink-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-top: 1px solid var(--border); font-size: 14px; }
  .drink-item:first-child { border-top: none; }
  .drink-item .x { color: var(--muted); padding: 4px 8px; }

  .session-row { padding: 14px 0; border-top: 1px solid var(--border); }
  .session-row:first-child { border-top: none; padding-top: 0; }
  .session-row .row-top { display: flex; justify-content: space-between; font-size: 14px; }
  .session-row .row-bottom { font-size: 13px; color: var(--muted); margin-top: 4px; }

  textarea, input[type="text"], input[type="number"] { width: 100%; padding: 12px 14px; border-radius: var(--radius); border: 1px solid var(--border); background: white; font-family: inherit; font-size: 15px; color: var(--text); resize: none; }
  textarea:focus, input:focus { outline: none; border-color: var(--accent); }

  .modal-backdrop { position: fixed; inset: 0; background: rgba(28, 28, 28, 0.4); z-index: 100; display: flex; align-items: flex-end; justify-content: center; animation: fade 0.18s; }
  .modal { background: var(--bg); width: 100%; max-width: 560px; border-radius: 24px 24px 0 0; padding: 22px 18px calc(22px + env(safe-area-inset-bottom)); animation: slideUp 0.22s ease; max-height: 88vh; overflow-y: auto; }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: none; } }
  .modal h2 { margin-bottom: 16px; }
  .modal-section { margin-bottom: 18px; }
  .modal-section .label { font-size: 13px; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.04em; }

  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--text); color: white; padding: 12px 18px; border-radius: 100px; font-size: 14px; z-index: 200; animation: fade 0.2s; max-width: 90%; }

  .pill { display: inline-block; padding: 3px 10px; background: var(--card-bg); border-radius: 100px; font-size: 12px; color: var(--muted); }
  .pill-warm { background: var(--warn); color: white; }
  .pill-good { background: var(--good); color: white; }

  .empty { text-align: center; padding: 48px 20px; color: var(--muted); }
  .empty .em { font-size: 32px; margin-bottom: 12px; opacity: 0.5; }

  .quick-fab { position: fixed; bottom: calc(88px + env(safe-area-inset-bottom)); right: max(20px, env(safe-area-inset-right)); width: 56px; height: 56px; border-radius: 50%; background: var(--accent); color: white; font-size: 26px; box-shadow: 0 4px 16px rgba(140, 122, 96, 0.35); display: flex; align-items: center; justify-content: center; z-index: 50; }

  .tab-strip { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; background: var(--card-bg); padding: 4px; border-radius: var(--radius); margin-bottom: 14px; }
  .tab-strip .tab { padding: 10px 6px; text-align: center; font-size: 13px; color: var(--muted); border-radius: 10px; cursor: pointer; transition: background 0.15s, color 0.15s; min-height: 40px; display: flex; align-items: center; justify-content: center; }
  .tab-strip .tab.active { background: var(--bg); color: var(--text); font-weight: 500; box-shadow: 0 1px 2px rgba(0,0,0,0.04); }

  .goal-bar { height: 6px; background: var(--card-bg); border-radius: 100px; overflow: hidden; margin-top: 10px; position: relative; }
  .goal-bar .fill { height: 100%; background: var(--accent); border-radius: 100px; transition: width 0.3s; }
  .goal-bar .fill.met { background: var(--good); }
  .goal-bar .fill.behind { background: var(--warn); }
  .goal-bar .pace-tick { position: absolute; top: -3px; bottom: -3px; width: 2px; background: var(--text); opacity: 0.45; border-radius: 2px; transform: translateX(-1px); }
  .water-chip-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 14px; }
  .intake-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-top: 1px solid var(--border); font-size: 14px; }
  .intake-item:first-child { border-top: none; }
  .intake-item .x { color: var(--muted); padding: 4px 8px; }


  .week-bar { display: flex; align-items: flex-end; gap: 6px; height: 80px; padding: 8px 0; }
  .week-bar .bar { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; justify-content: flex-end; }
  .week-bar .bar-fill { width: 100%; background: var(--accent); border-radius: 4px 4px 0 0; min-height: 2px; transition: height 0.3s; }
  .week-bar .bar-fill.zero { background: var(--good); opacity: 0.4; height: 4px; }
  .week-bar .bar-fill.future { background: var(--border); opacity: 0.5; }
  .week-bar .bar-label { font-size: 11px; color: var(--muted); }
  .week-bar .bar-label.future { opacity: 0.45; }

  .key-form { padding: 40px 18px; }
  .key-form input { font-family: monospace; font-size: 13px; }

  /* ───── v2: Pulse home (mockup-matched) ───── */
  .pulse-head { display: flex; justify-content: space-between; align-items: baseline; padding: 14px 4px 24px; gap: 12px; }
  .pulse-head .brand { font-family: var(--font-display); font-weight: 600; font-size: 28px; letter-spacing: -0.02em; line-height: 1; cursor: pointer; }
  .pulse-head .date { font-family: var(--font-body); font-size: 12px; font-weight: 500; letter-spacing: 0.04em; color: var(--muted); text-transform: uppercase; margin-top: 6px; }
  .pulse-head .header-links { display: flex; gap: 16px; align-self: flex-start; margin-top: 10px; }
  .pulse-head .header-link { font-family: var(--font-body); font-size: 13px; font-weight: 500; color: var(--muted); letter-spacing: 0.01em; cursor: pointer; }
  .pulse-head .header-link:active { color: var(--text); }

  .stat-grid {
    background: var(--card-bg);
    border: 1px solid var(--border-soft);
    border-radius: var(--radius);
    padding: 4px;
    margin-bottom: 14px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1px;
    background-color: var(--border-soft);
  }
  .stat-cell {
    background: var(--card-bg);
    padding: 18px 16px 16px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    position: relative;
  }
  .stat-cell:nth-child(1) { border-top-left-radius: 11px; }
  .stat-cell:nth-child(2) { border-top-right-radius: 11px; }
  .stat-cell:nth-child(3) { border-bottom-left-radius: 11px; }
  .stat-cell:nth-child(4) { border-bottom-right-radius: 11px; }
  .stat-label { font-family: var(--font-body); font-size: 10px; font-weight: 500; color: var(--muted-soft); letter-spacing: 0.14em; text-transform: uppercase; }
  .stat-label-score { color: var(--accent); font-weight: 700; letter-spacing: 0.02em; }
  .stat-value {
    font-family: var(--font-display);
    font-weight: 500;
    font-size: 34px;
    letter-spacing: -0.02em;
    line-height: 1;
    font-variant-numeric: tabular-nums;
    display: flex;
    align-items: baseline;
    gap: 4px;
  }
  .stat-value.dim { color: var(--muted); font-weight: 400; }
  .stat-unit { font-size: 14px; font-weight: 500; color: var(--muted); letter-spacing: 0; }
  .stat-delta { font-family: var(--font-body); font-size: 11px; font-weight: 500; color: var(--muted); letter-spacing: 0.02em; display: flex; align-items: center; gap: 4px; font-variant-numeric: tabular-nums; }
  .stat-delta.up { color: var(--good); }
  .stat-delta.down { color: var(--warn); }
  .stat-delta.flat { color: var(--muted); }
  .stat-delta.warn { color: var(--warn); }
  /* Readiness dot precedes the value via ::before */
  .stat-cell.readiness-good .stat-value::before,
  .stat-cell.readiness-amber .stat-value::before,
  .stat-cell.readiness-warn .stat-value::before {
    content: '';
    width: 8px; height: 8px;
    border-radius: 50%;
    margin-right: 8px;
    align-self: center;
  }
  .stat-cell.readiness-good .stat-value::before  { background: var(--good); }
  .stat-cell.readiness-amber .stat-value::before { background: var(--accent); }
  .stat-cell.readiness-warn .stat-value::before  { background: var(--warn); }

  .pulse-card { background: var(--card-bg-warm); border: 1px solid var(--border-soft); border-radius: var(--radius); padding: 22px 20px 18px; margin-bottom: 14px; }
  .pulse-interp { font-family: var(--font-display); font-weight: 400; font-size: 18px; line-height: 1.35; letter-spacing: -0.005em; color: var(--text); margin-bottom: 18px; }
  .pulse-interp em { font-style: italic; color: var(--accent-deep); }
  .pulse-loading { font-family: var(--font-display); font-style: italic; font-size: 17px; color: var(--muted); }
  .pulse-action {
    display: flex;
    width: 100%;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px;
    background: var(--text);
    color: var(--bg);
    border: none;
    border-radius: var(--radius-sm);
    font-family: var(--font-body);
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.01em;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .pulse-action:active { opacity: 0.88; }
  .pulse-action .arrow { font-size: 18px; line-height: 1; }

  .digest-card { background: var(--card-bg); border: 1px solid var(--border-soft); border-radius: var(--radius); padding: 16px 18px; margin-bottom: 18px; display: flex; align-items: center; justify-content: space-between; gap: 12px; cursor: pointer; transition: background 0.15s; }
  .digest-card:active { background: var(--card-bg-warm); }
  .digest-content { flex: 1; min-width: 0; }
  .digest-tag { font-family: var(--font-body); font-size: 10px; font-weight: 500; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted-soft); margin-bottom: 5px; }
  .digest-headline { font-family: var(--font-display); font-weight: 400; font-size: 14px; line-height: 1.35; color: var(--text); letter-spacing: -0.005em; }
  .digest-headline em { font-style: italic; color: var(--accent-deep); }
  .digest-chevron { font-size: 18px; color: var(--muted); font-weight: 400; flex-shrink: 0; }
  .digest-card.dim { opacity: 0.7; }

  /* ───── v2: Reflection prompt (dashed soft card on Pulse home) ───── */
  .reflect-prompt {
    background: var(--card-bg-warm);
    border: 1px dashed var(--border);
    border-radius: var(--radius);
    padding: 18px 18px 16px;
    margin-bottom: 14px;
    position: relative;
  }
  .reflect-prompt-dismiss {
    position: absolute;
    top: 12px; right: 12px;
    width: 24px; height: 24px;
    border-radius: 50%;
    border: 1px solid var(--border-soft);
    background: transparent;
    color: var(--muted-soft);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    line-height: 1;
    cursor: pointer;
    padding: 0;
  }
  .reflect-prompt-dismiss:active { color: var(--text); border-color: var(--muted); }
  .reflect-prompt-eyebrow {
    font-family: var(--font-body);
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted-soft);
    font-weight: 600;
    margin-bottom: 8px;
  }
  .reflect-prompt-text {
    font-family: var(--font-display);
    font-style: italic;
    font-weight: 400;
    font-size: 16px;
    line-height: 1.4;
    color: var(--accent-deep);
    letter-spacing: -0.005em;
    margin-bottom: 14px;
    padding-right: 32px;
  }
  .reflect-prompt-actions { display: flex; gap: 8px; }
  .reflect-btn {
    padding: 9px 16px;
    border-radius: 999px;
    font-family: var(--font-body);
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.02em;
    cursor: pointer;
    border: none;
  }
  .reflect-btn.primary { background: var(--text); color: var(--bg); }
  .reflect-btn.ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
  .reflect-btn.ghost:active { color: var(--text); border-color: var(--muted); }

  /* ───── v2: Tab header (used on Indulge; will extend to other tabs in later chunks) ───── */
  .tab-head { display: flex; justify-content: space-between; align-items: baseline; padding: 14px 4px 20px; gap: 12px; }
  .tab-head .tab-title { font-family: var(--font-display); font-weight: 600; font-size: 28px; letter-spacing: -0.02em; line-height: 1; }
  .tab-head .tab-sub { font-family: var(--font-body); font-size: 12px; font-weight: 500; letter-spacing: 0.04em; color: var(--muted); text-transform: uppercase; margin-top: 6px; }
  .tab-head .head-link { font-family: var(--font-body); font-size: 13px; font-weight: 500; color: var(--muted); letter-spacing: 0.01em; align-self: flex-start; margin-top: 10px; cursor: pointer; }
  .tab-head .head-link:active { color: var(--text); }

  /* ───── v2: Indulge empty state (mockup-matched) ───── */
  .empty-eyebrow { font-family: var(--font-body); font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted-soft); font-weight: 600; margin-bottom: 8px; }
  .empty-prompt { font-family: var(--font-display); font-weight: 500; font-size: 22px; line-height: 1.25; letter-spacing: -0.015em; margin-bottom: 6px; }
  .empty-sub { font-family: var(--font-display); font-weight: 400; font-style: italic; font-size: 14px; line-height: 1.45; color: var(--muted); letter-spacing: -0.005em; margin-bottom: 18px; }

  .form-card { background: var(--card-bg); border: 1px solid var(--border-soft); border-radius: var(--radius); padding: 20px 20px 18px; margin-bottom: 14px; }
  .form-row { margin-bottom: 16px; }
  .form-row:last-child { margin-bottom: 0; }
  .form-label { font-family: var(--font-body); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted-soft); font-weight: 500; margin-bottom: 8px; }
  .form-input { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; font-family: var(--font-display); font-size: 15px; font-weight: 400; color: var(--text); letter-spacing: -0.005em; outline: none; line-height: 1.4; }
  .form-input::placeholder { color: var(--muted-soft); font-style: italic; }
  .form-input:focus { border-color: var(--text); }
  .form-chips { display: flex; gap: 6px; flex-wrap: wrap; }
  .form-chip { padding: 8px 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 999px; font-family: var(--font-body); font-size: 12px; font-weight: 500; color: var(--muted); letter-spacing: 0.01em; cursor: pointer; }
  .form-chip.active { background: var(--text); color: var(--bg); border-color: var(--text); }

  .primary-btn { width: 100%; padding: 14px 18px; background: var(--text); color: var(--bg); border: none; border-radius: var(--radius-sm); font-family: var(--font-body); font-size: 14px; font-weight: 500; letter-spacing: 0.01em; cursor: pointer; display: flex; align-items: center; justify-content: space-between; transition: opacity 0.15s; }
  .primary-btn:active { opacity: 0.88; }
  .primary-btn .arrow { font-size: 18px; }

  .section-label { font-family: var(--font-body); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted-soft); font-weight: 500; margin: 12px 2px 10px; }
  .past-row { background: var(--card-bg); border: 1px solid var(--border-soft); border-radius: var(--radius); padding: 13px 16px; margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; gap: 12px; cursor: pointer; }
  .past-left { display: flex; flex-direction: column; gap: 3px; min-width: 0; flex: 1; }
  .past-title { font-family: var(--font-display); font-weight: 500; font-size: 14px; letter-spacing: -0.005em; line-height: 1.2; }
  .past-meta { font-family: var(--font-body); font-size: 11px; color: var(--muted); letter-spacing: 0.02em; font-variant-numeric: tabular-nums; }
  .past-right { text-align: right; display: flex; flex-direction: column; gap: 2px; align-items: flex-end; }
  .past-units { font-family: var(--font-display); font-weight: 500; font-size: 16px; line-height: 1; font-variant-numeric: tabular-nums; letter-spacing: -0.005em; }
  .past-units-label { font-family: var(--font-body); font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted-soft); font-weight: 500; }

  /* ───── v2: Indulge active session (mockup-matched) ───── */
  .pace-fused { background: var(--card-bg-warm); border: 1px solid var(--border-soft); border-radius: var(--radius); padding: 20px 20px 16px; margin-bottom: 14px; }
  .pace-fused-stats { display: grid; grid-template-columns: 1fr 1px 1fr; gap: 18px; align-items: stretch; margin-bottom: 4px; }
  .pace-fused-stats.single { grid-template-columns: 1fr; gap: 0; }
  .pace-fused-divider { background: var(--border-soft); width: 1px; height: auto; }
  .pace-fused-stat { display: flex; flex-direction: column; gap: 4px; justify-content: center; }
  .pace-fused-stat-label { font-family: var(--font-body); font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted-soft); font-weight: 500; }
  .pace-fused-num { font-family: var(--font-display); font-weight: 500; font-size: 44px; line-height: 0.95; letter-spacing: -0.03em; font-variant-numeric: tabular-nums; display: flex; align-items: baseline; gap: 6px; }
  .pace-fused-num-suffix { font-family: var(--font-display); font-weight: 400; font-size: 18px; color: var(--muted); letter-spacing: -0.01em; font-variant-numeric: tabular-nums; }
  .pace-fused-stat-detail { font-family: var(--font-body); font-size: 10px; color: var(--muted); letter-spacing: 0.02em; margin-top: 2px; }
  .pace-fused-stat-detail.muted-soft { color: var(--muted-soft); }
  .pace-fused-status-row { display: flex; justify-content: flex-end; margin-top: 2px; }
  .pace-fused-status { font-family: var(--font-body); font-size: 10px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: var(--accent-deep); }
  .pace-fused-status.fast { color: var(--warn); }
  .pace-fused-intention { font-family: var(--font-display); font-style: italic; font-weight: 400; font-size: 15px; line-height: 1.4; color: var(--accent-deep); letter-spacing: -0.005em; margin-top: 14px; padding-top: 12px; border-top: 1px solid var(--border-soft); }
  .pace-fused-meta { display: flex; align-items: center; gap: 6px; font-family: var(--font-body); font-size: 11px; color: var(--muted); margin-top: 8px; letter-spacing: 0.02em; }
  .pace-fused-meta .dot { width: 3px; height: 3px; border-radius: 50%; background: var(--muted-soft); display: inline-block; }

  .entries-label { font-family: var(--font-body); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted-soft); font-weight: 500; margin: 4px 2px 10px; }
  .ind-entry { background: var(--card-bg); border: 1px solid var(--border-soft); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; gap: 12px; cursor: pointer; }
  .ind-entry-left { display: flex; align-items: center; gap: 12px; flex: 1; min-width: 0; }
  .ind-entry-icon { width: 32px; height: 32px; border-radius: 50%; background: var(--card-bg-warm); display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-family: var(--font-display); font-size: 13px; font-weight: 500; color: var(--accent-deep); }
  .ind-entry-body { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
  .ind-entry-title { font-family: var(--font-display); font-weight: 500; font-size: 15px; letter-spacing: -0.005em; line-height: 1.2; }
  .ind-entry-meta { font-family: var(--font-body); font-size: 11px; color: var(--muted); letter-spacing: 0.01em; }
  .ind-entry-time { font-family: var(--font-body); font-size: 11px; color: var(--muted-soft); font-variant-numeric: tabular-nums; letter-spacing: 0.02em; }

  .ind-quick-chips { display: flex; gap: 6px; margin-bottom: 10px; }
  .ind-chip { flex: 1; padding: 11px 4px; background: var(--card-bg); border: 1px solid var(--border-soft); border-radius: 10px; font-family: var(--font-display); font-size: 14px; font-weight: 500; text-align: center; color: var(--text); cursor: pointer; font-variant-numeric: tabular-nums; transition: background 0.15s; }
  .ind-chip:active { background: var(--card-bg-warm); }
  .ind-chip-label { display: block; font-family: var(--font-body); font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted-soft); font-weight: 500; margin-top: 2px; }
  .more-btn { width: 100%; padding: 11px; background: transparent; border: 1px dashed var(--border); border-radius: 10px; color: var(--muted); font-family: var(--font-body); font-size: 12px; font-weight: 500; letter-spacing: 0.02em; margin-bottom: 16px; cursor: pointer; }
  .more-btn:active { color: var(--text); border-color: var(--muted); }

  /* ───── v2: Sip tab (mockup-matched) ───── */
  .sip-switch {
    display: grid;
    grid-template-columns: 1fr 1fr;
    background: var(--card-bg);
    border: 1px solid var(--border-soft);
    border-radius: 10px;
    padding: 4px;
    margin-bottom: 14px;
    gap: 2px;
  }
  .sip-switch-opt { padding: 10px 4px; text-align: center; border-radius: 7px; font-family: var(--font-body); font-size: 13px; font-weight: 500; color: var(--muted); letter-spacing: 0.01em; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: background 0.15s, color 0.15s; }
  .sip-switch-opt.active { background: var(--bg); color: var(--text); font-weight: 600; box-shadow: 0 1px 2px rgba(28, 26, 24, 0.06); }
  .sip-switch-mini { font-family: var(--font-display); font-size: 12px; color: var(--muted-soft); font-weight: 400; font-variant-numeric: tabular-nums; }
  .sip-switch-opt.active .sip-switch-mini { color: var(--muted); }

  .water-hero { background: var(--card-bg-warm); border: 1px solid var(--border-soft); border-radius: var(--radius); padding: 22px 22px 18px; margin-bottom: 14px; text-align: center; }
  .water-num { font-family: var(--font-display); font-weight: 500; font-size: 56px; line-height: 1; letter-spacing: -0.025em; font-variant-numeric: tabular-nums; display: flex; align-items: baseline; justify-content: center; gap: 6px; }
  .water-num-unit { font-size: 18px; color: var(--muted); font-weight: 500; letter-spacing: 0; }
  .water-target { font-family: var(--font-body); font-size: 12px; color: var(--muted); margin-top: 6px; letter-spacing: 0.02em; font-variant-numeric: tabular-nums; }
  .water-pace { display: inline-flex; align-items: center; gap: 6px; margin-top: 10px; padding: 5px 12px; background: var(--bg); border-radius: 999px; font-family: var(--font-body); font-size: 11px; font-weight: 500; letter-spacing: 0.02em; }
  .water-pace.behind { color: var(--warn); }
  .water-pace.ahead  { color: var(--good); }
  .water-pace.on     { color: var(--muted); }
  .water-pace-dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }

  .water-bars { background: var(--card-bg); border: 1px solid var(--border-soft); border-radius: var(--radius); padding: 16px 16px 14px; margin-bottom: 14px; }
  .water-bars-label { font-family: var(--font-body); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted-soft); font-weight: 500; margin-bottom: 12px; }
  .bars-row { display: flex; align-items: flex-end; gap: 3px; height: 56px; margin-bottom: 6px; }
  .v2-bar { flex: 1; background: var(--border-soft); border-radius: 2px; min-height: 3px; transition: height 0.3s; }
  .v2-bar.filled { background: var(--accent-deep); }
  .v2-bar.now    { background: var(--text); }
  .bars-time-row { display: flex; justify-content: space-between; font-family: var(--font-body); font-size: 9px; color: var(--muted-soft); letter-spacing: 0.06em; font-weight: 500; margin-top: 2px; }
  .bars-time-row span { flex: 1; text-align: center; }
  .bars-time-row span:first-child { text-align: left; }
  .bars-time-row span:last-child  { text-align: right; }

  .add-section-label { font-family: var(--font-body); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted-soft); font-weight: 500; margin: 4px 2px 10px; }
  .add-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px; }
  .add-tile { background: var(--card-bg); border: 1px solid var(--border-soft); border-radius: var(--radius); padding: 14px 12px; display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; transition: background 0.15s; }
  .add-tile:active { background: var(--card-bg-warm); }
  .add-tile-num { font-family: var(--font-display); font-weight: 500; font-size: 18px; line-height: 1; font-variant-numeric: tabular-nums; letter-spacing: -0.01em; }
  .add-tile-name { font-family: var(--font-body); font-size: 11px; color: var(--muted); font-weight: 500; letter-spacing: 0.02em; }
  .add-tile-custom { border-style: dashed; }
  .add-tile-custom.removing { background: var(--warn); }
  .add-tile-custom.removing .add-tile-num, .add-tile-custom.removing .add-tile-name { color: var(--bg); }
  .add-hint { font-family: var(--font-body); font-size: 11px; color: var(--muted-soft); letter-spacing: 0.02em; margin: -8px 2px 16px; }

  .timeline-label { font-family: var(--font-body); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted-soft); font-weight: 500; margin: 4px 2px 10px; }
  .timeline-row { display: flex; align-items: center; gap: 12px; padding: 10px 4px; border-bottom: 1px solid var(--border-soft); }
  .timeline-row:last-child { border-bottom: none; }
  .timeline-time { font-family: var(--font-body); font-size: 12px; color: var(--muted-soft); font-variant-numeric: tabular-nums; letter-spacing: 0.02em; width: 56px; flex-shrink: 0; }
  .timeline-bar { flex: 1; height: 6px; background: var(--accent-deep); border-radius: 3px; max-width: 70%; }
  .timeline-amount { font-family: var(--font-display); font-size: 13px; font-weight: 500; color: var(--text); font-variant-numeric: tabular-nums; text-align: right; }

  /* ───── v2: Stack tab (mockup-matched) ───── */
  .stack-progress { background: var(--card-bg); border: 1px solid var(--border-soft); border-radius: var(--radius); padding: 16px 18px; margin-bottom: 14px; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .stack-progress-left { display: flex; flex-direction: column; gap: 3px; }
  .stack-progress-label { font-family: var(--font-body); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted-soft); font-weight: 500; }
  .stack-progress-num { font-family: var(--font-display); font-weight: 500; font-size: 26px; line-height: 1; letter-spacing: -0.02em; font-variant-numeric: tabular-nums; display: flex; align-items: baseline; gap: 4px; }
  .stack-progress-num-suffix { font-size: 14px; color: var(--muted); font-weight: 400; }
  .stack-streak { text-align: right; display: flex; flex-direction: column; gap: 3px; align-items: flex-end; }
  .stack-streak-num { font-family: var(--font-display); font-weight: 500; font-size: 18px; line-height: 1; letter-spacing: -0.01em; font-variant-numeric: tabular-nums; }
  .stack-streak-label { font-family: var(--font-body); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted-soft); font-weight: 500; }

  .stack-group-header { display: flex; align-items: baseline; justify-content: space-between; margin: 14px 2px 10px; }
  .stack-group-title { font-family: var(--font-body); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted-soft); font-weight: 500; }
  .stack-group-meta { font-family: var(--font-body); font-size: 11px; color: var(--muted-soft); letter-spacing: 0.02em; font-weight: 500; font-variant-numeric: tabular-nums; }

  .stack-item { background: var(--card-bg); border: 1px solid var(--border-soft); border-radius: var(--radius); padding: 13px 14px; margin-bottom: 8px; display: flex; align-items: center; gap: 12px; cursor: pointer; transition: background 0.15s; }
  .stack-item.taken { background: var(--card-bg-warm); }
  .stack-cb { width: 24px; height: 24px; border-radius: 6px; border: 1.5px solid var(--border); background: var(--bg); flex-shrink: 0; display: flex; align-items: center; justify-content: center; color: transparent; font-size: 14px; line-height: 1; transition: background 0.15s, color 0.15s, border-color 0.15s; }
  .stack-item.taken .stack-cb { background: var(--text); border-color: var(--text); color: var(--bg); }
  .stack-item-body { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 2px; }
  .stack-item-name { font-family: var(--font-display); font-weight: 500; font-size: 15px; letter-spacing: -0.005em; line-height: 1.2; display: flex; align-items: center; gap: 6px; }
  .req-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent-deep); display: inline-block; flex-shrink: 0; }
  .stack-item.taken .stack-item-name { color: var(--muted); }
  .stack-item-meta { font-family: var(--font-body); font-size: 11px; color: var(--muted); letter-spacing: 0.02em; font-variant-numeric: tabular-nums; }
  .stack-item-streak { display: flex; align-items: center; gap: 4px; font-family: var(--font-body); font-size: 11px; color: var(--muted-soft); font-weight: 500; letter-spacing: 0.02em; font-variant-numeric: tabular-nums; flex-shrink: 0; }
  .stack-item-streak.hot { color: var(--good); }
  .streak-flame { font-size: 10px; line-height: 1; }

  .asneeded-row { background: var(--card-bg); border: 1px solid var(--border-soft); border-radius: var(--radius); padding: 13px 14px; margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; gap: 12px; cursor: pointer; }
  .asneeded-left { display: flex; flex-direction: column; gap: 2px; }
  .asneeded-name { font-family: var(--font-display); font-weight: 500; font-size: 15px; letter-spacing: -0.005em; }
  .asneeded-meta { font-family: var(--font-body); font-size: 11px; color: var(--muted); letter-spacing: 0.02em; }
  .asneeded-log-btn { padding: 7px 12px; border: 1px solid var(--border); border-radius: 999px; background: transparent; font-family: var(--font-body); font-size: 11px; font-weight: 500; color: var(--text); letter-spacing: 0.02em; cursor: pointer; }
  .asneeded-log-btn:active { background: var(--card-bg-warm); }

  /* ───── v2: Fuel — Today (mockup-matched) ───── */
  .summary-card {
    background: var(--card-bg);
    border: 1px solid var(--border-soft);
    border-radius: var(--radius);
    padding: 22px 20px 20px;
    margin-bottom: 16px;
    display: grid;
    grid-template-columns: 130px 1fr;
    gap: 20px;
    align-items: center;
  }
  .ring-wrap { width: 130px; height: 130px; position: relative; }
  .ring-wrap svg { width: 100%; height: 100%; transform: rotate(-90deg); }
  .ring-bg   { fill: none; stroke: var(--border-soft); stroke-width: 10; }
  .ring-fill { fill: none; stroke: var(--text); stroke-width: 10; stroke-linecap: round; transition: stroke-dashoffset 400ms; }
  .ring-center { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; }
  .ring-num { font-family: var(--font-display); font-weight: 500; font-size: 32px; line-height: 1; letter-spacing: -0.02em; font-variant-numeric: tabular-nums; }
  .ring-label { font-family: var(--font-body); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted-soft); font-weight: 500; }
  .ring-total { font-family: var(--font-body); font-size: 11px; color: var(--muted); letter-spacing: 0.02em; margin-top: 4px; font-variant-numeric: tabular-nums; }
  .ring-sub-alc { font-family: var(--font-body); font-size: 9.5px; color: var(--warn); letter-spacing: 0.02em; margin-top: 2px; font-variant-numeric: tabular-nums; opacity: 0.85; }

  .macros { display: flex; flex-direction: column; gap: 12px; }
  .macro { display: flex; flex-direction: column; gap: 5px; }
  .macro-row { display: flex; align-items: baseline; justify-content: space-between; }
  .macro-label { font-family: var(--font-body); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted-soft); font-weight: 500; }
  .macro-value { font-family: var(--font-display); font-weight: 500; font-size: 13px; line-height: 1; font-variant-numeric: tabular-nums; letter-spacing: -0.005em; }
  .macro-value .target { color: var(--muted); font-weight: 400; font-size: 11px; }
  .macro-bar-track { height: 4px; background: var(--border-soft); border-radius: 2px; overflow: hidden; }
  .macro-bar-fill { height: 100%; background: var(--text); border-radius: 2px; transition: width 0.3s; }
  .macro-bar-fill.protein { background: var(--text); }
  .macro-bar-fill.carbs   { background: var(--accent-deep); }
  .macro-bar-fill.fat     { background: var(--accent); }

  .recents-row { display: flex; gap: 8px; overflow-x: auto; padding: 2px 2px 6px; margin: 0 -2px; }
  .recents-row::-webkit-scrollbar { display: none; }
  .recent-chip { flex-shrink: 0; background: var(--card-bg); border: 1px solid var(--border-soft); border-radius: 999px; padding: 8px 14px 8px 12px; display: flex; align-items: center; gap: 8px; cursor: pointer; }
  .recent-chip:active { background: var(--card-bg-warm); }
  .recent-chip-name { font-family: var(--font-display); font-size: 13px; font-weight: 500; color: var(--text); letter-spacing: -0.005em; }
  .recent-chip-kcal { font-family: var(--font-body); font-size: 11px; color: var(--muted); letter-spacing: 0.01em; font-variant-numeric: tabular-nums; }
  .recent-chip-dot  { width: 3px; height: 3px; background: var(--muted-soft); border-radius: 50%; }
  .recent-chip.lib  { background: transparent; border-style: dashed; }
  .recent-chip.lib .recent-chip-name { color: var(--muted); font-style: italic; }

  .meal-input-wrap { margin-top: 10px; position: relative; }
  .meal-input { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 14px 54px 14px 18px; font-family: var(--font-body); font-size: 14px; color: var(--text); letter-spacing: 0.01em; outline: none; }
  .meal-input::placeholder { color: var(--muted-soft); }
  .meal-input:focus { border-color: var(--text); }
  .meal-input-icon { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); width: 36px; height: 36px; border-radius: 50%; background: var(--text); color: var(--bg); display: flex; align-items: center; justify-content: center; cursor: pointer; border: none; padding: 0; }
  .meal-input-icon svg { width: 14px; height: 14px; stroke: var(--bg); fill: none; stroke-width: 2; }
  .meal-input-hint { margin-top: 8px; padding-left: 4px; font-family: var(--font-display); font-size: 11px; font-style: italic; color: var(--muted-soft); font-weight: 400; line-height: 1.3; }

  .meal { background: var(--card-bg); border: 1px solid var(--border-soft); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; gap: 12px; cursor: pointer; }
  .meal-alc { background: rgba(181, 117, 74, 0.08); border-style: dashed; border-color: var(--warn); }
  .meal-alc .meal-kcal-num, .meal-alc .meal-title { color: var(--warn); }
  .meal-left { display: flex; flex-direction: column; gap: 3px; flex: 1; min-width: 0; }
  .meal-top-row { display: flex; align-items: baseline; gap: 8px; }
  .meal-title { font-family: var(--font-display); font-weight: 500; font-size: 15px; letter-spacing: -0.005em; line-height: 1.2; }
  .meal-time { font-family: var(--font-body); font-size: 11px; color: var(--muted-soft); font-variant-numeric: tabular-nums; letter-spacing: 0.02em; }
  .meal-macros { font-family: var(--font-body); font-size: 11px; color: var(--muted); letter-spacing: 0.02em; font-variant-numeric: tabular-nums; }
  .meal-kcal { text-align: right; display: flex; flex-direction: column; align-items: flex-end; gap: 2px; flex-shrink: 0; }
  .meal-kcal-num { font-family: var(--font-display); font-weight: 500; font-size: 18px; line-height: 1; font-variant-numeric: tabular-nums; letter-spacing: -0.01em; }
  .meal-kcal-label { font-family: var(--font-body); font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted-soft); font-weight: 500; }

  .remaining-hint { background: var(--card-bg-warm); border: 1px solid var(--border-soft); border-radius: var(--radius); padding: 14px 16px; margin-top: 14px; margin-bottom: 12px; }
  .remaining-hint-text { font-family: var(--font-display); font-style: italic; font-weight: 400; font-size: 13px; line-height: 1.35; color: var(--accent-deep); letter-spacing: -0.005em; }

  /* ───── v2: Fuel — Library (mockup-matched) ───── */
  .lib-back { font-family: var(--font-body); font-size: 13px; font-weight: 500; color: var(--muted); cursor: pointer; }
  .lib-back:active { color: var(--text); }
  .search-wrap { position: relative; margin-bottom: 14px; }
  .search-input { width: 100%; background: var(--card-bg); border: 1px solid var(--border-soft); border-radius: var(--radius-sm); padding: 12px 14px 12px 40px; font-family: var(--font-body); font-size: 14px; color: var(--text); outline: none; }
  .search-input::placeholder { color: var(--muted-soft); }
  .search-input:focus { border-color: var(--text); background: var(--bg); }
  .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); width: 18px; height: 18px; pointer-events: none; }
  .search-icon svg { stroke: var(--muted-soft); fill: none; stroke-width: 1.5; }

  .filter-row { display: flex; gap: 8px; margin-bottom: 16px; overflow-x: auto; padding: 2px; }
  .filter-row::-webkit-scrollbar { display: none; }
  .filter-chip { flex-shrink: 0; padding: 7px 12px; background: var(--card-bg); border: 1px solid var(--border-soft); border-radius: 999px; font-family: var(--font-body); font-size: 12px; font-weight: 500; color: var(--muted); letter-spacing: 0.01em; cursor: pointer; }
  .filter-chip.active { background: var(--text); color: var(--bg); border-color: var(--text); }

  .sort-row { display: flex; align-items: center; justify-content: space-between; padding: 0 2px; margin-bottom: 10px; }
  .sort-count { font-family: var(--font-body); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted-soft); font-weight: 500; }
  .sort-toggle { display: flex; align-items: center; gap: 4px; font-family: var(--font-body); font-size: 11px; color: var(--muted); font-weight: 500; letter-spacing: 0.02em; cursor: pointer; padding: 0; background: none; border: none; }
  .sort-toggle .caret { font-size: 9px; }

  .group-label { font-family: var(--font-body); font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted-soft); font-weight: 600; margin: 14px 2px 8px; padding-bottom: 6px; border-bottom: 1px solid var(--border-soft); }
  .group-label:first-of-type { margin-top: 4px; }

  .lib-entry { background: var(--card-bg); border: 1px solid var(--border-soft); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; gap: 12px; cursor: pointer; }
  .lib-entry-left { display: flex; flex-direction: column; gap: 3px; flex: 1; min-width: 0; }
  .lib-entry-top { display: flex; align-items: baseline; gap: 8px; }
  .lib-entry-name { font-family: var(--font-display); font-weight: 500; font-size: 15px; letter-spacing: -0.005em; line-height: 1.2; }
  .lib-entry-freq { font-family: var(--font-body); font-size: 10px; color: var(--muted-soft); font-weight: 500; letter-spacing: 0.04em; text-transform: uppercase; font-variant-numeric: tabular-nums; }
  .lib-entry-macros { font-family: var(--font-body); font-size: 11px; color: var(--muted); letter-spacing: 0.02em; font-variant-numeric: tabular-nums; }
  .lib-entry-add { width: 32px; height: 32px; border-radius: 50%; border: 1px solid var(--border); background: transparent; color: var(--muted); font-size: 16px; display: flex; align-items: center; justify-content: center; cursor: pointer; margin-left: 4px; flex-shrink: 0; }
  .lib-entry-add:active { color: var(--text); border-color: var(--text); }

  /* ───── v2: Swipe-to-delete (chunk 7 +) ───── */
  .swipe-row { position: relative; overflow: hidden; border-radius: var(--radius); margin-bottom: 10px; }
  .swipe-row > .swipe-content { position: relative; z-index: 2; transition: transform 0.22s ease; touch-action: pan-y; will-change: transform; }
  .swipe-row > .swipe-content.dragging { transition: none; }
  .swipe-row > .swipe-content > * { margin-bottom: 0 !important; }
  .swipe-row > .swipe-action { position: absolute; right: 0; top: 0; bottom: 0; width: 88px; display: flex; align-items: center; justify-content: center; background: var(--warn); color: var(--bg); font-family: var(--font-body); font-size: 13px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; cursor: pointer; z-index: 1; }
  .swipe-row > .swipe-action:active { background: #9C5F37; }
  .swipe-row > .swipe-action-left { position: absolute; left: 0; top: 0; bottom: 0; width: 104px; display: flex; align-items: center; justify-content: center; background: var(--good); color: var(--bg); font-family: var(--font-body); font-size: 12px; font-weight: 600; letter-spacing: 0.03em; cursor: pointer; z-index: 1; }
  .swipe-row > .swipe-action-left:active { filter: brightness(0.92); }

  /* ───── v2: Train quick-start chips + Workouts screen (chunk 7) ───── */
  .quickstart-row { display: flex; gap: 8px; overflow-x: auto; padding: 2px 2px 8px; margin: 0 -2px 14px; }
  .quickstart-row::-webkit-scrollbar { display: none; }
  .quickstart-chip { flex-shrink: 0; background: var(--card-bg); border: 1px solid var(--border-soft); border-radius: var(--radius); padding: 12px 16px; min-width: 130px; cursor: pointer; transition: background 0.15s; }
  .quickstart-chip:active { background: var(--card-bg-warm); }
  .quickstart-chip-name { font-family: var(--font-display); font-weight: 500; font-size: 14px; letter-spacing: -0.005em; line-height: 1.15; }
  .quickstart-chip-meta { font-family: var(--font-body); font-size: 10px; color: var(--muted-soft); letter-spacing: 0.04em; text-transform: uppercase; font-weight: 500; margin-top: 4px; }
  .quickstart-chip.empty { border-style: dashed; }
  .quickstart-chip.empty .quickstart-chip-name { color: var(--muted); font-style: italic; }

  .workout-row { background: var(--card-bg); border: 1px solid var(--border-soft); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; gap: 12px; cursor: pointer; }
  .workout-row-left { display: flex; flex-direction: column; gap: 3px; min-width: 0; flex: 1; }
  .workout-row-name { font-family: var(--font-display); font-weight: 500; font-size: 15px; letter-spacing: -0.005em; line-height: 1.2; }
  .workout-row-meta { font-family: var(--font-body); font-size: 11px; color: var(--muted); letter-spacing: 0.02em; font-variant-numeric: tabular-nums; }
  .workout-row-chev { font-size: 18px; color: var(--muted); flex-shrink: 0; }

  .exercise-row { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-top: 1px solid var(--border-soft); }
  .exercise-row:first-of-type { border-top: none; padding-top: 2px; }
  .exercise-row-name { flex: 1; min-width: 0; font-family: var(--font-display); font-weight: 500; font-size: 14px; letter-spacing: -0.005em; }
  .exercise-row-sets { font-family: var(--font-body); font-size: 11px; color: var(--muted); font-variant-numeric: tabular-nums; width: 70px; text-align: right; }
  .exercise-row-x { color: var(--muted); padding: 4px 8px; cursor: pointer; }

  /* ───── v2: Weekly Digest (chunk 11) — magazine layout ───── */
  .dig-eyebrow { font-family: var(--font-body); font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted-soft); font-weight: 600; margin-bottom: 12px; }
  .dig-headline { font-family: var(--font-display); font-weight: 500; font-size: 26px; line-height: 1.2; letter-spacing: -0.015em; color: var(--text); margin-bottom: 14px; }
  .dig-headline em { font-style: italic; color: var(--accent-deep); font-weight: 500; }
  .dig-narrative { font-family: var(--font-display); font-weight: 400; font-size: 15px; line-height: 1.55; color: var(--muted); letter-spacing: -0.005em; margin-bottom: 20px; }
  .dig-meta-strip { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1px; background: var(--border-soft); border: 1px solid var(--border-soft); border-radius: var(--radius); overflow: hidden; margin-bottom: 28px; }
  .dig-meta-cell { background: var(--card-bg); padding: 14px 12px; display: flex; flex-direction: column; gap: 4px; }
  .dig-meta-label { font-family: var(--font-body); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted-soft); font-weight: 500; }
  .dig-meta-val { font-family: var(--font-display); font-weight: 500; font-size: 22px; line-height: 1; letter-spacing: -0.01em; font-variant-numeric: tabular-nums; }
  .dig-meta-delta { font-family: var(--font-body); font-size: 11px; font-weight: 500; letter-spacing: 0.02em; font-variant-numeric: tabular-nums; }
  .dig-meta-delta.up   { color: var(--good); }
  .dig-meta-delta.down { color: var(--warn); }
  .dig-meta-delta.flat { color: var(--muted-soft); }

  .dig-section-mark { display: flex; align-items: center; gap: 12px; margin: 8px 2px 16px; }
  .dig-section-mark .rule { flex: 1; height: 1px; background: var(--border-soft); }
  .dig-section-mark .label { font-family: var(--font-body); font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted-soft); font-weight: 600; }

  .lens-row { display: flex; gap: 8px; margin-bottom: 14px; overflow-x: auto; padding: 2px; }
  .lens-row::-webkit-scrollbar { display: none; }
  .lens-chip { flex-shrink: 0; padding: 8px 14px; background: var(--card-bg); border: 1px solid var(--border-soft); border-radius: 999px; font-family: var(--font-body); font-size: 12px; font-weight: 500; color: var(--muted); letter-spacing: 0.01em; cursor: pointer; }
  .lens-chip.active { background: var(--text); color: var(--bg); border-color: var(--text); }

  .lens-bar-row { display: grid; grid-template-columns: 100px 1fr 64px; align-items: center; gap: 10px; padding: 8px 0; }
  .lens-bar-label { font-family: var(--font-body); font-size: 12px; color: var(--muted); letter-spacing: 0.02em; }
  .lens-bar-track { height: 10px; background: var(--card-bg); border-radius: 5px; overflow: hidden; position: relative; }
  .lens-bar-fill { height: 100%; background: var(--accent-deep); border-radius: 5px; transition: width 0.3s; }
  .lens-bar-fill.good { background: var(--good); }
  .lens-bar-fill.warn { background: var(--warn); }
  .lens-bar-fill.dim { background: var(--border); }
  .lens-bar-val { font-family: var(--font-display); font-weight: 500; font-size: 14px; text-align: right; font-variant-numeric: tabular-nums; letter-spacing: -0.005em; }
  .lens-bar-val .n { font-family: var(--font-body); font-size: 10px; color: var(--muted-soft); font-weight: 400; margin-left: 4px; }

  .dig-signal-card { background: var(--card-bg); border: 1px solid var(--border-soft); border-radius: var(--radius); padding: 16px 18px; margin-bottom: 12px; }
  .dig-signal-card.wins { border-left: 3px solid var(--good); }
  .dig-signal-card.drags { border-left: 3px solid var(--warn); }
  .dig-signal-card .label { font-family: var(--font-body); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted-soft); font-weight: 500; margin-bottom: 8px; }
  .dig-signal-card ul { margin: 0; padding-left: 16px; }
  .dig-signal-card li { font-family: var(--font-display); font-size: 14px; line-height: 1.45; color: var(--text); margin-bottom: 6px; }
  .dig-signal-card li:last-child { margin-bottom: 0; }
  .dig-signal-card li em { font-style: italic; color: var(--accent-deep); }

  .dig-experiment { background: var(--text); color: var(--bg); border-radius: var(--radius); padding: 24px 22px 20px; margin-bottom: 14px; }
  .dig-experiment .eyebrow { font-family: var(--font-body); font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: rgba(245, 242, 238, 0.55); font-weight: 600; margin-bottom: 12px; }
  .dig-experiment .text { font-family: var(--font-display); font-weight: 500; font-size: 19px; line-height: 1.35; letter-spacing: -0.005em; margin-bottom: 14px; }
  .dig-experiment .text em { font-style: italic; color: rgba(245, 242, 238, 0.85); font-weight: 500; }
  .dig-experiment .meta { font-family: var(--font-body); font-size: 11px; color: rgba(245, 242, 238, 0.55); letter-spacing: 0.02em; margin-bottom: 16px; }
  .dig-experiment .acts { display: flex; gap: 10px; }
  .dig-experiment .act { flex: 1; padding: 12px 14px; border-radius: var(--radius-sm); font-family: var(--font-body); font-size: 13px; font-weight: 500; letter-spacing: 0.01em; cursor: pointer; border: none; }
  .dig-experiment .act.primary { background: var(--bg); color: var(--text); }
  .dig-experiment .act.ghost { background: transparent; color: rgba(245, 242, 238, 0.7); border: 1px solid rgba(245, 242, 238, 0.25); }
  .dig-experiment .act:active { opacity: 0.85; }

  .dig-empty { background: var(--card-bg-warm); border: 1px dashed var(--border); border-radius: var(--radius); padding: 28px 22px; text-align: center; margin-bottom: 14px; }
  .dig-empty-title { font-family: var(--font-display); font-weight: 500; font-size: 18px; letter-spacing: -0.005em; }
  .dig-empty-sub { font-family: var(--font-body); font-size: 13px; color: var(--muted); margin-top: 8px; line-height: 1.4; }
  .dig-empty .photos-gate-btn { margin-top: 16px; }

  /* ───── v2: Body sub-screen (chunk 10) ───── */
  .body-hero { background: var(--card-bg-warm); border: 1px solid var(--border-soft); border-radius: var(--radius); padding: 20px 22px 18px; margin-bottom: 14px; display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
  .body-hero-num { font-family: var(--font-display); font-weight: 500; font-size: 44px; line-height: 1; letter-spacing: -0.025em; font-variant-numeric: tabular-nums; display: flex; align-items: baseline; gap: 6px; }
  .body-hero-unit { font-family: var(--font-body); font-size: 16px; color: var(--muted); font-weight: 500; }
  .body-hero-label { font-family: var(--font-body); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted-soft); font-weight: 500; margin-top: 8px; }
  .body-hero-delta { font-family: var(--font-body); font-size: 11px; font-weight: 500; margin-top: 4px; letter-spacing: 0.02em; font-variant-numeric: tabular-nums; }
  .body-hero-delta.good { color: var(--good); }
  .body-hero-delta.warn { color: var(--warn); }
  .body-hero-delta.flat { color: var(--muted-soft); }
  .body-hero-log { padding: 8px 14px; border: 1px solid var(--border); border-radius: 999px; font-family: var(--font-body); font-size: 12px; font-weight: 500; color: var(--text); background: var(--bg); cursor: pointer; flex-shrink: 0; }
  .body-hero-log:active { background: var(--card-bg); }

  .body-chart { background: var(--card-bg); border: 1px solid var(--border-soft); border-radius: var(--radius); padding: 14px 16px 12px; margin-bottom: 14px; }
  .body-chart-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .body-chart-title { font-family: var(--font-body); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted-soft); font-weight: 500; }
  .body-chart-svg { width: 100%; height: 80px; display: block; }

  .meas-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 14px; }
  .meas-cell { background: var(--card-bg); border: 1px solid var(--border-soft); border-radius: var(--radius); padding: 14px 12px; cursor: pointer; transition: background 0.15s; }
  .meas-cell:active { background: var(--card-bg-warm); }
  .meas-cell-label { font-family: var(--font-body); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted-soft); font-weight: 500; }
  .meas-cell-val { font-family: var(--font-display); font-weight: 500; font-size: 22px; line-height: 1; letter-spacing: -0.01em; font-variant-numeric: tabular-nums; margin-top: 6px; display: flex; align-items: baseline; gap: 3px; }
  .meas-cell-val .unit { font-family: var(--font-body); font-size: 11px; color: var(--muted); font-weight: 500; }
  .meas-cell-val.dim { color: var(--muted-soft); font-weight: 400; }
  .meas-cell-delta { font-family: var(--font-body); font-size: 10px; margin-top: 3px; letter-spacing: 0.02em; font-variant-numeric: tabular-nums; }
  .meas-cell-delta.good { color: var(--good); }
  .meas-cell-delta.warn { color: var(--warn); }
  .meas-cell-delta.flat { color: var(--muted-soft); }

  .photos-add-row { display: flex; gap: 10px; margin-bottom: 12px; }
  .photos-add-btn { flex: 1; padding: 12px 14px; background: var(--text); color: var(--bg); border: none; border-radius: var(--radius-sm); font-family: var(--font-body); font-size: 13px; font-weight: 500; letter-spacing: 0.01em; display: flex; align-items: center; justify-content: center; gap: 6px; cursor: pointer; }
  .photos-add-btn:active { opacity: 0.88; }
  .photos-lock-btn { padding: 12px 16px; background: transparent; color: var(--muted); border: 1px solid var(--border); border-radius: var(--radius-sm); font-family: var(--font-body); font-size: 13px; font-weight: 500; cursor: pointer; }
  .photos-lock-btn:active { color: var(--text); }
  .photos-day { margin-bottom: 16px; }
  .photos-day-label { font-family: var(--font-body); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted-soft); font-weight: 500; margin-bottom: 8px; padding: 0 2px; }
  .photos-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
  .photo-thumb { position: relative; aspect-ratio: 1 / 1; background: var(--card-bg); border: 1px solid var(--border-soft); border-radius: 10px; overflow: hidden; cursor: pointer; }
  .photo-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .photo-thumb.hidden { background: var(--card-bg-warm); }
  .photo-thumb.hidden img { display: none; }
  .photo-thumb.hidden::after { content: '◍'; position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: var(--muted-soft); font-size: 18px; }
  .photo-thumb.loading::after { content: '…'; position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: var(--muted-soft); font-size: 18px; }

  .photo-fullscreen { position: fixed; inset: 0; background: #000; z-index: 300; display: flex; flex-direction: column; align-items: center; justify-content: center; animation: fade 0.18s; }
  .photo-fullscreen img { max-width: 100%; max-height: 80vh; object-fit: contain; }
  .photo-fullscreen .pfs-close { position: absolute; top: calc(14px + env(safe-area-inset-top)); right: 14px; width: 36px; height: 36px; border-radius: 50%; background: rgba(255,255,255,0.15); color: white; border: none; font-size: 22px; line-height: 1; cursor: pointer; }
  .photo-fullscreen .pfs-meta { position: absolute; bottom: calc(24px + env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%); font-family: var(--font-body); color: rgba(255,255,255,0.7); font-size: 12px; letter-spacing: 0.04em; text-transform: uppercase; }
  .photo-fullscreen .pfs-nav { position: absolute; top: 50%; transform: translateY(-50%); width: 44px; height: 44px; border-radius: 50%; background: rgba(255,255,255,0.12); color: white; border: none; font-size: 22px; line-height: 1; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .photo-fullscreen .pfs-prev { left: 12px; }
  .photo-fullscreen .pfs-next { right: 12px; }
  .photo-fullscreen .pfs-actions { position: absolute; bottom: calc(70px + env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%); display: flex; gap: 10px; }
  .photo-fullscreen .pfs-act { padding: 9px 18px; border-radius: 999px; background: rgba(255,255,255,0.12); color: white; border: none; font-family: var(--font-body); font-size: 12px; font-weight: 500; letter-spacing: 0.04em; cursor: pointer; }

  .photos-gate { background: var(--card-bg-warm); border: 1px dashed var(--border); border-radius: var(--radius); padding: 32px 22px; margin-bottom: 14px; text-align: center; }
  .photos-gate-icon { width: 28px; height: 28px; margin: 0 auto 14px; border: 1.5px solid var(--muted); border-radius: 6px; position: relative; }
  .photos-gate-icon::before { content: ''; position: absolute; left: 50%; bottom: 100%; transform: translateX(-50%); width: 16px; height: 12px; border: 1.5px solid var(--muted); border-bottom: none; border-radius: 8px 8px 0 0; }
  .photos-gate-title { font-family: var(--font-display); font-weight: 500; font-size: 16px; letter-spacing: -0.005em; }
  .photos-gate-sub { font-family: var(--font-body); font-size: 12px; color: var(--muted); margin-top: 6px; }
  .photos-gate-btn { margin-top: 16px; padding: 10px 22px; border: none; border-radius: 999px; background: var(--text); color: var(--bg); font-family: var(--font-body); font-size: 12px; font-weight: 500; letter-spacing: 0.02em; cursor: pointer; }

  /* ───── v2: Progress sub-screen (chunk 9) ───── */
  .prog-card { background: var(--card-bg); border: 1px solid var(--border-soft); border-radius: var(--radius); padding: 16px 18px 14px; margin-bottom: 10px; cursor: pointer; }
  .prog-card-head { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; margin-bottom: 6px; }
  .prog-name { font-family: var(--font-display); font-weight: 500; font-size: 16px; letter-spacing: -0.005em; line-height: 1.15; }
  .prog-current { font-family: var(--font-display); font-weight: 500; font-size: 18px; line-height: 1; letter-spacing: -0.01em; font-variant-numeric: tabular-nums; }
  .prog-current-unit { font-family: var(--font-body); font-size: 11px; color: var(--muted); font-weight: 500; letter-spacing: 0.02em; margin-left: 2px; }
  .prog-spark { width: 100%; height: 44px; display: block; }
  .prog-spark-line { fill: none; stroke: var(--accent-deep); stroke-width: 1.5; }
  .prog-spark-area { fill: var(--accent-deep); opacity: 0.12; }
  .prog-spark-dot { fill: var(--accent-deep); }
  .prog-spark-dot.pr { fill: var(--good); }
  .prog-foot { display: flex; align-items: baseline; gap: 8px; margin-top: 8px; font-family: var(--font-body); font-size: 11px; color: var(--muted); letter-spacing: 0.02em; font-variant-numeric: tabular-nums; }
  .prog-delta.up   { color: var(--good); font-weight: 500; }
  .prog-delta.down { color: var(--warn); font-weight: 500; }
  .prog-delta.flat { color: var(--muted-soft); }
  .prog-tag { font-family: var(--font-body); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted-soft); font-weight: 500; }
  .prog-tag.pr { color: var(--good); }
  .prog-tag.plateau { color: var(--accent-deep); }

  /* ───── v2: Strength set logger (chunk 8) ───── */

const DAY_ROLLOVER_HOUR = 5;
function todayISO() {
  const d = new Date(Date.now() - DAY_ROLLOVER_HOUR * 3600 * 1000);
  const pad = n => String(n).padStart(2, '0');
  return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
}

const $ = (sel) => document.querySelector(sel);
const el = (html) => { const t = document.createElement('template'); t.innerHTML = html.trim(); return t.content.firstElementChild; };

function getKey() { return localStorage.getItem('anthropic_api_key'); }
function setKey(k) { localStorage.setItem('anthropic_api_key', k); }

const PROFILE_ID = '00000000-0000-0000-0000-000000000001';
const PROFILE_FIELDS = ['age', 'gender', 'weight_lb', 'goal_weight_lb', 'weight_pace', 'height_in', 'activity_level'];

function getProfile() {
  try {
    const raw = localStorage.getItem('tide_profile');
    if (!raw) return null;
    const p = JSON.parse(raw);
    if (!p || !p.age || !p.gender || !p.weight_lb) return null;
    return p;
  } catch { return null; }
}
function setProfile(p) {
  localStorage.setItem('tide_profile', JSON.stringify(p));
  // Fire-and-forget cloud upsert. Failures are non-fatal — local is the source.
  saveProfileToCloud(p).catch(e => console.warn('profile cloud sync failed:', e.message));
}

async function saveProfileToCloud(p) {
  const patch = { id: PROFILE_ID, updated_at: new Date().toISOString() };
  PROFILE_FIELDS.forEach(k => { if (p[k] != null) patch[k] = p[k]; });
  // Include the current PAT so we don't blow it away by patching the row.
  const pat = getOuraPat();
  if (pat) patch.oura_pat = pat;
  await sbFetch('/tide_profile?on_conflict=id', {
    method: 'POST',
    headers: { Prefer: 'resolution=merge-duplicates,return=minimal' },
    body: JSON.stringify(patch),
  });
}

async function loadProfileFromCloud() {
  try {
    const rows = await sbFetch(`/tide_profile?id=eq.${PROFILE_ID}&limit=1`);
    return (rows && rows[0]) || null;
  } catch (e) {
    console.warn('loadProfileFromCloud failed:', e.message);
    return null;
  }
}

// On boot: cloud is source of truth when it has data; localStorage wins when
// cloud row is still empty (first-time setup). Push local up in that case so
// other devices pick it up too.
async function syncProfileOnBoot() {
  const cloud = await loadProfileFromCloud();
  if (!cloud) return;
  const cloudHasData = PROFILE_FIELDS.some(k => cloud[k] != null);
  if (cloudHasData) {
    const profile = {};
    PROFILE_FIELDS.forEach(k => { if (cloud[k] != null) profile[k] = cloud[k]; });
    if (profile.age && profile.gender && profile.weight_lb) {
      localStorage.setItem('tide_profile', JSON.stringify(profile));
    }
    if (cloud.oura_pat && !getOuraPat()) {
      localStorage.setItem('still_oura_pat', cloud.oura_pat);
    }
  } else {
    // Cloud row empty — push whatever local has so other devices pick it up.
    const local = getProfile();
    if (local) await saveProfileToCloud(local).catch(() => {});
    const pat = getOuraPat();
    if (pat) await sbFetch('/tide_profile?on_conflict=id', {
      method: 'POST',
      headers: { Prefer: 'resolution=merge-duplicates,return=minimal' },
      body: JSON.stringify({ id: PROFILE_ID, oura_pat: pat, updated_at: new Date().toISOString() }),
    }).catch(() => {});
  }
}

function toast(msg, ms = 2400) {
  document.querySelectorAll('.toast').forEach(t => t.remove());
  const t = el(`<div class="toast">${escapeHtml(msg)}</div>`);
  document.body.appendChild(t);
  setTimeout(() => t.remove(), ms);
}

function escapeHtml(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

function fmtTime(iso) {
  const d = new Date(iso);
  return d.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
}

function fmtDate(iso) {
  const d = new Date(iso);
  const today = new Date();
  const yest = new Date(); yest.setDate(yest.getDate() - 1);
  if (d.toDateString() === today.toDateString()) return 'Today';
  if (d.toDateString() === yest.toDateString()) return 'Yesterday';
  return d.toLocaleDateString([], { weekday: 'short', month: 'short', day: 'numeric' });
}

function fmtDuration(ms) {
  const min = Math.floor(ms / 60000);
  if (min < 1) return 'just now';
  if (min < 60) return `${min}m`;
  const h = Math.floor(min / 60);
  const m = min % 60;
  return m === 0 ? `${h}h` : `${h}h ${m}m`;
}

// ---------------------------------------------------------------------------
// Supabase fetch
// ---------------------------------------------------------------------------
async function sbFetch(path, opts = {}) {
  const url = path.startsWith('http') ? path : `${SB_URL}/rest/v1${path}`;
  const r = await fetch(url, {
    ...opts,
    headers: {
      apikey: SB_KEY,
      Authorization: `Bearer ${await sbBearer()}`,
      'Content-Type': 'application/json',
      Prefer: opts.method === 'POST' ? 'return=representation' : (opts.method === 'PATCH' ? 'return=representation' : ''),
      ...(opts.headers || {}),
    },
  });
  if (!r.ok) {
    const txt = await r.text();
    throw new Error(`Supabase ${r.status}: ${txt}`);
  }
  if (r.status === 204) return null;
  const t = await r.text();
  return t ? JSON.parse(t) : null;
}

// Claude
